window.__EXAM_LOAD({"id":"114_3","year":114,"subjectIndex":3,"subject":"諮商與心理治療實務與專業倫理","essays":[{"num":1,"text":"小美目前是國中一年級的學生，當家長無法準時來接他回家便充滿焦慮，因而被轉介給學校諮商心\n理師。據家長描述，小美從國小開始就有分離焦慮，且愈來愈嚴重，家長曾詢問小美為何擔心，小\n美表示他很擔心家長會發生意外而消失，或是家長不會來接他。雖然家長大都準時在校門口等小\n美，但小美的擔心沒有減少。如果你是小美的諮商心理師，且預計採用Aaron Beck的認知治療作為\n諮商取向，請說明你評估小美可能出現的認知扭曲類型以及你協助小美改變認知扭曲的可行策略。\n（25分）","points":25,"reference":null,"rubric":null},{"num":2,"text":"諮商心理師如果出現專業耗竭的現象，不僅會危害其專業能力的展現，更可能對個案造成傷害。請\n說明諮商心理師可採取那些作法來避免自身出現專業耗竭。（25分）","points":25,"reference":null,"rubric":null}],"mc":[{"num":1,"stem":"在運用「標準問題管理流程」協助個案尋求提升生活的結果時，需要詢問自己四個問題，其中「我需要的是什麼？」是屬於那一個階段的提問？","options":{"A":"階段一：當前圖像（current picture）","B":"階段二：首選圖像（preferred picture）","C":"階段三：前進之路（way forward）","D":"階段四：我如何讓這一切發生"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":2,"stem":"依據Egan和Reese的觀點，在針對個案進行探問時，下列何者最不適合？","options":{"A":"指出需要更進一步弄清楚的陳述","B":"避免使用具提問或要求功能的詞語","C":"詢問開放式問句","D":"不要同時問很多問題"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":3,"stem":"個案在諮商當中提到：「我覺得主管一定對我有意見，每一次繳交的報告他都不滿意，也不說那裡需要修改就要我回去看，花時間修過之後又馬上打回票，我就覺得改好了啊！也看不出來那裡有問題了，為什麼不直接明說！」下列回應何者最能精確回應個案的關鍵經驗、想法或行為？","options":{"A":"噢，你真的好慘，真是辛苦","B":"主管不說明清楚，讓你很生氣","C":"其實你很努力地想要完成工作，但因為不知道那裡需要調整讓你很挫折","D":"主管真的不應該這樣對你，這會讓你很困擾且浪費彼此的時間"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":4,"stem":"關於面質技巧，下列敘述何者最不恰當？","options":{"A":"須評估諮商關係是否足夠信任","B":"須注意到個案的準備度","C":"須敏察到個案的不一致","D":"先面質再同理可以增進諮商效果"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":5,"stem":"關於「解釋」技巧，下列敘述何者最適當？","options":{"A":"宜多用專有名詞陳述，增加解釋的說服性","B":"諮商心理師可和個案合作共同建構解釋","C":"諮商心理師在單次諮商中應重複並多做解釋，才能突破個案的防衛","D":"解釋不可超過個案所能覺察的範圍，否則個案將無法思考、處理"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":6,"stem":"個案在第一次晤談時迫不及待地告訴諮商心理師個人的困境與問題的歷史。諮商心理師展現下列那項行為最有助於建立信任的諮商關係？","options":{"A":"一邊傾聽，一邊記筆記，以免遺忘重要訊息","B":"在適當時機打斷個案的敘述，詢問其陳述的某些細節","C":"輕聲發出「是」、「嗯哼」等話語，提供輕微的鼓勵","D": ions":{"A":"穩定和個案晤談並準時開始與結束","B":"對個案所談的內容都感興趣而不僅限於享受某特定議題","C":"想獲得個案的認可","D":"覺得除了自己以外，其他人應該也可以讓個案受益"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":15,"stem":"有關校園危機事件之三級輔導工作，下列敘述何者錯誤？","options":{"A":"危機事件發生後，校園輔導工作優先順序依序為處遇性輔導、介入性輔導，最後是發展性輔導","B":"針對危機事件受衝擊對象進行減壓團體，屬於介入性輔導","C":"危機事件受衝擊人數較多，以量表檢測篩選需要協助之對象，屬於發展性輔導","D":"提供目睹危機事件相關人員心理諮詢與相關資源，屬於處遇性輔導"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":16,"stem":"關於諮商紀錄的保存，目前依據不同的法規有不同的規定。下列何者正確？","options":{"A":"依據學生輔導法施行細則，學生輔導資料之保存年限應自學生畢業或離校後保存7年","B":"依據醫療法，醫療機構之病歷，應指定適當場所及人員保管，並應至少保存8年","C":"依據機密檔案管理辦法，個案結案後兩年，可進行諮商紀錄解密","D":"依據心理師法，心理諮商所對於執行業務之紀錄等，應至少保存10年"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":17,"stem":"諮商心理師的下列何項作為，可能會增加法律訴訟的機率？","options":{"A":"將價值觀加諸在個案身上","B":"確實撰寫諮商紀錄","C":"留意個人的語言與行為","D":"建立與維持適當的界線"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":18,"stem":"關於知後同意，下列敘述何者錯誤？","options":{"A":"內容必須將個案與諮商心理師的權利與義務同時用口語說明與書面資料的方式呈現","B":"諮商心理師必須與個案討論諮商的益處與風險，還有諮商帶來的間接影響","C":"諮商心理師通知個案其在諮商中的權利與義務，即是充分進行知後同意","D":"在諮商歷程中隨時都可能需要進行知後同意"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":19,"stem":"依據心理師法第8條規定，諮商心理師執業應接受繼續教育，並每6年提出完成繼續教育證明文件，辦理執業執照更新，此項規定呼應下列那一個倫理準則的精神？","options":{"A":"忠誠權","B":"公正權","C":"自主權","D":"免受傷害權"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":20,"stem":"諮商心理師為有外遇議題的夫妻進行諮商，諮商過程當中太太堅決否認自己外遇，而先生也擔心過度猜忌可能為其婚姻帶來負面影響。然，在一次非正式與太太的聊天中，太太向諮商心理師坦承自己有外遇的事實。有關諮商心理師的處理，下列何者最為適當？","options":{"A":"為避免隱瞞而產生的動力影響，在伴侶諮商中主動邀請太太表達","B":"徵求太太的同意後，約先生個別討論該狀況，協助其緩解心理衝擊","C":"與太太討論此隱瞞對親密關係以及諮商關係的影響，並說明保密的限制，鼓勵太太主動表達","D":"基於保護太太的隱私，以及先生可能的受傷，選擇保密"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":21,"stem":"明城目前就讀國中八年級，有嚴重的拒學行為，母親帶著明城到醫院接受如君的心理諮商。明城的母親與學校輔導老師聯繫如君，希望他出席學校的個案會議，解釋明城的狀況。此時如君的做法何者最適當？","options":{"A":"考量涉及明城的隱私，事先與明城與母親討論可揭露的事宜，再行出席","B":"直接與學校輔導老師聯繫，瞭解會議目的，直接在電話中說明與解釋","C":"在醫院進行諮商與學校非從屬關係，避免專業關係的混淆，婉拒出席","D":"提供明城的諮商報告，內容呈現專業評估與相關診斷，讓母親帶至學校"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":22,"stem":"臺灣已是高齡化社會，104年公布長期照顧服務法，以下相關敘述何者錯誤？","options":{"A":"長期照顧服務中央主管機關單位為衛生福利部長期照顧司","B":"家庭照顧者支持服務提供項目之一為「喘息服務」，是指提供給家庭照顧者之心理協談，讓家庭照顧者可以休息","C":"政府於106年起推動長期照顧十年計劃2.0，服務對象包括65歲以上失能老人、55歲以上失能原住民、50歲以上失智症者及任何年齡的失能身心障礙者","D":"長照服務人員為經長期照顧服務法所定之訓練、認證，領有證明得提供長照服務之人員，諮商心理師若欲提供長照服務，須先接受長照相關訓練"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":23,"stem":"關於職場健康心理學，下列敘述何者錯誤？","options":{"A":"藉由三級預防的概念，提升工作生活品質，以促進工作者的安全、健康與幸福","B":"初級預防主要是找出並降低個人與組織的健康風險","C":"次級預防主要是發展工作中的社會支持、提供組織和個別壓力管理","D":"三級預防主要是提供員工福利措施，降低工作流動率"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":24,"stem":"根據性別平等教育法規定，發生疑似性平案件，被害人可向學校或所屬主管機關申請調查，至遲不得超過多少時間？","options":{"A":"24小時","B":"36小時","C":"10年","D":"無時效限制"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":25,"stem":"一個具備多元文化與社會正義的諮商心理師，下列敘述何者最不適當？","options":{"A":"肯認自己與境外生之間的文化差異，著墨兩人之間文化的交織性","B":"針對弱勢族群的諮商服務，提供彈性的收費標準","C":"個案無法認同同志族群時，挑戰個案的價值觀，促進其了解對他人所產生的壓迫","D":"提供新住民諮商時，適時進行心理健康教育，協助了解諮商的目的與歷程"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":26,"stem":"以Super（1990）之生涯發展論來看55歲的男性當事人，下列何者不是其生涯發展的重點與任務之一？","options":{"A":"發展對工作世界的正確態度","B":"維持現有的成就與地位","C":"接受自身條件的限制","D":"發展新的技巧以面對新進之挑戰及轉型所需"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":27,"stem":"DeFillippi和Arthur（1996）提出在組織內累積生涯資本的三種個人能力類型，不包括下列何者？","options":{"A":"知道為何（knowing-why）","B":"知道如何（knowing-how）","C":"知道是什麼（knowing-what）","D":"知道是誰（knowing-whom）"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":28,"stem":"某航空公司規定空服員身高至少158公分以上，而小惠身高不足，無法當空服員。從 Mitchell 及Krumboltz（1979）的社會學習理論觀點，影響個案是否能成為空服員的可能因素為下列何者？","options":{"A":"任務取向的技能","B":"學習經驗","C":"遺傳及特殊能力","D":"環境情境及重要事件"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":29,"stem":"當校內有兒童自殺時，諮商心理師針對自殺兒童的同儕或手足進行危機介入，下列危機介入策略何者較不適當？","options":{"A":"在公共的空間一起閱讀遺書","B":"建議保留專注於「哀悼失落」的固定時間","C":"專注於當下而不是過去或未來","D":"分享與逝者最後一次接觸的一些回憶"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":30,"stem":"與被伴侶毆打的個案討論安全計畫時，下列諮商心理師的詢問何者最適當？","options":{"A":"你有注意到是因為你對伴侶說了什麼嗎？","B":"當你處在危險情境時可以先向誰求助？","C":"你想想可以如何改變讓伴侶不再打你？","D":"伴侶打你之前應該都有喝酒或警告你，對嗎？"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":31,"stem":"13歲的志航在晤談當中，提及假日與成年男網友出去時被強迫發生性行為，諮商心理師告訴志航此狀況無法進行保密，因此須通報。志航拒絕且激動地表示：「你只是為了你的通報責任，根本就沒顧慮通報後我的處境！」諮商心理師的下列作法何者最不適當？","options":{"A":"說明通報不只是為了法規規定，澄清是為了保護個案的權益與避免他人受害","B":"確認通報後無法帶來實質的幫助，取得其承諾後再做通報","C":"同理個案對於通報後的擔心與害怕，與其討論通報後的可能處境與因應","D":"先同理個案憤怒與激動的情緒，等到個案冷靜後再進行通報討論"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":32,"stem":"關於災難危機介入的原則，下列敘述何者錯誤？","options":{"A":"強調快速且立即的介入","B":"深化關係應為最優先考量","C":"有時需要對個案下達指令","D":"評估貫穿整個介入策略"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":33,"stem":"一名喪妻的男性個案在諮商中提到，忙完喪事後並沒有太大的感觸，由於日子還是要正常過下去，想給孩子更好的生活品質，於是花更多時間工作，其他家屬接手協助照顧孩子，自己大概三週左右回家陪孩子吃一次飯或帶他們出去玩。諮商心理師該如何評估個案的哀傷議題？","options":{"A":"個案能夠開始思考日子要正常過下去是一件好事，代表已開始展望未來","B":"考量喪事已經辦完，評估個案哀傷歷程已走到後期，沒有太大的感觸是正常狀態","C":"評估個案可能想逃避喪妻的事實，諮商心理師需要明確指出並邀請個案練習增加和孩子相處的時間","D":"需要考量性別文化對於男性表達哀傷的影響，並理解男性個案採取行動來因應失落所帶來的變化"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":34,"stem":"經由社工轉介而來小學二年級的個案，被母親毆打成傷，個案諮商時卻不願談論此事。下列諮商心理師的反應，何者最適當？","options":{"A":"處理個案對母親的恐懼","B":"先重新評估個案被虐之事是否為真","C":"先從個案願意討論的議題開始","D":"先由轉介之社工或老師處理，確認是否發生兒虐事件"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":35,"stem":"關於被虐兒童諮商歷程，下列敘述何者最不適當？","options":{"A":"縱使諮商心理師相當溫暖與支持，兒童可能仍無法說出被虐時的痛苦情緒","B":"兒童與諮商心理師的關係常會呈現振盪的現象，有時信任，有時又遠離","C":"兒童開始能覺察並表達情緒，可促進其情緒的流動與修復","D":"兒童無法說出個人的負向情緒，主要原因是信任諮商關係未建構完全"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":36,"stem":"依據 Bronfenbrenner（1977）之人類生態發展模式來協助青少年時，下列敘述何者錯誤？","options":{"A":"青少年的微觀系統（microsystem）是相互關聯的，發生在學校的事情對個人會造成很大的影響","B":"與微觀系統連結的社會環境，是個人生存的正式或非正式社會結構，屬於中層系統（mesosystem）","C":"人類生態發展系統之第四系統為鉅觀系統（macrosystem），包含文化價值、信念、歷史事件等，都可能影響其他生態系統","D":"青少年的發展與問題需要放在真實情境，即生態下去思考"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":37,"stem":"諮商心理師最近接受機構指派一位25歲的個案小華，他被診斷為輕度智能發展障礙，請問諮商心理師的作法下列何者最不適當？","options":{"A":"邀請小華的法定代理人與小華一同進行知後同意的說明","B":"諮詢特教專家的意見，進一步評估小華的能力","C":"因為諮商過程仰賴認知能力，小華一定無法理解對話，為顧及小華的福祉，向機構反映無法進行諮商","D":"做每一個決策時，都要謹慎評估讓小華可以參與其中"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":38,"stem":"一般而言，即將退休的資深員工，在多元生涯路徑模式通常屬於那一種類型？","options":{"A":"晚期高峰型（late-peaking pattern）","B":"多重波段型（multichannel pattern）","C":"曇花一現型（temporary advancement pattern）","D":"老驥伏櫪型（phased retirement）"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":39,"stem":"衛生福利部於110年9月27日修訂完成之「高齡社會白皮書」，揭示自主、自立、共融及永續四大願景，下列何者不是具體實施之目標？","options":{"A":"促進世代和諧共融","B":"增進高齡者健康與自主","C":"擴展高齡者持續進修機會","D":"提升高齡者社會連結"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":40,"stem":"當高齡個案將諮商心理師視為其子女或家人般的關切、分享秘密時，諮商心理師的作法下列何者最適當？","options":{"A":"利用此信任關係統整個案之心理經驗","B":"面質個案是否常如此與年輕人建立關係","C":"詢問個案還向那些人分享了秘密","D":"運用立即性技巧澄清個案的心理期待"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null}]});

window.__EXAM_LOAD({"id":"114_4","year":114,"subjectIndex":4,"subject":"心理健康與變態心理學","essays":[{"num":1,"text":"人類生活中無法避免遭遇到心理衝突。心理學家將心理衝突分為三種型式，試分別舉例說明其意\n涵；並提出至少四項化解衝突的策略。（25分）","points":25,"reference":null,"rubric":null},{"num":2,"text":"憂鬱症在成年期相當普遍，但兒童／青少年期的憂鬱症也不容忽視。請針對兒童／青少年期憂鬱症\n與成人憂鬱症的臨床症狀，試比較二者的相同及相異之處。（25分）","points":25,"reference":null,"rubric":null}],"mc":[{"num":1,"stem":"下列有關Super生涯發展論的階段描述，何者錯誤？","options":{"A":"建立期是15～24歲，特性為選擇範圍縮小，尚未做決定","B":"成長期是出生～15歲，特性為發展態度、能力、興趣、需求","C":"衰退期是65歲以後，特性為退休前考慮，工作輸出，最後退休","D":"維持期是45～65歲，特性為調適過程，維持工作地位、情境"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":2,"stem":"大中是家中長子，父親早逝，他身兼父職，常常需要犧牲課業與興趣，照顧母親與弟妹。大中最可能因為下列何種現象而出現身心困擾？","options":{"A":"性別角色衝突（gender role conflict）","B":"角色累積（role accumulation）","C":"角色過度負荷（role overload）","D":"角色模糊（role ambiguity）"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":3,"stem":"家庭的功能之一是要幫助家庭成員自我分化（differentiation of self），根據此理念，下列何者錯誤？","options":{"A":"幫助家庭成員建立清楚的自我界線","B":"接納家人的不同期待，但也保有自己的獨特需求","C":"滿足做自己的需求，不被家人影響","D":"太僵化或黏密的家庭關係，較不利於家庭成員自我分化"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":4,"stem":"「喜歡獨立自主，不願意相信別人，避免情感上過度依賴而受到傷害」，根據Bartholomew等人研究，這是屬於下列何種愛情依附風格？","options":{"A":"安全型（secure）","B":"恐懼型（fearful）","C":"過分投入型（preoccupied）","D":"排拒型（dismissing）"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":5,"stem":"關於A型人格（或稱A型行為模式；Type A behavior pattern）與心血管疾病的關聯性，下列何者錯誤？","options":{"A":"A型人格四大特徵並非每一項特徵都對心血管問題的惡化扮演同等重要的角色","B":"表達生氣的方式對惡化心血管問題占重要地位，但壓抑生氣亦具有毒性（toxic）","C":"由負向情感與自我壓抑或屈從所組成的B型人格也在惡化心血管問題上扮演重要角色","D":"A型人格與B型人格沒有共通點"},"answer":"C","accept":["C","D"],"giveAll":false,"note":"第5題答Ｃ或Ｄ或CD者均給分","explanation":null},{"num":6,"stem":"睡眠對適應負荷（allostatic load）的影響最能說明影響適應負荷的那個因素？","options":{"A":"暴露總量（amount of exposure）","B":"反應性大小（magnitude of reactivity）","C":"恢復速率（rate of recovery）","D":"資源回復（resource restoration）"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":7,"stem":"下列何者不屬於HPA軸？","options":{"A":"海馬迴","B":"腎上腺","C":"腦下垂體","D":"下視丘"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":8,"stem":"關於疼痛（pain）的敘述，下列何者正確？","options":{"A":"痛覺訊息傳遞到脊髓，進而傳遞到大腦，由杏仁核（amygdala）接收訊息","B":"任何疼痛都可找到生理上的原因","C":"身體疼痛與社會拒絕造成的「心痛」，在腦部的激發位置很類似","D":"大腦是疼痛的控制閘門，可調節疼痛的程度"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":9,"stem":"相對於男性，女性面對壓力時的反應，下列何者正確？","options":{"A":"有較多戰和逃的反應","B":"壓力生理反應較大","C":"要花比較久的時間，讓壓力生理反應回復到基準期","D":"有較多親和與友善的反應以維持親近的社會連結"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":10,"stem":"以生理指標評估個體的壓力程度，通常會採集其血液、尿液或口水，檢驗腎上腺在壓力下所分泌的賀爾蒙濃度，其測量的指標，不包括下列何者？","options":{"A":"皮質醇（cortisol）","B":"腎上腺素（epinephrine）","C":"褪黑激素（melatonin）","D":"正腎上腺素（norepinephrine）"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":11,"stem":"關於工作耗竭（job-related burnout），下列敘述何者錯誤？","options":{"A":"工作耗竭多為壓力引發","B":"職場新鮮人最容易面臨此問題","C":"改善職場人際問題是一種防止工作耗竭的方法","D":"了解一個人對工作抱持的期許，有助於了解其是否會面臨工作耗竭"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":12,"stem":"關於自殺防治，下列敘述何者正確？","options":{"A":"自殺防治研究困難度高，結果也顯示效果有限","B":"只有少數自殺者是在衝動下執行的","C":"討論此議題可能導致自殺率提高","D":"服用理思必妥（Risperidone）有助於降低思覺失調症患者自殺企圖"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":13,"stem":"根據Maton與Salem（1995）的研究，發現四項能激勵員工賦權的機構特徵，下列何者錯誤？","options":{"A":"重視缺點之檢討與改善","B":"支持系統以同儕為基礎","C":"主管領導風格具啟發性","D":"鼓勵員工自我成長"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":14,"stem":"職場過勞和機構因素息息相關，下列何者不是可能的機構因素？","options":{"A":"能否參與決策的「控制」因素","B":"個人與機構所追求目標是否一致的「價值」因素","C":"能否具備飲食供給的「環境」因素","D":"是否具有社會性支持的「社群」因素"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":15,"stem":"諮商心理師以青少年犯罪的知識為基礎（例如：家庭系統的可能性影響），在社區進行親職講座，對父母宣導青少年發展之困境，此種作法屬於三級預防中的那個層級？","options":{"A":"初級","B":"二級","C":"三級","D":"非屬於三級預防層級"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":16,"stem":"關於高度工作投入（high job engagement）的特徵，下列何者錯誤？","options":{"A":"能發揮自己的專長與能力","B":"對工作感到滿意與驕傲","C":"工作就是生活的核心","D":"對工作時間太長能勇敢拒絕"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":17,"stem":"關於心理障礙症（psychological disorder）的界定方式，下列敘述何者錯誤？","options":{"A":"正常和異常的心理功能之間界線是清楚的，出現偏離常態的行為，必然代表有心理障礙症","B":"許多人都有輕微的不適反應（例如：看到血，感到噁心），但未必構成心理障礙症","C":"痛苦是每個人生活的一部分，並非所有心理障礙症都會伴隨有痛苦的感受","D":"某些行為在特定文化可能被接受，但在其他文化背景可能被視為心理障礙症"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":18,"stem":"由生物心理社會模式（biopsychosocial model）角度來看糖尿病人的血糖控制，下列何者正確？","options":{"A":"糖尿病是新陳代謝的問題，屬於生理疾病","B":"糖尿病人的血糖容易受壓力與情緒的影響，因此只能由心理層面進行血糖控制","C":"糖尿病人一旦罹病後，調整自我心理狀態、家庭工作與人際的比重以及運動飲食等的生活型態，對血糖控制將有助益","D":"糖尿病人的飲食控制對血糖的影響非常大，一旦罹病就意味著自己無法控制血糖，因此只能由家人幫忙進行飲食控制"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":19,"stem":"關於診斷與評估的信度（reliability）與效度（validity），下列敘述何者正確？","options":{"A":"不穩定或不可靠的測量，仍可以獲得良好的效度","B":"內部一致性信度（internal consistency reliability）是指兩位醫師對心理障礙症診斷的一致性","C":"有高信度的測驗工具，可保證一定有高效度","D":"測驗複本（alternate-form）所獲得的測量分數一致性高，讓心理師在評估工具選擇上有更多的選項"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":20,"stem":"關於診斷的類別（categorical）與向度（dimensional）取向之敘述，下列何者正確？","options":{"A":"類別分類取向可以精確描述出單一個體的獨特性","B":"向度診斷系統描述了症狀的嚴重程度，例如：對憂鬱情緒使用1～10分來做評分","C":"向度診斷系統沒有辦法幫助我們找出亞臨床（subclinical）的個體","D":"類別分類取向在心理障礙症診斷所設定的診斷標準，例如：同時呈現其中的4個症狀才符合某診斷，都具有充分的研究證據支持"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":21,"stem":"有關自閉症類群障礙症（ASD）的基因病理，下列敘述何者錯誤？","options":{"A":"基因相似度的貢獻度最高","B":"共享環境有顯著的貢獻","C":"非共享環境也可解釋ASD的風險","D":"ASD可由特定的單一基因所決定"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":22,"stem":"關於DSM-5-TR中對適應障礙症的描述，下列何者正確？","options":{"A":"為獨立診斷，屬於思覺失調譜系中的一類疾病","B":"是壓力事件發生之後三天到一個月內出現的情緒與行為症狀","C":"是可辨識的壓力事件發生後三個月內出現的顯著情緒或行為症狀，在壓力源停止後症狀未持續超過六個月","D":"壓力等同於創傷，因此許多生活瑣事累積的情緒與行為困擾應視同創傷後壓力症進行治療"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":23,"stem":"下列何者不是DSM-5中性功能障礙（sexual dysfunction）定義的面向？","options":{"A":"性慾","B":"高潮","C":"疼痛","D":"對象"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":24,"stem":"有關思覺失調症的描述，下列何者錯誤？","options":{"A":"終生盛行率約為3％","B":"遺傳傾向明顯","C":"男性個案的預後較差","D":"女性平均好發年齡較晚"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":25,"stem":"雨辰對飲食失去了控制，她經常會狼吞虎嚥地吃下大量的高油高鈉餐點，經常在30分鐘內就攝取熱量超過2,000卡路里以上。這導致雨辰的體重持續迅速增加，BMI達30以上。下列何者最符合雨辰的診斷？","options":{"A":"暴食症（bulimia nervosa）","B":"厭食症（anorexia nervosa）","C":"嗜食症（binge eating disorder）","D":"過重（overweight）"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":26,"stem":"對於廣泛性焦慮症（generalized anxiety disorder, GAD）的敘述，下列何者正確？","options":{"A":"GAD的症狀以擔憂為主，鮮少出現生理相關症狀（例如疲倦、肌肉緊繃）","B":"個案須持續經驗過度、無法控制的擔憂至少三個月以上才能診斷為GAD","C":"認知觀點認為GAD個案可能是利用擔憂來迴避更為強烈的負向情緒","D":"GAD一旦慢性化之後，就不會再對重要生活領域造成干擾"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":27,"stem":"關於思覺失調型人格障礙症（schizotypal personality disorder），下列敘述何者正確？","options":{"A":"不會經歷任何精神病性發作（psychotic episodes）","B":"有過度的社交焦慮，且社交焦慮程度不會因熟悉而減少","C":"多數會逐漸發展成思覺失調症","D":"最主要的症狀是妄想"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":28,"stem":"根據DSM-5，畏避型人格障礙症（avoidant personality disorder）的行為描述及診斷準則，下列何者最正確？","options":{"A":"雖然渴望感情，但因害怕他人拒絕，因而逃避與他人接觸","B":"要求完美，極端重視次序維持","C":"常見的共病為妄想型人格障礙症（paranoid personality disorder）","D":"日本文化出現「對人畏懼症（taijin kyoufusho）」是指對人恐懼，症狀表現等同於DSM-5的畏避型人格障礙症"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":29,"stem":"關於強迫症的敘述，下列何者錯誤？","options":{"A":"強迫症可能在十歲之前發病","B":"強迫症個案通常沒有病識感","C":"大多數的強迫症症狀都是慢性化的","D":"強迫症個案往往難以做決定"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":30,"stem":"關於莫瑞爾雙因素模式（Mowrer's two-factor model）對焦慮症發展歷程的敘述，下列何者正確？","options":{"A":"古典制約歷程可解釋害怕或焦慮如何形成","B":"古典制約形成的關鍵在於制約刺激與制約反應的連結","C":"操作制約可說明那些中性刺激會引發焦慮","D":"操作制約說明迴避行為增強害怕或焦慮反應"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":31,"stem":"關於飲食障礙症病因的敘述，下列何者正確？","options":{"A":"雙生子研究發現，遺傳可解釋暴食症60％的變異量","B":"厭食症與暴食症個案體內血清素代謝物的含量偏低","C":"厭食症個案看到食物時腦部背紋狀體區的GABA活動增加","D":"飲食障礙症女性個案的DRD2多巴胺基因之表現過多"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":32,"stem":"王小姐在被診斷出罹患第一期乳癌後便寢食難安、憂心病情惡化以及治療的副作用，甚至失去與朋友來往的動力，也不再做家事。依據DSM-5，王小姐最符合的診斷是下列何者？","options":{"A":"創傷後壓力症","B":"焦慮症","C":"社交焦慮症","D":"適應障礙症"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":33,"stem":"注意力不足／過動症治療中，設計最好的隨機控制臨床研究為多模式治療（MTA），進行14個月的研究，比較標準社區照顧、單獨藥物治療、藥物治療加父母及教師密集行為治療、單獨行為治療四種治療方式。下列針對多模式治療的敘述何者錯誤？","options":{"A":"單獨接受藥物治療的兒童比單獨接受行為治療的兒童有更多的注意力不足／過動症症狀","B":"接受合併治療的效果稍微優於單獨藥物治療","C":"合併治療比單獨藥物治療更能改變社交技巧功能","D":"單獨藥物治療和合併治療優於社區照顧"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":34,"stem":"關於認知障礙症家屬的描述，下列何者最正確？","options":{"A":"家屬通常對於個案不甚關心","B":"家屬罹患憂鬱症的機率高","C":"家屬通常能夠得心應手地照顧個案","D":"家屬很少有睡眠困擾"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":35,"stem":"針對罹病焦慮症（illness anxiety disorder）的認知行為治療，下列何者敘述正確？","options":{"A":"引導個案專注於身體的某些部分來創造症狀，容易讓個案產生失控感受","B":"針對罹病的焦慮，教導個案要尋求醫師提供足夠的保證","C":"讓個案反覆接觸與健康相關的材料，例如：疾病衛教片，同時需配合有讓其安心的保證，才能減少對疾病的焦慮症狀","D":"認知行為治療著重在辨別和挑戰個案對身體感覺的錯誤解釋"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":36,"stem":"暴露及反應防止法（exposure and response prevention, ERP）最不適用下列何種心理障礙症？","options":{"A":"轉化症","B":"身體臆形症","C":"儲物症","D":"強迫症"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":37,"stem":"對於菸癮的治療模式，下列敘述何者錯誤？","options":{"A":"尼古丁貼片的療效較安慰劑貼片好","B":"立即性戒斷法比逐漸性戒斷法有效","C":"尼古丁替代法（例如口香糖）可以逐漸替代對於抽菸的渴望","D":"尼古丁替代法結合心理治療，比起只採替代療法更有效"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":38,"stem":"下列何種生活型態，最不建議用來減緩認知退化的發生或降低認知障礙症風險？","options":{"A":"從事社交活動","B":"從事需要智力的活動","C":"增加運動的介入","D":"服用抗精神病藥物"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":39,"stem":"關於有效改善身體症狀障礙症的疼痛症狀，下列何種治療法最不適當？","options":{"A":"接受與承諾治療","B":"認知行為治療","C":"催眠","D":"高劑量的抗憂鬱劑"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":40,"stem":"關於身體臆形症（body dysmorphic disorder, BDD）的介入，下列敘述何者正確？","options":{"A":"治療方式和強迫症有明顯不同","B":"認知行為治療療效不如純藥物治療","C":"藥物治療最常使用抗憂鬱劑","D":"BDD鮮少和社交焦慮症（social phobia）共病，故社交焦慮症的治療方式無參考價值"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null}]});

window.__EXAM_LOAD({"id":"114_5","year":114,"subjectIndex":5,"subject":"個案評估與心理衡鑑","essays":[{"num":1,"text":"心理諮商中，初談的目的為何？初談包括那些重要內容？（20分）","points":20,"reference":null,"rubric":null},{"num":2,"text":"晤談法、心理測驗與行為觀察法是進行個案評估時常見的三種心理衡鑑方法，使用這三種方法的主\n要目的是想暸解個案那方面的資訊？請分別說明這三種方法在實施之前、實施過程中、以及實施結\n束後的工作要點有那些？（30分）","points":30,"reference":null,"rubric":null}],"mc":[{"num":1,"stem":"社會適應表現檢核表上的智能障礙學生組常模為下列那一類常模？","options":{"A":"特殊團體常模","B":"鑑定常模","C":"地區常模","D":"分級常模"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":2,"stem":"下列何種測驗最易受社會期望（social desirability）的影響？","options":{"A":"成就測驗","B":"性向測驗","C":"自陳測驗","D":"投射測驗"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":3,"stem":"關於效標參照的心理測驗，下列敘述何者正確？","options":{"A":"較不適用於教育情境","B":"可用來評量個案的進步狀況","C":"重點在了解個案在團體中的表現","D":"無法提供切截分數的相關資訊"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":4,"stem":"某企業主管有鑑於社會自殺事件頻傳，擬邀請諮商心理師協助防治工作，諮商心理師以心理測驗作為篩檢工具，對員工進行施測，主要可達到心理測驗的那一項功能？","options":{"A":"評估","B":"預測","C":"診斷","D":"治療"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":5,"stem":"某位個案在初步會談中對諮商心理師表示：「你不覺得我的前男友非常過分嗎？他竟然會因為我的外貌，就決定要分手？」若以Brickman等人的理論來評估，個案對進行諮商的準備度和期待，最可能屬於下列那一種模式？","options":{"A":"道德模式（moral model）：對自己的問題負責，也為解決問題的方法負責","B":"補償模式（compensatory model）：不會對自己的問題負責，認為應該由情境來負責","C":"啟蒙模式（enlightenment model）：對自己的問題負責，但不能為問題的解法方式負責","D":"醫學模式（medical model）：既不能對問題且不能對解決方法負責"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":6,"stem":"從自殺線索和危機程度評估個案的自殺風險時，下列敘述何者最正確？","options":{"A":"個案說了很多次「死了事情就解決了、解脫了」，「死」已成為他的口頭禪，他不會有自殺危機","B":"個案說：「我不知道活著有什麼用，但只要想到我死亡，我爸媽他們心理上會很難過，還要面對親友的眼光」，個案尚有牽絆，自殺風險相對較低","C":"個案說：「我離開了，小黑（小狗）就沒人照顧了，我把牠送人了；我也把籃球送給我好朋友了」，個案可能想出去散心，不用擔心","D":"有過自殺經驗的個案，他是以自我傷害來得到關注，會再自我傷害，但危及生命的機率不大，可以不用做自殺評估"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":7,"stem":"在評估個案的主觀性痛苦時，下列敘述何者錯誤？","options":{"A":"監控個案主觀性痛苦程度的最好方式之一 window.__EXAM_LOAD({"id":"114_6","year":114,"subjectIndex":6,"subject":"團體諮商與心理治療","essays":[{"num":1,"text":"某高中在某日中午午休時間發生學生跳樓事件，當天放學時傳來該生已不幸身亡。當天晚上你被邀\n請針對前述事件設計一個減壓（debriefing）團體，請回答下列問題：\n（一） 減壓團體進行的時間長度、次數及進行時機為何？（5分）\n（二） 挑選團體成員的原則為何？（5分）\n（三） 團體目標及方案所需包含的重點為何？（15分）","points":25,"reference":null,"rubric":null},{"num":2,"text":"請簡要說明當團體成員發生那些問題時，領導者應協助其退出團體？並請舉例詳細說明協助成員的\n策略。（25分）","points":25,"reference":null,"rubric":null}],"mc":[{"num":1,"stem":"有關酗酒者匿名團體過程的陳述，下列何者最適當？","options":{"A":"這種團體因為同質性高，所以可以感同身受的幫助到每一個成員","B":"這種團體是一種積極、創造性、多感官與理論導向的治療方式","C":"此種領導模式通常是以影響治療（impact therapy）為理論基礎","D":"這種團體通常沒有常置的專業團體領導者，但能運用特定步驟完成團體流程"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":2,"stem":"關於在日照中心帶領開放式團體（open groups）的敘述，下列何者最合適？","options":{"A":"當新成員進入團體時，不需再次說明團體規則，他們從和舊成員的互動中自然就會理解","B":"由於成員時常進出，很難產生團體凝聚力，故領導者不需催化其凝聚力","C":"因為是開放式團體，成員連續或無理由缺席是被允許的","D":"領導者可能需要主動組織團體，拜訪某些成員，以及支持成員參與"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":3,"stem":"下列那一項敘述屬於諮商團體（counseling group）的特性？","options":{"A":"團體主要的工作是修通過去經驗及對阻抗的處理","B":"參與團體的人通常主要是想減輕特定的心理症狀或困擾","C":"著重於協助團體成員在認知、態度或行為技巧上的學習和發展","D":"團體著重於意識層面的覺察與問題解決的策略"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":4,"stem":"下列那一種溝通技巧最能促進諮商團體成員之間的開放對話和信任？","options":{"A":"鼓勵成員分享個人故事和經歷，以促進共同理解和支持","B":"打斷成員發言，糾正任何誤解或不準確之處","C":"示範並引導對話，讓所有成員都聚焦在團體主題上","D":"提醒成員遵守專注聆聽他人發言的團體規範"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":5,"stem":"下列關於催化團體歷程的方法，何者不適當？","options":{"A":"領導者應多運用聚焦技術，以利團體在早期能很快進入工作階段","B":"領導者應協助成員學習開放地表達他們對於團體的擔心與期望","C":"領導者應鼓勵成員們直接相互對話，創造溝通的機會","D":"領導者應鼓勵成員公開地表達矛盾與衝突，克服溝通障礙"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":6,"stem":"當一個團體的凝聚力過高，可能會出現下列那種現象？","options":{"A":"提升成員的獨立思考能力","B":"促進更深層次的個人探索","C":"不易有個人情感與想法的表達","D":"增加團體內不滿的氛圍與壓力"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":7,"stem":" 試與被投射性認同所引發的感覺共處一段時間","B":"等適當時機，向該成員解釋此潛意識幻想的本質、動機、脈絡與防衛的功能","C":"辨識出投射性認同裡實際與幻想的成分，直接面質幻想成分有助於卸除其防衛","D":"尋求督導者的協助，在確認其懷疑為真時，提升自己處理此投射性認同的能力"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":16,"stem":"小美與小芬共同帶領一個諮商團體，第三次聚會由小美擔任主要領導者，小芬為協同領導者。下列那一項協同帶領團體的行為最適當？","options":{"A":"小美做了歷程評論，小芬覺得小美少說了一個環節，習慣性地在她之後補充自己的評論","B":"成員小志提到他的人際問題，小美聚焦在小志身上，小芬會關注其他成員","C":"進行繞圈活動時小芬領頭分享，小美對團體說明小芬分享的重點，小芬接著說明這些分享主要來自於那些觀察，之後小美邀請其他成員接續分享","D":"小美看到成員小凱快睡著了，詢問小凱是否狀況不佳。小芬發現正在討論的主題被打斷後，因此接著詢問：「大家想要討論原來的主題或是先關心小凱狀況？」"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":17,"stem":"關於次團體的敘述，下列何者最不適當？","options":{"A":"只要主團體的目標沒有被放棄，任何團體外的接觸都可能有其價值","B":"次團體本身不會破壞團體，而是伴隨次團體的沉默共謀破壞了團體","C":"若次團體的目標與主團體的目標一致，次團體可能將提升團體的凝聚力","D":"當成員要求對其在次團體中的資訊保密時，領導者可承諾保密"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":18,"stem":"團體的沉默對於領導者來說，一方面充滿挑戰，另一方面也提供領導者豐富的團體訊息，領導者需要考量多元面向，再決定如何介入，以下那些思考面向較為適切？①考量此時團體的沉默對於團體的進展具有助益性或破壞性 ②領導者的強勢風格是團體沉默的主要原因 ③領導者邀請團體停下來討論剛剛的沉默是發生了什麼事 ④調整領導者的指導語與催化能力，讓成員都能夠清楚明瞭⑤團體的沉默與成員的逃避或退縮行為沒有關聯，大多是領導者的因素占大多數","options":{"A":"①②③","B":"②③④","C":"①③④","D":"①③⑤"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":19,"stem":"說話常滔滔不絕的阿國又佔據團體大部分時間，部分成員開始出現不耐煩的反應、有的成員減少與阿國的目光對視、有的成員開始放空，有幾位成員開始頻繁交頭接耳，領導者發現團體歷程出現停滯狀態。領導者採取下列那項介入較無法發揮效能？","options":{"A":"兼顧阿國的特殊需求與團體狀況、團體任務等面向，可採取設限與積極規約介入","B":"考量阿國的表達需求而衍生的成員人際反應，適切處理成員間的人際互動關係和團體次系統的狀態","C":"從團體歷程發展的角度切入，促進成員覺察與調整自身所展現的人際互動模式","D":"顧及阿國感受，於團體結束後以個別方式詢問他對於剛才團體人際互動模式的觀察與發現"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":20,"stem":"面對成員在團體中出現的衝突，下列敘述何者正確？","options":{"A":"團體中期衝突的產生，和成員對領導者不切實際的期待感到失望有關","B":"團體衝突會干擾團體的進行，是團體發展歷程的危機並非轉機","C":"領導者處理團體衝突時，需考量歷程導向並以多面向兼顧的方式因應","D":"當成員選擇克制且重視人際和諧，才有助於團體凝聚力的產生"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":21,"stem":"社區婦女成長團體的首次聚會，好幾位成員姍姍來遲。在訂定團體規範時，領導者特別聚焦於準時出席的討論，所有成員皆同意。第二次團體仍有三位成員遲到。下列領導者的作法，何者最不適當？","options":{"A":"告訴成員開始時間已經到了，不再等待遲到的成員，開始進行團體活動","B":"當遲到的成員出現時，領導者隨即暫停團體，請該成員坐下並詢問其遲到的緣由","C":"當遲到的成員來團體後，領導者可趁活動空檔，告知遲到的成員剛才團體的過程","D":"領導者在團體結束前，再次討論團體規範，並詢問成員有無改善遲到的好方法"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":22,"stem":"小明被導師轉介參加學校的諮商團體，第一次聚會時，他對領導者說：「我在這裡很無聊，我希望您可以做些什麼來讓團體變得更有趣。」下列領導者的回答，何者最適當？","options":{"A":"活動還沒有開始，你會無聊，這是正常的","B":"多告訴我一點你想要我怎麼做","C":"你老是給別人意見，我希望你能將焦點放在自己身上","D":"聽你這樣說，我覺得很難過"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":23,"stem":"諮商心理師帶領大學生團體時，A成員的導師來信詢問A成員的狀況，並告知已取得學生同意，可詢問諮商心理師其參加團體的情形。此時諮商心理師應如何處理最適當？","options":{"A":"直接告訴導師，A成員參與團體的情形，並請導師協助留意學生在班上的情形","B":"了解導師的需求及目的後，決定要告訴導師多少內容","C":"與學校的督導或主任討論後，再決定是否告知導師A成員的參與情形","D":"與A成員討論資訊是否揭露，再決定是否告知導師或告知的範圍"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":24,"stem":"下列那些情況，領導者適合使用切斷（cutting off）技巧？①成員的意見與團體目標牴觸 ②領導者決定轉移團體的焦點 ③團體中有成員心不在焉 ④成員在漫談，領導者希望該成員可以澄清問題","options":{"A":"①②④","B":"②③④","C":"①③④","D":"①②③"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":25,"stem":"下列針對各團體發展階段的特徵描述，何者最適當？","options":{"A":"在初始階段，成員相識，互相了解，建立信任，會多試探領導者","B":"在工作階段，成員開始試探性的自我揭露，面對衝突能主動協調","C":"在轉換階段，團體會有信任與否的議題產生，人際互動有更多的連結","D":"在結束階段，成員對自己的改變有統整性的描述，彼此會避免衝突和不一致"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":26,"stem":"下列那一項治療因素，最有助於團體成員個人生命意義感的提升？","options":{"A":"希望感","B":"團體凝聚力","C":"普同感","D":"利他主義"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":27,"stem":"依據Yalom的觀點，關於聯合治療（conjoint therapy）與混合治療（combined therapy）的敘述，下列何者最正確？①特殊個案如人格問題、嚴重創傷，常需要採取聯合治療或混合治療 ②不論聯合治療或混合治療，皆以團體治療為主要模式，個別治療為補充模式 ③混合治療的模式，若要有輕重緩急之分，是以個別治療先於團體治療 ④不論是聯合治療或混合治療，皆有助於降低團體的流失率 ⑤聯合治療比起混合治療更需要處理在個別治療與團體治療所延伸的界線議題","options":{"A":"①②④","B":"①③④","C":"②③⑤","D":"③④⑤"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":28,"stem":"關於阿德勒學派在學校團體諮商的概念與應用的敘述，下列何者最適當？","options":{"A":"阿德勒學派重視意識、目標與動機，涵蓋內容廣泛，宜採用長期團體進行","B":"社會興趣的概念對學校團體諮商不太有意義，增進兒童與青少年的自尊更為重要","C":"認為在團體中成員的不禮貌行為，可能是在追求某些錯誤目標，如追求權力或尋求注意","D":"藉由在團體中重新檢視他人的態度、信念與價值，使其在關注自我與他人尊重間獲得平衡"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":29,"stem":"在團體諮商理論中強調理解成員的主觀世界，並尋找可為成員帶來改變的現有資源，是下列何種取向？","options":{"A":"心理動力","B":"經驗與關係","C":"認知行為","D":"後現代"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":30,"stem":"人本主義取向和認知行為取向在團體諮商工作中都是廣泛使用的理論，以下敘述何者錯誤？","options":{"A":"兩者都致力於幫助成員促進個人的成長和改變","B":"兩者都強調成員之間的互動是團體重要的部分","C":"人本主義取向的領導者扮演「導師」和「教導者」的角色；認知行為取向的領導者則扮演「陪伴者」和「促進者」的角色","D":"人本主義取向認為團體動力的核心是成員之間的關係與情感；認知行為取向則視團體動力為達成治療目標的工具，藉由互動來促成改變"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":31,"stem":"針對某團體成員甲表達出對於另一成員乙莫名的敵意時，領導者邀請甲說說乙給他的感覺像是他所熟悉的那個人。這是那一理論取向的領導者較常使用的探索技巧？","options":{"A":"認知行為治療","B":"心理動力取向","C":"人本存在取向","D":"後現代取向"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":32,"stem":"在團體內，成員甲幾乎沒有回應過其他成員的談話內容，但在團體沉默時就開始談論他在團體外的成就，例如：「這個星期股票又賺了多少錢。」下列何者是個人中心學派的領導者，最不可能的反應？","options":{"A":"仔細觀察甲說話時，其他成員的表情，但不做任何介入","B":"邀請甲多分享一點炒股秘訣，以協助甲與其他成員的互動","C":"鼓勵成員表達當甲說這些事情時，自己的真實感受與想法","D":"反映甲僅陳述外在世界的經驗，邀請其分享對團體的信任與安全感"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":33,"stem":"Flowers（1999）主張，團體第一次聚會前，先請成員在小卡片寫下來參加團體想要處理的問題，以利於首次聚會，減少過長沉默的窘境。這是何種理論取向最可能的作法？","options":{"A":"認知行為治療","B":"敘事治療","C":"個人中心治療","D":"完形治療"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":34,"stem":"下列關於規劃和設計伴侶諮商團體的敘述，何者最適當？","options":{"A":"篩選面談應個別進行了解其需求，避免因雙方一起會談造成個人無法充分表達的問題","B":"可以設計活動幫助成員檢視其妨礙親密的心理遊戲以及探索影響愛情價值觀的童年經驗","C":"最好不要超過六對伴侶，才有足夠時間讓成員分享","D":"若伴侶其中一方不願意承諾為彼此關係而努力，可鼓勵其參與團體來展現對伴侶的重視"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":35,"stem":"諮商心理師在某大學帶領實體人際關係團體，在進行到第三次的時候，成員A表示因為假期返家來不及回到學校，但又表達想參加的意願，想用視訊的方式參加。下列領導者的做法何者最適切？","options":{"A":"徵詢每一位成員的想法與意見，採多數決，決定A是否以線上參與","B":"肯定A成員的積極參與，但考量到網路的保密性，請A下次聚會再參與","C":"請成員A全程需開設鏡頭與麥克風，且需發言與參與活動","D":"修改團體的方案，搭配目標，以線上能同步進行的活動為優先"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":36,"stem":"關於親密關係暴力倖存者的團體，領導者於團體前需蒐集與評估相關資訊以有效規劃團體，下列描述何者錯誤？①確認倖存者其伴侶或其他家庭成員對倖存者的期待或角色 ②蒐集倖存者曾歷經的暴力樣態與親密關係互動史 ③評估倖存者過去、現在與未來的風險程度 ④了解倖存者的支持系統，如人際、家庭、社政、法政等資源","options":{"A":"①③","B":"②③④","C":"僅②④","D":"僅③④"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":37,"stem":"下列那種作法較不適合運用在兒童團體？","options":{"A":"運用多重感官的媒材，維持兒童的專注力","B":"進行深層的個人議題探索，催化團體效力","C":"切斷成員的漫談，讓其他成員有機會分享","D":"將話題帶回到原來討論的主題，以維持團體進行的方向"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":38,"stem":"關於帶領HIV/AIDS諮商團體的主要焦點，下列何者正確？","options":{"A":"治療性焦點與教育性的內容同等重要","B":"治療性焦點比教育性的內容重要","C":"教育性的內容比治療性焦點重要","D":"AIDS患者與HIV感染者處理的焦點不同"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":39,"stem":"Corey等人（2014）建議領導者在進行哀傷失落團體前，要能自我檢視與覺察，下列描述何者最不適當？","options":{"A":"領導者宜先完全解決曾經遭遇的失落議題，以免造成在團體中情緒的崩潰","B":"領導者個人對於失落哀傷的害怕，可能干擾其對團體相似議題的處理","C":"領導者決定如何面對生命中不可逃避的存在議題，將影響其與個案工作和成長","D":"哀傷、失落經驗易觸動個人最深層的恐懼，領導者若未能覺察自己的經驗，將嚴重影響此議題的處理"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":40,"stem":"關於非行少年家長的強制親職教育團體，下列敘述何者最不適當？","options":{"A":"採用小團體方式進行，較能幫助家長深入討論其個別的需要和困難","B":"團體進行前領導者應該先對家長進行面談與篩選，以提升家長的參與意願","C":"觀護人較了解非行少年家長之特性，由他們帶領此類團體會比諮商心理師更具成效","D":"領導者除了具備相關學經歷之外，最好也熟悉婚姻經營與子女教養議題"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null}]});

  mc: {
    1: { explanation:
`正解 B。動態系統理論(Dynamical Systems Theory,Thelen & Smith)主張動作發展不是被動成熟,而是個體「主動重組」既有已精熟的次能力(如肌力、平衡、知覺),透過不斷探索去組合出與環境互動更有效的新動作型態。
• A 互動理論:泛指先天與環境交互作用,焦點不在動作技能的主動重組。
• C 訊息處理理論:強調編碼、記憶、提取等認知歷程。
• D 社會文化理論(Vygotsky):強調社會互動與文化中介,非動作發展。
【補充】動態系統理論的關鍵詞:自我組織(self-organization)、軟組裝(soft assembly)、探索與選擇。` },
    2: { explanation:
`正解 A。「共同注意(joint attention)」約在嬰兒 9–12 個月出現,是最早與語用發展相關的能力(能與他人共享注意焦點,為日後溝通奠基)。
• B 錯:學齡前幼兒其實已會基本的輪流發言(turn-taking)。
• C 錯:幼兒會依對話者觀點調整語言內容(具初步心智理論)。
• D 錯:幼兒會依社會期許調整說話方式(如對小小孩用較簡單語句)。
【補充】語用(pragmatics)=語言的社會使用規則,包含輪流、修補、依情境/對象調整。` },
    3: { explanation:
`本題問「何者錯誤」,正解 B。髓鞘化(myelinization)並非在 6–7 歲就完成;它從胎兒期開始,一直延續到青少年期甚至成年早期(尤其前額葉最晚)。
• A 對:髓鞘像電線絕緣皮,使神經傳導更快更有效率。

  <script>
'use strict';
const E = window.__EXAM;
const $ = s => document.querySelector(s);
const ce = (t, c) => { const e = document.createElement(t); if (c) e.className = c; return e; };

/* ───── 載入資料(file:// 相容) ───── */
function injectScript(src) {
  return new Promise(res => { const s = document.createElement('script'); s.src = src; s.onload = () => res(1); s.onerror = () => res(0); document.head.appendChild(s); });
}
async function boot() {
  const mf = E.manifest;
  if (!mf || !mf.papers) { $('#app').innerHTML = '<div class="empty">⚠ 找不到題庫(data/manifest.js)。請先執行 build。</div>'; return; }
  if (E.papers.length === 0) {
    await Promise.all(mf.papers.map(p => injectScript('data/' + p.file)));
    await Promise.all(mf.papers.map(p => injectScript('data/expl/' + p.id + '.js')));
  }
  init();
}

/* ───── 題庫扁平化 ───── */
let MC = [], ESSAYS = [];
function buildData() {
  for (const p of E.papers) {
    const expl = E.expl[p.id] || {};
    for (const q of p.mc) {
      const ex = (expl.mc && expl.mc[q.num]) || {};
      MC.push({ qid: p.id + '#' + q.num, paperId: p.id, year: p.year, subject: p.subject, subjectIndex: p.subjectIndex,
        num: q.num, stem: q.stem, options: q.options, answer: q.answer,
        accept: (q.accept && q.accept.length) ? q.accept : [q.answer], giveAll: !!q.giveAll, note: q.note || '',
        explanation: ex.explanation || q.explanation || null });
    }
    for (const e of p.essays) {
      const ex = (expl.essays && expl.essays[e.num]) || {};
      ESSAYS.push({ qid: 'E:' + p.id + '#' + e.num, paperId: p.id, year: p.year, subject: p.subject, subjectIndex: p.subjectIndex,
        num: e.num, text: e.text, points: e.points, reference: ex.reference || e.reference || null, rubric: ex.rubric || e.rubric || null });
    }
  }
  const sorter = (a, b) => b.year - a.year || a.subjectIndex - b.subjectIndex || a.num - b.num;
  MC.sort(sorter); ESSAYS.sort(sorter);
}

/* ───── localStorage ───── */
const LS = (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } };
const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));
let progress = LS('exam_progress_v1', {});
let favorites = new Set(LS('exam_fav_v1', []));
let history = LS('exam_history_v1', []);
const saveProgress = () => save('exam_progress_v1', progress);
const saveFav = () => save('exam_fav_v1', [...favorites]);
const saveHistory = () => save('exam_history_v1', history);
const isCorrectPick = (q, p) => q.giveAll || q.accept.includes(p);

/* ───── 備份 / 還原(匯出匯入檔案,可跨裝置搬移) ───── */
function collectBackup() {
  const d = { _app: '諮商刷題', _v: 1, _ts: Date.now(), progress, history, favorites: [...favorites], essays: {} };
  for (let i = 0; i < localStorage.length; i++) { const k = localStorage.key(i); if (k.startsWith('essay_ans_')) d.essays[k] = localStorage.getItem(k); }
  return d;
}
function exportBackup() {
  const blob = new Blob([JSON.stringify(collectBackup(), null, 2)], { type: 'application/json' });
  const d = new Date(), p = n => String(n).padStart(2, '0');
  const a = ce('a'); a.href = URL.createObjectURL(blob);
  a.download = `諮商刷題備份_${d.getFullYear()}${p(d.getMonth() + 1)}${p(d.getDate())}.json`;
  document.body.appendChild(a); a.click(); setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 500);
}
function importBackup(file, replace) {
  const r = new FileReader();
  r.onload = () => {
    try {
      const d = JSON.parse(r.result);
      if (!d || !d._app) { alert('這不是有效的備份檔'); return; }
      if (replace) { progress = {}; history = []; favorites = new Set(); }
      Object.assign(progress, d.progress || {});
      (d.favorites || []).forEach(q => favorites.add(q));
      if (Array.isArray(d.history)) {
        const seen = new Set(history.map(h => h.ts));
        for (const h of d.history) if (!seen.has(h.ts)) history.push(h);
        history.sort((a, b) => b.ts - a.ts); history = history.slice(0, 100);
      }
      if (d.essays) for (const [k, v] of Object.entries(d.essays)) localStorage.setItem(k, v);
      saveProgress(); saveHistory(); saveFav(); updateStats(); render();
      alert('✓ 備份已' + (replace ? '還原(覆蓋)' : '合併匯入') + '完成!');
    } catch (e) { alert('匯入失敗:檔案格式不正確'); }
  };
  r.readAsText(file);
}

/* ───── 共用 ───── */
function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; }
function fmtTime(s) { s = Math.max(0, Math.floor(s)); const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60), x = s % 60; const p = n => String(n).padStart(2, '0'); return (h ? h + ':' : '') + p(m) + ':' + p(x); }
function subjShort(s) { return s.replace('諮商與心理治療', '').replace('諮商的', ''); }
function escapeHtml(s) { return s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }
function copyText(t, ok) { if (navigator.clipboard?.writeText) navigator.clipboard.writeText(t).then(ok, () => fb(t, ok)); else fb(t, ok); function fb(text, cb) { const ta = ce('textarea'); ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = 0; document.body.appendChild(ta); ta.select(); try { document.execCommand('copy'); cb(); } catch { alert('複製失敗,請手動複製'); } ta.remove(); } }

/* ───── 模式切換 ───── */
let view = 'exam-setup';
const MODES = [['exam-setup', '📝 考試模式'], ['browse', '📖 練習瀏覽'], ['essay', '✍️ 申論題'], ['history', '📊 測驗紀錄']];
function renderTabs() {
  const nav = $('#modeTabs'); nav.innerHTML = '';
  for (const [k, label] of MODES) {
    const t = ce('div', 'modetab' + ((view === k || (k === 'exam-setup' && view.startsWith('exam'))) ? ' active' : ''));
    t.textContent = label;
    t.onclick = () => { if (exam && exam.running && !confirm('離開將結束目前測驗,確定?')) return; stopTimer(); exam = null; go(k); };
    nav.appendChild(t);
  }
}
function go(v) { view = v; renderTabs(); render(); window.scrollTo(0, 0); }

/* ───── 統計列 ───── */
function updateStats() {
  $('#brandStat').textContent = `${MC.length} 測驗題 · ${ESSAYS.length} 申論題 · ${E.manifest.years.length} 屆`;
  let ans = 0, cor = 0; for (const q of MC) { const r = progress[q.qid]; if (r) { ans++; if (r.correct) cor++; } }
  const rate = ans ? Math.round(cor / ans * 100) : 0;
  const box = $('#progressBox'); box.innerHTML = '';
  const mk = (b, s) => { const d = ce('div', 'pstat'); d.innerHTML = `<b>${b}</b><span>${s}</span>`; return d; };
  box.append(mk(ans, '已作答'), mk(rate + '%', '答對率'), mk(favorites.size, '收藏'));
  const rb = ce('button', 'reset-btn'); rb.textContent = '清除紀錄';
  rb.onclick = () => { if (confirm('清除所有作答紀錄與測驗紀錄?(收藏保留)')) { progress = {}; history = []; saveProgress(); saveHistory(); render(); updateStats(); } };
  box.append(rb);
}

/* ═══════════ 考試模式 ═══════════ */
const cfg = LS('exam_cfg_v1', { year: 'all', subject: 'all', source: 'all', count: 'all', order: 'paper', minutes: '0' });
let exam = null, timerId = null;

function poolFor(c) {
  let pool = MC.filter(q => (c.year === 'all' || q.year === +c.year) && (c.subject === 'all' || q.subjectIndex === +c.subject));
  if (c.source === 'wrong') pool = pool.filter(q => progress[q.qid] && !progress[q.qid].correct);
  if (c.source === 'fav') pool = pool.filter(q => favorites.has(q.qid));
  return pool;
}

function renderExamSetup() {
  const app = $('#app'); app.innerHTML = '';
  const panel = ce('div', 'panel');
  panel.innerHTML = `<h2>📝 開始一份測驗</h2><div class="sub">選好範圍 → 整份作答 → 交卷後才會顯示分數與對錯詳解(像考試一樣)。</div>`;
  const grid = ce('div', 'setup-grid');
  const years = E.manifest.years;
  const sel = (label, key, opts) => {
    const f = ce('div', 'field'); const lb = ce('label'); lb.textContent = label;
    const s = ce('select'); for (const [v, t] of opts) { const o = ce('option'); o.value = v; o.textContent = t; if (String(cfg[key]) === String(v)) o.selected = true; s.appendChild(o); }
    s.onchange = () => { cfg[key] = s.value; save('exam_cfg_v1', cfg); refreshCount(); };
    f.append(lb, s); return f;
  };
  grid.append(
    sel('年份(屆別)', 'year', [['all', '全部年份'], ...years.map(y => [y, y + '年'])]),
    sel('科目', 'subject', [['all', '全部科目'], ...E.manifest.subjects.map((s, i) => [i + 1, subjShort(s)])]),
    sel('出題範圍', 'source', [['all', '全部題目'], ['wrong', '只出我答錯的'], ['fav', '只出我收藏的 ⭐']]),
    sel('題數', 'count', [['all', '全部(整份)'], ['10', '10 題'], ['20', '20 題'], ['30', '30 題'], ['40', '40 題'], ['50', '50 題'], ['100', '100 題']]),
    sel('出題順序', 'order', [['paper', '依原卷順序'], ['random', '隨機洗題']]),
    sel('計時', 'minutes', [['0', '不限時'], ['10', '10 分鐘'], ['20', '20 分鐘'], ['40', '40 分鐘'], ['60', '60 分鐘'], ['120', '120 分鐘']]),
  );
  panel.appendChild(grid);
  const startRow = ce('div', 'start-row');
  const startBtn = ce('button', 'btn big'); startBtn.id = 'startBtn'; startBtn.textContent = '開始測驗 ▶';
  startBtn.onclick = startExam;
  const cnt = ce('span', 'hint'); cnt.id = 'cntHint';
  startRow.append(startBtn, cnt);
  panel.appendChild(startRow);
  app.appendChild(panel);
  refreshCount();
}
function refreshCount() {
  const pool = poolFor(cfg);
  const want = cfg.count === 'all' ? pool.length : Math.min(+cfg.count, pool.length);
  const hint = $('#cntHint'), btn = $('#startBtn');
  if (!hint) return;
  if (pool.length === 0) { hint.textContent = '⚠ 此範圍沒有題目,請換條件'; btn.disabled = true; }
  else { hint.textContent = `本次將出 ${want} 題(此範圍共 ${pool.length} 題)`; btn.disabled = false; }
}

function startExam() {
  let pool = poolFor(cfg);
  if (!pool.length) return;
  pool = pool.slice();
  if (cfg.order === 'random') shuffle(pool);
  else pool.sort((a, b) => b.year - a.year || a.subjectIndex - b.subjectIndex || a.num - b.num);
  if (cfg.count !== 'all') pool = pool.slice(0, +cfg.count);
  const scopeLabel = (cfg.year === 'all' ? '全年份' : cfg.year + '年') + ' · ' +
    (cfg.subject === 'all' ? '全科目' : subjShort(E.manifest.subjects[+cfg.subject - 1])) +
    (cfg.source === 'wrong' ? ' · 錯題' : cfg.source === 'fav' ? ' · 收藏' : '');
  exam = { questions: pool, answers: {}, flags: new Set(), startTs: Date.now(), durationSec: +cfg.minutes * 60, remain: +cfg.minutes * 60, running: true, scopeLabel, submitted: false };
  go('exam-run');
  startTimer();
}

function startTimer() {
  stopTimer();
  timerId = setInterval(() => {
    if (!exam) return stopTimer();
    if (exam.durationSec) { exam.remain--; if (exam.remain <= 0) { updateTimer(); submitExam(true); return; } }
    updateTimer();
  }, 1000);
}
function stopTimer() { if (timerId) clearInterval(timerId); timerId = null; }
function updateTimer() {
  const el = $('#timer'); if (!el || !exam) return;
  if (exam.durationSec) { el.textContent = '⏳ ' + fmtTime(exam.remain); el.classList.toggle('warn', exam.remain <= 60); }
  else el.textContent = '⏱ ' + fmtTime((Date.now() - exam.startTs) / 1000);
}

function renderExamRun() {
  const app = $('#app'); app.innerHTML = '';
  const bar = ce('div', 'exam-bar');
  bar.innerHTML = `<span class="scope">${exam.scopeLabel}</span><span class="timer" id="timer"></span><span class="answered" id="answeredLbl"></span>`;
  const submit = ce('button', 'btn'); submit.textContent = '交卷 ✓'; submit.onclick = () => confirmSubmit();
  bar.appendChild(submit);
  app.appendChild(bar);
  // 答題卡
  const sheet = ce('div', 'sheet'); sheet.id = 'sheet';
  exam.questions.forEach((q, i) => {
    const c = ce('div', 'sheet-cell'); c.textContent = i + 1; c.dataset.qid = q.qid;
    c.onclick = () => document.getElementById('q_' + i)?.scrollIntoView({ behavior: 'smooth' });
    sheet.appendChild(c);
  });
  app.appendChild(sheet);
  // 題目
  exam.questions.forEach((q, i) => app.appendChild(questionCard(q, 'exam', i)));
  const submit2 = ce('button', 'btn big'); submit2.textContent = '交卷,看成績 ✓'; submit2.style.display = 'block'; submit2.style.margin = '10px auto'; submit2.onclick = () => confirmSubmit();
  app.appendChild(submit2);
  updateTimer(); updateAnswered();
}
function updateAnswered() {
  const el = $('#answeredLbl'); if (!el || !exam) return;
  const n = Object.keys(exam.answers).length;
  el.innerHTML = `已答 <b>${n}</b> / ${exam.questions.length}`;
}
function confirmSubmit() {
  const n = Object.keys(exam.answers).length, tot = exam.questions.length;
  if (n < tot && !confirm(`還有 ${tot - n} 題未作答,確定要交卷嗎?`)) return;
  submitExam(false);
}
function submitExam(auto) {
  if (!exam || exam.submitted) return;
  exam.submitted = true; exam.running = false; stopTimer();
  exam.endTs = Date.now(); exam.usedSec = Math.round((exam.endTs - exam.startTs) / 1000);
  let cor = 0, wr = 0, bl = 0;
  for (const q of exam.questions) {
    const p = exam.answers[q.qid];
    if (p == null) bl++;
    else { const ok = isCorrectPick(q, p); ok ? cor++ : wr++; progress[q.qid] = { pick: p, correct: ok, ts: Date.now() }; }
  }
  saveProgress();
  const tot = exam.questions.length, score = Math.round(cor / tot * 100);
  exam.result = { cor, wr, bl, tot, score };
  history.unshift({ ts: exam.endTs, scope: exam.scopeLabel, tot, cor, score, sec: exam.usedSec });
  if (history.length > 100) history = history.slice(0, 100);
  saveHistory(); updateStats();
  if (auto) alert('⏰ 時間到,已自動交卷!');
  go('exam-result');
}

let reviewFilter = 'all';
function renderExamResult() {
  const app = $('#app'); app.innerHTML = '';
  const r = exam.result;
  const pass = r.score >= 60;
  const card = ce('div', 'panel scorecard');
  card.innerHTML = `
    <div class="score-ring" style="--p:${r.score}; --ring:${pass ? 'var(--good)' : 'var(--accent)'}">
      <div class="score-ring-inner"><div class="score-big ${pass ? 'pass' : 'fail'}">${r.score}<span class="u">分</span></div></div>
    </div>
    <div class="score-sub">${exam.scopeLabel} · 用時 ${fmtTime(exam.usedSec)} · ${pass ? '🎉 及格' : '繼續加油'}</div>
    <div class="score-stats">
      <div class="s ok"><b>${r.cor}</b><span>答對</span></div>
      <div class="s no"><b>${r.wr}</b><span>答錯</span></div>
      <div class="s bl"><b>${r.bl}</b><span>未作答</span></div>
      <div class="s"><b>${r.tot}</b><span>總題數</span></div>
    </div>`;
  const acts = ce('div', 'result-actions');
  const wrongQs = exam.questions.filter(q => { const p = exam.answers[q.qid]; return p == null || !isCorrectPick(q, p); });
  const again = ce('button', 'btn'); again.textContent = '🔁 同範圍再考一次'; again.onclick = () => startExam();
  const redoWrong = ce('button', 'btn navy'); redoWrong.textContent = `✗ 只重做錯/漏題 (${wrongQs.length})`; redoWrong.disabled = !wrongQs.length;
  redoWrong.onclick = () => { exam = { questions: shuffleKeep(wrongQs), answers: {}, flags: new Set(), startTs: Date.now(), durationSec: 0, remain: 0, running: true, scopeLabel: exam.scopeLabel + ' · 錯題重做', submitted: false }; go('exam-run'); startTimer(); };
  const back = ce('button', 'btn ghost'); back.textContent = '← 回設定'; back.onclick = () => { exam = null; go('exam-setup'); };
  acts.append(again, redoWrong, back);
  card.appendChild(acts);
  app.appendChild(card);
  // 檢討篩選
  const rf = ce('div', 'review-filter');
  [['all', '全部'], ['wrong', '只看錯/漏'], ['right', '只看答對']].forEach(([k, l]) => {
    const c = ce('div', 'chip' + (reviewFilter === k ? ' active' : '')); c.textContent = l; c.onclick = () => { reviewFilter = k; renderExamResult(); };
    rf.appendChild(c);
  });
  app.appendChild(rf);
  // 逐題檢討
  exam.questions.forEach((q, i) => {
    const p = exam.answers[q.qid]; const ok = p != null && isCorrectPick(q, p);
    if (reviewFilter === 'wrong' && ok) return;
    if (reviewFilter === 'right' && !ok) return;
    app.appendChild(questionCard(q, 'review', i));
  });
}
function shuffleKeep(arr) { return arr.slice(); }

/* ═══════════ 題卡(三種模式:exam / review / practice) ═══════════ */
function questionCard(q, mode, idx) {
  const card = ce('div', 'qcard'); if (idx != null) card.id = 'q_' + idx;
  const meta = ce('div', 'qmeta');
  meta.innerHTML = `<span class="tag">${q.year}年</span><span class="tag subj">${q.subject}</span>`;
  if (mode === 'practice') { const r = progress[q.qid]; if (r) { const t = ce('span', 'tag ' + (r.correct ? 'done' : 'wrong')); t.textContent = r.correct ? '✓ 已答對' : '✗ 曾答錯'; meta.appendChild(t); } }
  const star = ce('span', 'fav' + (favorites.has(q.qid) ? ' on' : '')); star.textContent = '★'; star.title = '收藏';
  star.onclick = () => { favorites.has(q.qid) ? favorites.delete(q.qid) : favorites.add(q.qid); saveFav(); star.classList.toggle('on'); updateStats(); };
  meta.appendChild(star);
  card.appendChild(meta);
  const stem = ce('div', 'qstem'); stem.innerHTML = `<span class="qnum">${idx != null ? (idx + 1) : q.num}.</span>`; stem.append(document.createTextNode(q.stem));
  card.appendChild(stem);
  const opts = ce('div', 'options'); const optEls = {};
  for (const L of ['A', 'B', 'C', 'D']) {
    if (q.options[L] === undefined) continue;
    const o = ce('div', 'opt'); o.innerHTML = `<span class="lab">${L}</span>`;
    const tx = ce('span', 'txt'); tx.textContent = q.options[L]; o.appendChild(tx);
    opts.appendChild(o); optEls[L] = o;
  }
  card.appendChild(opts); card._opts = optEls;

  if (mode === 'exam') {
    const picked = exam.answers[q.qid];
    for (const [L, o] of Object.entries(optEls)) {
      if (picked === L) o.classList.add('sel');
      o.onclick = () => {
        exam.answers[q.qid] = L;
        for (const x of Object.values(optEls)) x.classList.remove('sel');
        o.classList.add('sel');
        const cell = $('#sheet')?.querySelector(`[data-qid="${q.qid}"]`); if (cell) cell.classList.add('done');
        updateAnswered();
      };
    }
  } else if (mode === 'review') {
    revealCard(q, card, exam.answers[q.qid]);
    const cell = $('#sheet'); // none in result
  } else if (mode === 'practice') {
    const rec = progress[q.qid];
    const foot = ce('div', 'qfoot'); const show = ce('button', 'link-btn'); show.textContent = '直接看答案／詳解'; show.onclick = () => revealCard(q, card, null); foot.appendChild(show); card.appendChild(foot);
    if (rec) revealCard(q, card, rec.pick);
    else for (const [L, o] of Object.entries(optEls)) o.onclick = () => { const ok = isCorrectPick(q, L); progress[q.qid] = { pick: L, correct: ok, ts: Date.now() }; saveProgress(); revealCard(q, card, L); updateStats(); };
  }
  return card;
}

function revealCard(q, card, pick) {
  if (card._revealed) return; card._revealed = true;
  for (const [L, o] of Object.entries(card._opts)) {
    o.classList.add('disabled'); o.classList.remove('sel'); o.onclick = null;
    if (q.giveAll || q.accept.includes(L)) o.classList.add('correct');
    if (pick === L && !q.giveAll && !q.accept.includes(L)) o.classList.add('wrong');
  }
  let foot = card.querySelector('.qfoot'); if (!foot) { foot = ce('div', 'qfoot'); card.appendChild(foot); } foot.innerHTML = '';
  if (pick != null) { const ok = isCorrectPick(q, pick); const v = ce('span', 'verdict ' + (ok ? 'ok' : 'no')); v.textContent = ok ? '✓ 答對' : '✗ 答錯(你選 ' + pick + ')'; foot.appendChild(v); }
  else if (card._revealMode !== 'peek') { /* review 未作答 */ const v = ce('span', 'verdict no'); }
  const a = ce('span', 'verdict'); a.style.color = 'var(--navy)'; a.textContent = q.giveAll ? '本題送分(一律給分)' : '正確答案:' + q.accept.join(' / '); foot.appendChild(a);
  if (q.note) { const n = ce('span', 'note-mod'); n.textContent = '⚠ ' + q.note; foot.appendChild(n); }
  const ex = ce('div'); if (q.explanation) { ex.className = 'explain'; ex.innerHTML = '<h4>詳解 · 知識補充</h4>'; ex.append(document.createTextNode(q.explanation)); } else { ex.className = 'explain pending'; ex.textContent = '💡 此題詳解尚未生成,稍後補上。'; }
  card.appendChild(ex);
}

/* ═══════════ 練習瀏覽 ═══════════ */
const bf = { year: 'all', subject: 'all', status: 'all', fav: false, kw: '', limit: 30 };
function renderBrowse() {
  const app = $('#app'); app.innerHTML = '';
  const tb = ce('div', 'toolbar');
  const search = ce('input'); search.type = 'search'; search.placeholder = '🔍 搜尋關鍵字、考點、學者…例如「同理心」「Rogers」'; search.value = bf.kw;
  search.oninput = () => { bf.kw = search.value; bf.limit = 30; renderBrowseList(); };
  tb.appendChild(search);
  const filters = ce('div', 'filters');
  const grp = (label, items, cur, on) => { const g = ce('div', 'filter-group'); g.append(label + ':'); items.forEach(([v, t]) => { const c = ce('div', 'chip' + (String(cur()) === String(v) ? ' active' : '')); c.textContent = t; c.onclick = () => { on(v); bf.limit = 30; renderBrowse(); }; g.appendChild(c); }); return g; };
  filters.append(
    grp('屆別', [['all', '全部'], ...E.manifest.years.map(y => [y, y + '年'])], () => bf.year, v => bf.year = v),
    grp('科目', [['all', '全部'], ...E.manifest.subjects.map((s, i) => [i + 1, subjShort(s)])], () => bf.subject, v => bf.subject = v),
    grp('狀態', [['all', '全部'], ['todo', '未作答'], ['wrong', '答錯'], ['right', '答對']], () => bf.status, v => bf.status = v),
  );
  const favG = ce('div', 'filter-group'); const fc = ce('div', 'chip' + (bf.fav ? ' active' : '')); fc.textContent = '⭐ 只看收藏'; fc.onclick = () => { bf.fav = !bf.fav; bf.limit = 30; renderBrowse(); }; favG.append(fc); filters.appendChild(favG);
  tb.appendChild(filters);
  const cl = ce('span', 'count-label'); cl.id = 'browseCount'; tb.appendChild(cl);
  app.appendChild(tb);
  const list = ce('div'); list.id = 'browseList'; app.appendChild(list);
  renderBrowseList();
}
function browseFiltered() {
  const kw = bf.kw.trim().toLowerCase();
  return MC.filter(q => {
    if (bf.year !== 'all' && q.year !== +bf.year) return false;
    if (bf.subject !== 'all' && q.subjectIndex !== +bf.subject) return false;
    if (bf.fav && !favorites.has(q.qid)) return false;
    if (bf.status !== 'all') { const r = progress[q.qid]; if (bf.status === 'todo' && r) return false; if (bf.status === 'wrong' && !(r && !r.correct)) return false; if (bf.status === 'right' && !(r && r.correct)) return false; }
    if (kw && !(q.stem + Object.values(q.options).join(' ')).toLowerCase().includes(kw)) return false;
    return true;
  });
}
function renderBrowseList() {
  const list = $('#browseList'); if (!list) return; list.innerHTML = '';
  const all = browseFiltered();
  $('#browseCount').innerHTML = `符合 <b>${all.length}</b> 題`;
  if (!all.length) { list.innerHTML = '<div class="empty">沒有符合條件的題目 🔍</div>'; return; }
  all.slice(0, bf.limit).forEach(q => list.appendChild(questionCard(q, 'practice')));
  if (all.length > bf.limit) { const more = ce('button', 'btn ghost'); more.style.cssText = 'display:block;margin:8px auto'; more.textContent = `再顯示 ${Math.min(30, all.length - bf.limit)} 題(${bf.limit}/${all.length})`; more.onclick = () => { bf.limit += 30; renderBrowseList(); }; list.appendChild(more); }
}

/* ═══════════ 申論題 ═══════════ */
const ef = { year: 'all', subject: 'all', kw: '' };
function renderEssay() {
  const app = $('#app'); app.innerHTML = '';
  const tb = ce('div', 'toolbar');
  const search = ce('input'); search.type = 'search'; search.placeholder = '🔍 搜尋申論題關鍵字'; search.value = ef.kw;
  search.oninput = () => { ef.kw = search.value; renderEssayList(); };
  tb.appendChild(search);
  const filters = ce('div', 'filters');
  const grp = (label, items, cur, on) => { const g = ce('div', 'filter-group'); g.append(label + ':'); items.forEach(([v, t]) => { const c = ce('div', 'chip' + (String(cur()) === String(v) ? ' active' : '')); c.textContent = t; c.onclick = () => { on(v); renderEssay(); }; g.appendChild(c); }); return g; };
  filters.append(
    grp('屆別', [['all', '全部'], ...E.manifest.years.map(y => [y, y + '年'])], () => ef.year, v => ef.year = v),
    grp('科目', [['all', '全部'], ...E.manifest.subjects.map((s, i) => [i + 1, subjShort(s)])], () => ef.subject, v => ef.subject = v),
  );
  tb.appendChild(filters); const cl = ce('span', 'count-label'); cl.id = 'essayCount'; tb.appendChild(cl);
  app.appendChild(tb); const list = ce('div'); list.id = 'essayList'; app.appendChild(list); renderEssayList();
}
function renderEssayList() {
  const list = $('#essayList'); if (!list) return; list.innerHTML = '';
  const kw = ef.kw.trim().toLowerCase();
  const all = ESSAYS.filter(e => (ef.year === 'all' || e.year === +ef.year) && (ef.subject === 'all' || e.subjectIndex === +ef.subject) && (!kw || e.text.toLowerCase().includes(kw)));
  $('#essayCount').innerHTML = `符合 <b>${all.length}</b> 題申論`;
  if (!all.length) { list.innerHTML = '<div class="empty">沒有符合條件的申論題</div>'; return; }
  all.forEach(e => list.appendChild(essayCard(e)));
}
function essayCard(e) {
  const card = ce('div', 'essay-card');
  const meta = ce('div', 'qmeta'); meta.innerHTML = `<span class="tag">${e.year}年</span><span class="tag subj">${e.subject}</span>` + (e.points ? `<span class="tag">${e.points}分</span>` : ''); card.appendChild(meta);
  const stem = ce('div', 'essay-stem'); stem.innerHTML = `<span class="qnum">申論 ${e.num}.</span>`; stem.append(document.createTextNode(e.text)); card.appendChild(stem);
  const ta = ce('textarea'); ta.placeholder = '在這裡寫下你的作答…'; const key = 'essay_ans_' + e.qid; ta.value = localStorage.getItem(key) || ''; ta.oninput = () => localStorage.setItem(key, ta.value); card.appendChild(ta);
  const row = ce('div', 'btn-row');
  const copy = ce('button', 'btn'); copy.textContent = '📋 複製評分提示詞(貼給 AI)'; const toast = ce('span', 'toast');
  copy.onclick = () => copyText(buildGradingPrompt(e, ta.value), () => { toast.textContent = '✓ 已複製!貼到 ChatGPT / Claude 即可評分'; setTimeout(() => toast.textContent = '', 4000); });
  const refBtn = ce('button', 'btn ghost'); refBtn.textContent = '查看參考答案／評分標準';
  row.append(copy, refBtn, toast); card.appendChild(row);
  const ref = ce('div'); ref.style.display = 'none'; refBtn.onclick = () => ref.style.display = ref.style.display === 'none' ? 'block' : 'none';
  if (e.reference || e.rubric) { ref.className = 'ref-box'; if (e.rubric) ref.innerHTML += '<h4>評分標準</h4><div class="body">' + escapeHtml(e.rubric) + '</div>'; if (e.reference) ref.innerHTML += '<h4>參考答案重點</h4><div class="body">' + escapeHtml(e.reference) + '</div>'; }
  else { ref.className = 'ref-box pending'; ref.textContent = '💡 此題參考答案與評分標準尚未生成。你仍可用「複製評分提示詞」交給 AI 評分。'; }
  card.appendChild(ref); return card;
}
function buildGradingPrompt(e, my) {
  return `你是「諮商心理師」國家考試的資深閱卷委員。請依下列資料,為「我的作答」評分(滿分 ${e.points || 25} 分)並給專業回饋。

【題目】(${e.year}年 ${e.subject})
${e.text}

【評分標準】
${e.rubric || '(本題評分標準尚未提供,請依諮商心理學專業與閱卷慣例,自行擬定合理評分要點)'}

【參考答案重點】
${e.reference || '(本題參考答案尚未提供,請依專業補充應涵蓋的關鍵概念)'}

【我的作答】
${my || '(我尚未作答,請先提供本題高分參考答案與作答架構)'}

請輸出:1) 得分 __/${e.points || 25} 2) 逐項評分依據 3) 我的缺漏與錯誤 4) 補強建議與關鍵概念`;
}

/* ═══════════ 測驗紀錄 ═══════════ */
function renderHistory() {
  const app = $('#app'); app.innerHTML = '';
  // 備份 / 還原
  const bk = ce('div', 'panel'); bk.style.marginBottom = '16px';
  bk.innerHTML = `<h2>💾 備份 / 還原紀錄</h2><div class="sub">紀錄存在本機瀏覽器。匯出成檔案可備份,或在別台裝置(手機/平板/電腦)匯入,把進度搬過去。</div>`;
  const row = ce('div', 'btn-row');
  const exp = ce('button', 'btn'); exp.textContent = '⬇ 匯出備份檔'; exp.onclick = exportBackup;
  const impLabel = ce('label', 'btn navy'); impLabel.style.cursor = 'pointer'; impLabel.textContent = '⬆ 匯入備份檔(合併)';
  const impInput = ce('input'); impInput.type = 'file'; impInput.accept = '.json,application/json'; impInput.style.display = 'none';
  impInput.onchange = () => { if (impInput.files[0]) { if (confirm('匯入此備份?(會與目前紀錄合併,不會刪除現有)')) importBackup(impInput.files[0], false); impInput.value = ''; } };
  impLabel.appendChild(impInput);
  row.append(exp, impLabel);
  bk.appendChild(row);
  app.appendChild(bk);

  const panel = ce('div', 'panel'); panel.innerHTML = `<h2>📊 測驗紀錄</h2><div class="sub">最近 ${history.length} 次測驗(存在本機)。</div>`;
  app.appendChild(panel);
  if (!history.length) { const e = ce('div', 'empty'); e.textContent = '還沒有測驗紀錄,去「考試模式」考一份吧!'; app.appendChild(e); return; }
  for (const h of history) {
    const it = ce('div', 'hist-item'); const pass = h.score >= 60;
    const d = new Date(h.ts); const ds = `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    it.innerHTML = `<div><div style="font-weight:600">${h.scope}</div><div class="hist-meta">${ds} · 答對 ${h.cor}/${h.tot} · 用時 ${fmtTime(h.sec)}</div></div><div class="hscore ${pass ? 'pass' : 'fail'}">${h.score}分</div>`;
    app.appendChild(it);
  }
  const clr = ce('button', 'btn ghost'); clr.style.cssText = 'display:block;margin:14px auto'; clr.textContent = '清除測驗紀錄'; clr.onclick = () => { if (confirm('清除所有測驗紀錄?')) { history = []; saveHistory(); renderHistory(); } };
  app.appendChild(clr);
}

/* ═══════════ 路由 ═══════════ */
function render() {
  if (view === 'exam-setup') renderExamSetup();
  else if (view === 'exam-run') renderExamRun();
  else if (view === 'exam-result') renderExamResult();
  else if (view === 'browse') renderBrowse();
  else if (view === 'essay') renderEssay();
  else if (view === 'history') renderHistory();
}
function init() { buildData(); updateStats(); renderTabs(); render(); }
boot();

</script>
