window.__EXAM_LOAD({"id":"112_1","year":112,"subjectIndex":1,"subject":"諮商的心理學基礎","essays":[{"num":1,"text":"試說明學齡前兒童「假扮遊戲」的內容，並探討假扮遊戲在個人發展上的重要性。（15分）","points":15,"reference":null,"rubric":null},{"num":2,"text":"試詳述兒童期的「心智理論（theory of mind）」，並說明如何測量這項能力及其與社會認知發展缺陷的關係。\n（10分）","points":10,"reference":null,"rubric":null},{"num":3,"text":"正向心理學為心理學的新興取向，試詳述正向心理學對傳統心理學領域之評論，並說明其重要主張與研究範\n圍。（25分）","points":25,"reference":null,"rubric":null}],"mc":[{"num":1,"stem":"有關Erikson提出的發展理論基礎，下列敘述何者錯誤？","options":{"A":"來自於Erikson自身的精神分析背景所形成的發展理論","B":"提出認同危機（identification crisis）的概念","C":"認為嬰兒最早的危機，在於主動性與羞愧的對應發展","D":"此發展理論也成為人格心理學理論的重要基礎"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":2,"stem":"下列何者為Rogers對治療的基本主張？","options":{"A":"掌握與個案間對話、診斷的主控權","B":"信任個案改變行為的動機與努力","C":"避免移情（transference）現象的發生","D":"鼓勵移情的發展"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":3,"stem":"在進行嬰幼兒認知行為衡鑑時，當測驗者呈現給受試者一個蘋果的圖案，然後翻下一頁，裡頭有蘋果、香蕉與鳳梨，希望受試者指出或說出剛剛所看到的蘋果，這是以何種作業進行嬰幼兒的認知能力評估？","options":{"A":"配對","B":"再認","C":"回憶","D":"再建構"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":4,"stem":"有關Bowlby對於依附的看法，下列何者對於嬰兒建立安全依附行為（secure attachment）或不安全依附行為（insecure attachment）具有決定性的影響力？","options":{"A":"手足關係","B":"主要照顧者","C":"家中所有成員一樣重要","D":"嬰兒自身的氣質與性格"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":5,"stem":"有關臉孔知覺發展的敘述，下列何者正確？","options":{"A":"一個月的嬰兒注視靜態臉孔時，視線掃描最集中於臉部的特徵","B":"動態臉孔比靜態臉孔更能引起六個星期的嬰兒掃描眼睛及嘴等臉部特徵","C":"兩個月的嬰兒注視靜態臉孔時，偏好把焦點放在頭頂、髮際及下顎","D":"嬰兒出生就偏好注視典型的臉孔圖片，較不喜歡注視五官任意拼湊的臉孔圖片"},"answer":"B","accept":["B","D"],"giveAll":false,"note":"第5題答Ｂ或Ｄ或BD者均給分","explanation":null},{"num":6,"stem":"根據維高斯基（Vygotsky）的認知發展觀點，下列敘述何者最正確？","options":{"A":"不同的文化系統會提供發展中的兒童完全相同的智能適應工具（tools of intellectual adaptation）來提升基本的心智能力","B":"成年人或是專家的介入協助經常會提高學習壓力，無助於提升兒童對問題的瞭解及解決問題的能力","C":"在引導式參與（guided participation）的過程中，兒童可以與一同參與活動的成人或其他能力較高的同伴互動而形塑認知的發展","D":"學齡後的兒童才會表現出使用私我語言（private speech）的方法調整自己的行為"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":7,"stem":"小婷與哥哥不斷大聲爭吵，媽媽先是厲聲叫他們停止，兩人只好小聲地吵，但媽媽認為他們沒有真的聽話，所以就口頭威脅他們再吵就把兩個人都抓起來揍，兩人這時便不再以口頭爭吵，轉而破壞對方的物品。根據Patterson的高壓強制環境理論（coercive home environment），接著媽媽做出下列何種後續行為，最可能會增強小婷與哥哥的攻擊行為？","options":{"A":"對兩人好言相勸","B":"隔離兩人，並進行暫停法（time-out）的懲罰","C":"離開現場，讓兩人自行解決衝突","D":"帶他們一起去看電影、吃館子培養快樂的手足互動經驗"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":8,"stem":"星期天，陳雄想去騎腳踏車，他打電話給王威，王威說他不想去。陳雄認為「王威不再是我的朋友，因為我要他去騎腳踏車的時候，他不跟我去」。此情形在Selman理論的友誼階段中，是屬於下列那個階段？","options":{"A":"階段0：短暫的玩伴","B":"階段1：單向的協助","C":"階段2：雙向的同享樂，但不共患難之合作","D":"階段3：親密，互相分享的關係"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":9,"stem":"陳老師在教導國中生學會新的知識和技能時，會在學生已經具備的能力上，再加深和加廣，透過協助學生學習以引導學生發展，陳老師是依據那一個認知發展理論？","options":{"A":"Piaget的認知發展論","B":"Vygotsky的社會建構論","C":"David Elkind自我中心主義","D":"Sternberg 智力三元論"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":10,"stem":"當國一的小華說：「我的同學常常交頭接耳，他們都在偷偷的評論我，讓我壓力很大」，此為David Elkind所提出的自我中心思考（egocentric thought），根據Newman和Newman（1999）所提出的協助青少年發展形象思考的途徑，助人者要改變小華想法，可以如何做？","options":{"A":"請小華找出同學在評論他的證據","B":"跟小華說：「他們說的可能不是你，而是別人」","C":"鼓勵小華與這些同學建立關係，以了解自己和同學想法的不同","D":"請小華不要太在意別人的看法，只要關注在自己的優點"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":11,"stem":"十五歲的志偉與三十五歲的俊賢參與了某項與情緒有關的研究，在看引發恐懼情緒的刺激時，藉由功能性核磁共振顯影（fMRI）對照兩人的大腦活動情況，通常會發現俊賢在那個大腦區域的相對活動量會比志偉高？","options":{"A":"前額葉","B":"枕葉","C":"顳葉","D":"杏仁核"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":12,"stem":"在子女離家的空巢期，關於父母與孩子關係的敘述，下列何者正確？","options":{"A":"父親比母親對與孩子未來關係的成長有更多正向的感覺","B":"父母鼓勵孩子依賴會讓親子關係更好","C":"親子變得更對等，關係更好","D":"親子的關係變得更緊張"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":13,"stem":"薛耶（Schaie）所發現的降低老年人認知衰退風險之變項，下列何者不包含在內？","options":{"A":"擁有高認知狀態的伴侶","B":"在朋友眼中是個固守原則有所堅持的人","C":"在青壯年的歲月中努力改善居家環境成為自己所喜愛的狀態","D":"在進入老年期前沒有心血管疾病和其他慢性病"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":14,"stem":"信任是影響親密關係的重要元素，下列敘述何者有助於增進伴侶間的信任？","options":{"A":"先生表示接受了公司升遷以及後續的超長且不固定工時的要求，期待太太能請求工作調動，以兼顧家庭與經濟","B":"太太非常不滿意先生將家事認定為太太的職責，看見先生主動做家事感到懷疑且不斷對先生質疑","C":"太太為了公司同事間的流言蜚語感到心煩，先生理性說明八卦文化的正常性，希望太太無須介意","D":"先生於伴侶爭執過程表示自己快要失控，指出自己近日順應太太要求的行為，並要求暫停爭論，之後再議"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":15,"stem":"關於年長者喪偶與對婚姻關係的評估，下列敘述何者正確？","options":{"A":"傷慟的寡婦和鰥夫對婚姻的評估相較於未喪偶者較負面","B":"傷慟的寡婦和鰥夫愈憂鬱，對婚姻的評價愈負面","C":"年長寡婦傾向將過世的丈夫神聖化","D":"婚姻關係愈差，傷慟的配偶愈思念過世的配偶"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":16,"stem":"何爺爺雖然已經80歲，但是身體健康非常良好，體適能表現跟60歲的人一樣。因此，60歲代表何爺爺的那一種年齡？","options":{"A":"生理年齡（chronological age）","B":"機能年齡（functional age）","C":"器官年齡（organic age）","D":"健康年齡（health age）"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":17,"stem":"人格心理學家將研究中可用到的資料分為LOTS四類，其中「O」代表下列何者？","options":{"A":"個體對自我表現的結果預期（outcome expectation）","B":"個體對自我的客觀認識（objective knowledge）","C":"以開放式問卷（open-ended questionnaire）蒐集個體性格特徵","D":"周遭父母、師長及朋友對個體的觀察（observation data）"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":18,"stem":"關於心理分析論及認知論針對潛意識的觀點比較，下列敘述何者正確？","options":{"A":"心理分析論強調符合邏輯與理性的潛意識歷程","B":"心理分析論強調潛意識內容中的動機與慾望；認知論強調潛意識內容中的思考","C":"心理分析論注意潛意識運作的非動機面向；認知論強調潛意識運作的動機面向","D":"認知論強調意識與潛意識歷程間的基礎差異"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":19,"stem":"在Freud的理論當中，人格中完全的無意識、非理性的部分，同時尋求生理需求與驅力的立即性的滿足，被享樂原則所操控的人格結構稱之為下列何者？","options":{"A":"生之本能（libido）","B":"自我（ego）","C":"本我（id）","D":"超我（superego）"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":20,"stem":"有一個小孩子的寵物狗死了，他卻表現的好像這隻狗還活著一樣。根據心理分析理論，這是什麼心理防衛機轉？","options":{"A":"否認","B":"昇華","C":"投射","D":"合理化"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":21,"stem":"Erikson較常使用的心理衡鑑技術為下列何者？","options":{"A":"投射測驗（projective test）","B":"角色建構測驗（role construct repertory test）","C":"心理史分析（psychohistorical analysis）","D":"Q分類法（Q-sort technique）"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":22,"stem":"小孩本來不會怕蟑螂，但是看見母親碰到蟑螂時，總是驚聲尖叫，後來這個小孩看到蟑螂也會產生害怕的感覺，最可能是下列何種反應？","options":{"A":"刺激的區辨反應","B":"自動化反射反應","C":"刺激的類化反應","D":"制約化情緒反應"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":23,"stem":"當學生上課講話時，教師就不斷嘮叨，學生為了耳根清淨，上課就保持安靜。教師的嘮叨對學生上課保持安靜而言，是行為學派所主張的那一種原則？","options":{"A":"正增強","B":"負增強","C":"正懲罰","D":"負懲罰"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":24,"stem":"關於A型－B型性格（type A-type B personality）與健康的關聯之敘述，下列何者錯誤？","options":{"A":"A型性格者在挫折時較容易產生敵意與憤怒","B":"早期研究顯示A型人格是心臟病的良好預測指標","C":"實驗室研究顯示，B型人格者在成就作業的表現勝於A型人格者","D":"根據研究，B型性格的高中生較少參與課外活動"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":25,"stem":"相較於英裔美國兒童，亞裔美國兒童在下列何種狀況下，會引發出較大的內在動機？","options":{"A":"由權威對象或同儕決定","B":"由自己決定","C":"依照外在酬賞而定","D":"非競爭性情境"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":26,"stem":"下列何者可以讓我們很快地解釋複雜刺激的心智結構？","options":{"A":"標準（standards）","B":"特質（traits）","C":"基模（schemas）","D":"期待（expectancies）"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":27,"stem":"關於「公平世界信念（belief in a just world）」的敘述，下列何者錯誤？","options":{"A":"公平世界信念是一種防衛歸因（defensive attributions）","B":"公平世界信念可使我們感到安心","C":"社會財富分布愈平均，人們愈相信公平世界信念","D":"公平世界信念有助於人們認為生活是規律而可預測的"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":28,"stem":"根據跨文化研究顯示，下列何者不屬於人類的基本臉部表情？","options":{"A":"厭惡","B":"快樂","C":"悲傷","D":"困惑"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":29,"stem":"當我們討論過大學生不夠用功的話題後，馬上聽到其他同學熱烈地參加校外聯誼活動，因而對這些同學產生負向評價，這是受到基模的什麼特徵所導致？","options":{"A":"重要性作用","B":"提示作用","C":"初始性作用","D":"接近性作用"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":30,"stem":"小明問小華是否喜歡某位藝人的歌，小華一時無法確定自己的態度，想了想，發現自己最近有幾次曾主動播放這位藝人的歌來聽，於是回答「喜歡」。下列那一個理論最能詮釋小華對於自己態度的認識？","options":{"A":"古典制約理論（classical conditioning）","B":"自我知覺理論（self-perception theory）","C":"自我覺察理論（self-awareness theory）","D":"認知失調理論（cognitive dissonance theory）"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":31,"stem":"上課時，余老師滔滔不絕的講課，但底下學生睡成一片。下課後，張同學上前跟余老師說：「老師你上得真好，我好喜歡聽你講課。」假如張同學這段話並非出自其內心真正的感受，他最可能是試圖要使用那一種自我呈現策略？","options":{"A":"逢迎（ingratiation）","B":"懇求（supplication）","C":"典範化（exemplication）","D":"自我推銷（self-promotion）"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":32,"stem":"根據Margaret Clark 與Judson Mills（1993）的理論，共享關係（communal relationships）中人們會關心並回應對方的需求。關於共享關係的敘述，下列何者錯誤？","options":{"A":"會隨時記錄雙方在關係中的貢獻","B":"異性戀和同性戀在關係中的承諾和共享程度相同","C":"在共享關係裡，伴侶對於在任何時刻達成公平的基礎較為寬鬆","D":"共享關係多發生於親密朋友、家人和浪漫伴侶之間"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":33,"stem":"根據學者對於依附風格（attachment styles）的研究，下列敘述何者錯誤？","options":{"A":"人們對人際關係的期待，基礎在於嬰兒時期與主要照顧者建立的關係","B":"屬於焦慮╱矛盾依附風格的人，其親密關係最短命","C":"人們表現出的依附風格會受情境影響，面對不同對象會展現出不同依附風格","D":"依附風格是一致且穩定的，不會受到經驗學習而有所影響"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":34,"stem":"假設現在你與一位陌生人兩人一組，連續進行了兩場討論式互動，在這兩次討論後的休息時間，你都在無意間聽到了對方對你的評價。根據Aronson和Linder所提出的得失理論（gain-loss theory），那一種情況出現時，你會最不喜歡對方？","options":{"A":"對方兩次都給你負向評價","B":"對方兩次都給你正向評價","C":"對方第一次給你負向評價，第二次給你正向評價","D":"對方第一次給你正向評價，第二次給你負向評價"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":35,"stem":"社會心理學家採取各種取向讓人們對環境有更負責的行為，其中一種取向是提醒人們社會規範的存在。關於社會規範的研究之敘述，下列何者正確？","options":{"A":"看見別人撿起紙袋是提醒描述性規範，可降低人們亂丟垃圾的比例","B":"清理環境中所有的垃圾，是強制性規範的最佳方式","C":"相較於一塵不染的環境，留下一小件垃圾的方式更能發揮描述性規範的提醒作用","D":"在維護環境整潔方面，顯示單一違反強制性規範的效果最好"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":36,"stem":"下列何種方法對於減少暴力行為最沒有效果？","options":{"A":"宣洩","B":"看到攻擊者受到懲罰","C":"獎勵非暴力行為","D":"明確指出攻擊不恰當"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":37,"stem":"社會助長（social facilitation）意指共同行動者或觀眾會使行為者表現提高的效果。下列關於社會助長的敘述何者正確？","options":{"A":"高激發狀態會使行為表現改進，與作業的難易度無關","B":"作業難度增加，會降低社會助長的效果","C":"當行為者對該作業比較不熟練，會有比較明顯的社會助長效果","D":"若是他人在場，會使行為表現者注意力範圍擴大，因此產生社會助長效果"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":38,"stem":"關於性別刻板印象的敘述，下列何者錯誤？","options":{"A":"性別刻板印象通常誇大兩性差異，也看到相同性別之人格特質的個別差異","B":"對女性抱持負面的刻板印象，認為女性天生比較不聰明、不懂數學和科學等，稱為敵意性別刻板印象","C":"慈善性別刻板印象雖然充滿溫情，其實是父權化態度","D":"對女性抱持正面的刻板印象，認為女性比男性更友善、更有同情心等，稱為慈善性別刻板印象"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":39,"stem":"當我們希望降低在牆壁上塗鴉的行為，以維持環境的整齊，若告示牌上寫「絕對禁止在牆上寫字」會比「請不要在牆上寫字」出現更多塗鴉的原因為何？","options":{"A":"抗拒理論（reactance theroy）","B":"免疫理論（inoculation theory）","C":"不可更改的承諾（unchangable commitment）","D":"認知失調理論（cognitive dissonance theory）"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":40,"stem":"如何「稱讚」才能對兒童產生長久的正面影響？","options":{"A":"不管兒童做什麼，都要大力稱讚","B":"在競爭後獲得勝利時，更要大力稱讚，讓競爭變成習慣","C":"要針對兒童的能力稱讚，讓他對自己的能力產生信心","D":"特別要針對其努力來稱讚，這樣兒童即使失敗，才會繼續努力"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null}]});

window.__EXAM_LOAD({"id":"112_2","year":112,"subjectIndex":2,"subject":"諮商與心理治療理論","essays":[{"num":1,"text":"阿信，大四學生，期末時匆忙去找諮商心理師，他很擔心這學期不及格的科目過多，可能會無法畢業 。阿信\n表示已經分別去找各科教授，請求給予及格分數，但未獲得肯定的答覆，於是他考慮是否先休學以躲過危機，\n但心裡又很猶豫，因為若有兩科及格就能畢業。 根據以上案例，試比較Rogerian取向以及Cognitive-behavioral\n取向的諮商心理師，在槪念化個案問題時有何不同？又依這兩種諮商取向，各會採取那些介入策略？（25分）","points":25,"reference":null,"rubric":null},{"num":2,"text":"試述阿德勒學派治療法（Adlerian Therapy）中生活型態（lifestyle）、虛構目標（fictional goals）、社會興趣\n（social interest）三者之概念及其在諮商上的意義，並論述此學派在兒童心理輔導上的應用。（25分）","points":25,"reference":null,"rubric":null}],"mc":[{"num":1,"stem":"有關諮商心理師被諮商的經驗，下列敘述何者錯誤？","options":{"A":"基於倫理考量，並不強制將被諮商的經驗納入訓練課程","B":"有被諮商的經驗，主要在強調其自我覺察的重要性","C":"在正式從事諮商之前，務必接受個別諮商","D":"被諮商的經驗有助於諮商心理師了解諮商歷程"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":2,"stem":"下列那個諮商理論取向最強調諮商關係的重要性？","options":{"A":"古典精神分析治療","B":"個人中心治療","C":"認知行為治療","D":"現實治療"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":3,"stem":"諮商歷程中，若諮商心理師經驗到難以克服的價值衝突，下列處理方式何者最不適切？","options":{"A":"審慎評估將手中的個案轉介給他人處理","B":"若諮商心理師的價值觀與諮商目標相符，則仍應堅持","C":"諮商心理師可考慮採取一種所謂「暫置括弧（bracketing）」的處置態度","D":"尋求專業督導的協助，以有效處理這些差異"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":4,"stem":"下列那一項榮格（Jung）學派的諮商技術是一種將意識中心的「自我」與「集體潛意識」連結的方法？","options":{"A":"字詞聯想","B":"主動想像","C":"自由聯想","D":"創造意象"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":5,"stem":"依據寇哈特（Heinz Kohut）的觀點，所謂「雙極的自體（bipolar self）」是由何者所組成？","options":{"A":"真我（true self）與假我（false self）","B":"貧弱自體（depleted self）與全能自體（omnipotent self）","C":"理想化自體（idealized self）與現實自體（actual self）","D":"自大自體（grandious self）與理想的父母形象（ idealized parental image）"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":6,"stem":"下列何者是精神分析／心理分析在初期晤談（initial set of interviews）時的原則？","options":{"A":"運用並列出治療大綱","B":"避免訂定分析合約","C":"進行完整且正式的歷史訪談","D":"個案憑直覺決定討論主題之優先次序"},"answer":"D","accept":["D"],"giveAll":false," window.__EXAM_LOAD({"id":"112_3","year":112,"subjectIndex":3,"subject":"諮商與心理治療實務與專業倫理","essays":[{"num":1,"text":"大宇今年40歲，結婚10年，太太也是上班族，育有一位7歲的女兒。他在原生家庭排行老大，父母都進入老年\n期，有一位弟弟和妹妹，弟弟定居美國，妹妹在大陸工作。大宇擔任國際汽車零件代理商的業務經理，需要經\n常在國內外出差。他擔心出差會影響他的婚姻，無法照顧年邁父母，且錯過女兒成長重要時刻，考慮轉換工\n作，因此前來生涯諮商。他希望可以轉換工作跑道，若你是大宇的諮商心理師，請以Super的生涯發展論觀\n點，分析下列問題：\n（一）大宇的生涯發展階段。（7分）\n（二）依據Super九種主要生命角色（life role）說明大宇的角色和任務。（10分）\n（三）請從他來談動機分析他的角色突顯（role salience）？（8分）","points":25,"reference":null,"rubric":null},{"num":2,"text":"成美是45歲的單親母親，獨力撫養兩個孩子，長子剛上大一，某天晚上長子主動告知成美自己是同性戀，成美\n難以接受，與孩子發生嚴重衝突。成美掙扎了一個月，與孩子關係日益惡化，因此求助社區諮商所的諮商心理\n師，希望與孩子恢復溝通，及自己難以接受同性戀的困擾，請從多元文化諮商觀點說明處理此個案時，諮商心\n理師應有之相關考量與策略？（25分）","points":25,"reference":null,"rubric":null}],"mc":[{"num":1,"stem":"國一的阿華在父母離異後，由父親取得監護權，但經常遭受父親的身體暴力對待，在無法委託代理人的情況下，依據家庭暴力防治法的規定，下列何者無法代替阿華向法院聲請通常保護令或暫時保護令？","options":{"A":"阿華的媽媽","B":"阿華的姑姑","C":"阿華的姨丈","D":"阿華的諮商心理師"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":2,"stem":"諮商心理師在進行危機處理的班級輔導時，下列何者最不適切？","options":{"A":"協助學生瞭解災難事件，讓學生談論受災經驗，表達害怕與憂慮","B":"進行非結構團體，依照團體成員的需求來調整時間與架構","C":"辨識創傷後壓力症候群學生","D":"介紹災害防治相關資源"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":3,"stem":"關於諮商專業保密，下列敘述何者正確？","options":{"A":"不論在任何場域任職的諮商心理師，都應該做到同樣的保密程度","B":"依據刑事訴訟法第182條，諮商心理師享有溝通特權（privileged communication）","C":"依據刑法316條，諮商心理師不得無故洩漏因業務知悉或持有之他人秘密","D":"即使個案願意放棄特權溝通，諮商心理師也應堅持溝通特權"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":4,"stem":"個案在諮商晤談中提及下列那一種情況，諮商心理師須立即進行預警或通報？","options":{"A":"林美美十分憤怒先生外遇在先，現在又提出離婚訴訟，她揚言要殺了先生","B":"小凱對於一再嘲笑他的同學非常生氣，他在書包放了一把水果刀，準備下課時給他們一點顏色瞧瞧","C":"小志今天數學又考不及格，他非常難過與無助，覺得自己不管再怎麼努力都沒有用，不如死了算了","D":"小堅對於自己被傳染上AIDS憤恨不已，他咒罵那個傳染給他的人"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":5,"stem":"不同專業組織的倫理守則雖然有差異，但是有一些共同的主題。下列何者不包括在這些共同主題之中？","options":{"A":"促進消費者的福祉","B":"避免剝削","C":"通報的相關規定","D":"維護個案的隱私權"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation": ions":{"A":"諮商心理師應在諮商時多列舉與思敏的雷同點，讓諮商心理師在後續諮商時可分享更多因應技巧","B":"諮商心理師應警覺自己在與思敏諮商時與其他諮商狀況的不同，並探求差異的可能原因","C":"諮商心理師應在督導時提出討論，以了解這種相似性是否已阻礙其聽到思敏的真正問題","D":"諮商心理師需重聽與思敏的諮商錄音帶，以了解諮商的內容是思敏的需求或是諮商心理師的需求"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":14,"stem":"下列何者不是諮商心理師應關注的事項？","options":{"A":"諮商心理師應有內在一致的理論基礎","B":"諮商心理師應注意個案在諮商過程中的經驗","C":"諮商心理師應注意不要造成對個案的傷害","D":"個案在求助之前都應該具體知道自己的問題是什麼，否則不利治療的進行"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":15,"stem":"關於諮商歷程中的移情與反移情，下列何者最容易對晤談效能造成負面影響？","options":{"A":"諮商心理師挑起的移情（therapist-induced transference）","B":"諮商心理師挑起的反移情（therapist-induced countertransference）","C":"個案挑起的移情（client-induced transference）","D":"個案挑起的反移情（client-induced countertransference）"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":16,"stem":"某諮商心理師預期將結束與某機構合作，須安排個案事宜，下列作法何者最不適當？","options":{"A":"召開轉案會議，將個案的資料提供給即將接手的諮商心理師","B":"剩下一次諮商時告知個案，以免個案對諮商結束過度焦慮和抗拒","C":"向個案強調新諮商心理師的優點和能力，以賦能新的諮商心理師","D":"提供至少三個機構內或外的相關訊息，讓個案有機會選擇適合的諮商心理師"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":17,"stem":"某諮商心理師跟一個患有憂鬱症子女的家庭進行初次晤談，下列諮商心理師的敘述何者最不適當？","options":{"A":"關於孩子的憂鬱情緒，之前曾接受過其他諮商嗎？ 效果如何？","B":"接下來有那些家人會來接受諮商呢？","C":"我定期會向一位督導諮詢，這裡有一份錄影同意書，請你們每一位在同意書上簽名","D":"我要求你們在諮商中做的練習，每一個人都必須參與"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":18,"stem":"關於立即性技巧，下列敘述何者正確？","options":{"A":"對於來自較保守與注重隱私家庭的個案，不宜使用立即性技巧","B":"這是一種後設溝通，諮商心理師要小心平衡對個案的挑戰與支持","C":"諮商心理師與個案討論諮商關係，並且建議個案調整互動方式","D":"強調個案的行為對他人的影響，並請其承擔起對引發諮商心理師感受的責任"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":19,"stem":"個案在晤談中自顧自地述說其生活經歷或目前的困境。下列關於此類喋喋不休個案之敘述或處遇方式，何者最不正確？","options":{"A":"個案的喋喋不休有時是一種防衛方式，藉此將諮商心理師維持在一段安全的距離之外","B":"喋喋不休的談話形式是一種陳述，非情感或認知行為的探索，較難帶來治療性改變","C":"諮商心理師若直接打斷個案的敘述，可能會妨礙治療關係，並讓個案覺得自己做錯了某些事","D":"諮商心理師謹慎地干涉、打斷個案說話，先同理個案在溝通上的困難，進而採用立即性技術指出個案的防衛是有效的處遇"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":20,"stem":"當諮商心理師對個案說：「自從妳的女兒受到性侵害之後，妳一直過得很痛苦，我在想妳是不是覺得她發生這件事，都是妳的錯？」諮商心理師的這段話是運用什麼諮商技巧？","options":{"A":"解釋","B":"面質","C":"立即性","D":"同理心"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":21,"stem":"下列生涯衡鑑工具，何者屬於「刺激清楚/反應模糊」類型？","options":{"A":"羅夏克墨漬測驗","B":"生涯興趣量表","C":"職業組合卡","D":"生涯信念量表"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":22,"stem":"關於Savickas敘事取向的生涯諮商技巧，下列敘述何者錯誤？","options":{"A":"聽取個案故事的陳述，並嘗試找出個案的生命主題","B":"協助個案將當下的生涯困境與生命主題加以連結，找出其關聯性","C":"重視此時此刻，認為未來無法把握，所以暫不討論","D":"發展並練習生涯決定的技巧"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":23,"stem":"關於生涯建構系統，下列敘述何者正確？","options":{"A":"生涯建構歷程受到認知複雜度的影響，朝向慎思、明辨與興趣三種狀態思考","B":"做決定歷程會受到個人的生涯信念例如對世界、對自己及特殊職業選擇的解釋與想法影響","C":"認知複雜度造成的影響可從認知分化性與認知理解能力評估","D":"個人的建構系統包含個人、家庭、社會與系統共四種方式"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":24,"stem":"Krumboltz等學者在二十世紀初期提出「善用機緣論（planned happenstance theory）」，下列何者錯誤？","options":{"A":"和生涯猶豫者（career indecision）討論生涯規劃不能實現的原因，尋求改進策略","B":"每一偶發事件都是機會，應培養抓住機會的態度","C":"嘗試冒險雖有其風險，但也帶來新的可能性","D":"積極協助個案從過去挫敗經驗中培養堅持力"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":25,"stem":"下列有關生涯決定的理念與敘述，何者正確？","options":{"A":"生涯決定的特性有「描述性取向」與「規範性取向」兩類，前者係對生涯決定進行結構性與邏輯性的研究","B":"「積極不確定論」係以直覺、開放的心靈來抉擇生涯；「個人主義論」強調生涯抉擇歷程的複雜性與獨特性","C":"「決定分析模式」較「因素刪除法」更擅長以理性、邏輯的方法來處理生涯抉擇的選項","D":"「因素刪除法」是以「預期效用論」為精神所發展出來的生涯抉擇模式，以電腦輔助生涯輔導系統為工具"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":26,"stem":"個案跟諮商心理師說：「我弟弟說他也想來，我下次可以帶他一起來嗎？」下列諮商心理師的回應，何者最不適當？","options":{"A":"「好哇！等下結束時，我們一起告訴弟弟，下一次他可以跟你一起來。」","B":"「你真的希望弟弟能一起來諮商，還是想知道我比較喜歡你還是弟弟？」","C":"「聽起來你想和弟弟一起分享你在這裡做的有趣的事。」","D":"「這段時間是專屬於我跟你的時間」"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":27,"stem":"國三的個案父親突然車禍過世，導師很擔心她會因此影響會考的表現，轉介到輔導室。晤談時個案表情鎮定，也要諮商心理師放心，她不會耽誤功課。下列諮商心理師的作法，何者最適切？","options":{"A":"諮商心理師發現個案沒有哀傷的反應，很驚訝的說：「你父親走了， 你怎麼可能不悲傷？在這裏你可以放心哭泣，老師會幫你保密。」","B":"諮商心理師肯定個案的理性，在會考前夕悲傷是沒有用的；要讓父親走得安心，只有收起悲傷，努力考上好學校，告慰亡父","C":"諮商心理師讓個案知道，面對親人過世出現的任何情緒都是可能的，諮商心理師會陪在她旁邊，陪她聊她想聊的事","D":"諮商心理師讓個案知道，如果她現在不好好的處理及面對哀傷，將造成未來心中的遺憾，發展成憂鬱症的可能性很高"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":28,"stem":"中年女性個案因考慮離婚內心矛盾而求助諮商，既興奮她的人生即將有新願景，又因為無法維持家庭的完整而有罪惡感。下列何者是諮商心理師最可能要協助個案面對的核心議題？","options":{"A":"孩子的安置問題","B":"個人自我與家庭自我之間的掙扎","C":"做決定的風格","D":"生涯規劃"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":29,"stem":"心理諮商必須要因應高齡者的需求來調整，下列諮商心理師的做法，何者不適用於高齡者？","options":{"A":"邀請個案進行生命回顧，重要的是鼓勵個案釋放他過去壓抑的強烈情緒","B":"以開放的心態向個案學習，因為個案的人生閱歷豐富","C":"放慢對話的速度進行會談，因為個案的老化帶來的影響","D":"使用個案成長年代所熟悉的詞彙，避免用專業的術語與其溝通"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":30,"stem":"兒子對母親說：「我不知道怎麼回答諮商心理師的問話」， 父親說：「你要自己回答，不然我們都不知道你在想什麼」， 母親接著說：「其實兒子很內向，面對陌生人常會不知所措。我想他的退縮拒學應該是跟他小學被霸凌有關。」下列敘述何者最不可能是系統觀的個案概念化？","options":{"A":"兒子過去被霸凌與現在的退縮行為之間的因果關聯性","B":"父母間看待兒子問題的差異與兒子退縮行為之間的關聯性","C":"母親幫助兒子的行為，對夫妻關係的影響","D":"兒子何以求助母親，以及母親何以扯父親後腿之間的關聯性"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":31,"stem":"由法院轉介接受強制諮商的家暴相對人認為自己沒有錯，因不能反抗法院命令，勉強前來諮商，諮商過程都只討論表面的問題幾乎沒有進展。諮商心理師因個人經濟因素默許個案以現有的方式參與諮商。該諮商心理師的行為屬於下列何種現象？","options":{"A":"潛意識的財務便利性（unconscious fiscal convenience）","B":"潛意識的法律程序（unconscious legal procedure）","C":"潛意識的興趣議題（unconscious interest issue）","D":"潛意識的壓迫議題（unconscious oppression issue）"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":32,"stem":"諮商心理師入校諮商時發現個案遭受學校教師不當體罰，依據校安通報流程，下列諮商心理師的作為何者最適當？","options":{"A":"即刻通報當地教育局處，由當地教育局處介入處理","B":"即刻告知學校輔導室聯繫窗口，由輔導室依據校安通報流程進行通報","C":"即刻通報該縣市學生輔導諮商中心，由中心進行通報","D":"即刻告知校長，由校長責成相關處室進行調查後再通報"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":33,"stem":"關於企業諮商的敘述，下列何者錯誤？","options":{"A":"主要目的在協助員工個人自我探索與情緒議題","B":"企業諮商又常被稱為員工協助方案","C":"受限於經費考量，通常採短期諮商模式","D":"以減輕工作壓力 體開始階段的敘述，下列何者最適當？","options":{"A":"尊重成員的狀態，並讓成員自己決定在團體中積極參與的程度","B":"通常前兩次聚會成員處於不知所措的狀態，因此應採用高強度指導策略","C":"成員易帶著「公共形象」參與團體，領導者宜設計活動讓成員卸下虛假的面具","D":"團體開始前對成員進行篩選，不會影響成員參與團體彼此之間的信任感"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":8,"stem":"根據Yalom對於進階（advanced）團體衝突的說明，下列敘述何者錯誤？","options":{"A":"團體衝突是無法避免的，缺少時會阻礙團體發展","B":"投射性認同（projective identification）是團體產生敵意及衝突的來源之一","C":"競爭是團體衝突的來源之一","D":"凝聚力越高的團體若發生衝突，更會帶來危機"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":9,"stem":"關於領導者處理團體結束階段的敘述，下列何者正確？","options":{"A":"當領導者經驗到團體結束時不舒服的感受，應與督導討論，而非跟成員分享經驗","B":"領導者鼓勵成員分享團體外愉快的經驗，可協助成員處理團體結束的痛苦","C":"領導者應協助成員收集彼此的聯絡資訊、安排社交聚會，以協助度過失落的感受","D":"成員可能會否認或忽略團體結束的感受，領導者應帶領成員正視即將結束的事實"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":10,"stem":"在人際取向的諮商與心理治療團體初期，領導者的帶領策略，何者最不適當？","options":{"A":"採取歷程取向的而非內容取向的領導策略","B":"運用團體資源協助成員解決問題","C":"使用示範來建立團體信任感","D":"幫助成員訂定個人的目標"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":11,"stem":"面對團體的轉換階段，下列領導者的行為，何者最不適當？","options":{"A":"清楚了解該階段的特徵與動力的發展","B":"理性分享自己在轉換階段中的焦慮與抗拒","C":"支持成員彼此之間可以相互依賴，並擁有自主性","D":"協助成員面對焦慮與處理防衛，以及成員間的衝突"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":12,"stem":"對於已進入工作階段的大學生自我探索諮商團體，每次聚會為2小時，下列領導者的行為何者最適當？","options":{"A":"每次在設計活動方案時，會額外準備一個計畫，以備不時之需","B":"每次聚會皆聚焦在一兩位最需要協助的成員，以深化團體療效並提升利他性治療因素","C":"每次聚會開始時讓成員相互噓寒問暖20分鐘，除可增加團體凝聚力外，亦可作為暖身活動","D":"某次聚會內容設計為觀看與自我探索相關電影100分鐘，之後進行15分鐘的心得分享與討論"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":13,"stem":"Corey建議學習者可逐步發展團體領導者的特質，下列敘述何者最正確？","options":{"A":"願意開放自己的感受，並在有情緒感受時能立即表達","B":"對團體歷程的價值深具信心，相信適度催化，團體自有療效","C":"努力幫助所有成員改變，形成記錄做為下個團體希望感的示範","D":"修習更高的學歷，在團體中多說明自己曾經帶領過的成功經驗"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":14,"stem":"領導者帶領大學生人際關係團體時，對於那些成員間的對話需要設限？","options":{"A":"你到底交過多少女朋友？你跟她們都有過性行為嗎？","B":"你有過被同學背叛的經驗！其實我也有過","C":"我覺得只要講真話就會得罪人，怎麼做都無法讓同學滿意？所以同學間不需要說清楚","D":"你喜歡XX明星嗎？我超喜歡她的，她不僅有才藝又很漂亮"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":15,"stem":"關於繞圈發言技術的敘述，下列何者最適當？","options":{"A":"可用在團體開場的對焦，以及活動結束後的感受整理","B":"繞圈通常由領導者左手邊做開始，最後結束在領導者右手邊","C":"是最常用的技術，幾乎不需任何設計，團體沉默時就可使用","D":"僅適宜能用一句話、一個詞或數字簡單表達意見的時機，以免占用團體時間"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":16,"stem":"關於使用回饋（feedback）的敘述，下列何者最不適當？","options":{"A":"團體初期儘量不使用面質性和矯正性回饋","B":"成員彼此使用措辭不當的矯正性回饋易產生反效果","C":"對衝突較高的成員提供消極性回饋易產生正向效果","D":"對整個團體給予任務回饋，有助於凝聚力的發展"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":17,"stem":"關於Yalom對團體凝聚力（group cohesiveness）的看法，下列何者錯誤？","options":{"A":"在團體中被接納與重視，常常是團體成員改變的主要助力","B":"團體凝聚力有助於成員避免團體早期的挫折感","C":"團體凝聚力提供了成員安全感及精神支持","D":"高凝聚力的團體，成員能放心地自我探索，尋求人際間的回饋與實驗新的行為"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":18,"stem":"領導者在非治療性團體中，遇到特定成員可能需要心理治療時，下列何種反應最不適當？","options":{"A":"思考與決定此時此刻進行治療是否有足夠的時間","B":"思考與判斷自己的專業訓練是否能夠承擔治療的責任","C":"徵詢其他成員是否願意將團體焦點改換到對該成員的簡短治療","D":"鼓舞該成員機不可失，立即建議他在團體中接受協助"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":19,"stem":"成員甲在前一次團體因深度揭露，在團體進行到中途暫時離開，回到團體時表示謝謝大家的關心；然而在本次團體開始後，原本都很準時出席的甲卻沒有出現，團體此時的討論有點散漫，出現沉默的互望。下列領導者的作法，何者最不適當？","options":{"A":"描述前次及這次的團體現象，請成員分享對此現象的想法","B":"反映甲這次沒有出現，似乎對今天的團體產生了影響","C":"在沉默時，請成員繞圈說說現在的感受或在想什麼","D":"建議成員回到前次討論熱烈的話題，帶回高峰氣氛"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":20,"stem":"關於團體成員間有衝突或敵意時的處理，下列何者最不適當？","options":{"A":"領導者可以在衝突當下面質雙方，使他們有不同於過往的經驗","B":"衝突若是來自其中某成員特異的行為型態，建議其離開團體，轉介個別諮商","C":"成員衝突可能是團體外的人際互動型態，領導者可運用團體來協助成員有新的洞察","D":"當衝突嚴重，必要時可請其中一位或兩位成員離開團體"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":21,"stem":"關於團體成員沉默的處理，下列何者最不適當？","options":{"A":"團體初期，領導者不用刻意打破沉默，等待成員發言即可","B":"從團體發展歷程來看，成員沉默易在團體初期發生","C":"團體中，當成員思考某個事件或議題時，領導者不宜太快打破沉默","D":"成員環顧團體、迴避眼神接觸、等別人分享的沉默是正常的，領導者無需做太多介入"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":22,"stem":"移情可以是團體歷程的有效治療工具，但領導者必須善加利用並解決它。下列何者是Yalom提到促進移情解決的方法之一？","options":{"A":"加強成員篩選工作","B":"催化成員自我揭露","C":"進行一致性確認","D":"減少領導者的透明度"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":23,"stem":"關於保護成員免於參加團體可能遇到的風險，下列何者錯誤？","options":{"A":"謹慎地篩選團體成員","B":"提醒已經做出情緒宣洩的成員不要退出團體","C":"鼓勵成員將團體所學應用到生活中的重大決定","D":"強調成員自己決定要探討什麼及探索的深度"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":24,"stem":"關於團體諮商的倫理考量，下列何者正確？","options":{"A":"當團體成員猶豫不決是否要揭露特定資訊時，領導者應介入瞭解其困擾及說明保密原則","B":"領導者應鼓勵成員做深入探索，以增加個人成長","C":"領導者應建議有自傷危機的成員，同時與領導者做個別諮商及團體諮商","D":"領導者應對自己的受訓背景保密，以避免發生雙重關係"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":25,"stem":"關於團體諮商中非自願個案的處理策略，下列敘述何者錯誤？","options":{"A":"當有兩個或兩個以上的團體時，可以尊重個案的選擇來安排團體諮商","B":"領導者應該儘可能的讓非自願個案瞭解團體相關事宜，例如團體性質、主題與目標......等","C":"團體初期宜避免非自願個案分享對於參與團體的感受，例如失去選擇的自由、對團體的擔心與害怕等，以增加團體凝聚力","D":"事先告知非自願個案會將其在團體中的表現與進步等，會被回報給轉介單位，讓非自願個案在知情的情況下，決定自己如何參與團體"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":26,"stem":"關於團體領導者的能力養成與技術運用，下列敘述何者不符合倫理考量？","options":{"A":"領導者須具有敏銳的自我覺察，並瞭解個人特質對於團體的影響","B":"使用各種技術來測試團體成員的反應與想法，以增進領導者的技術熟練度與能力","C":"熟悉團體諮商的歷程階段和成員角色，具備團體動力和團體治療的基礎知識","D":"使用團體技術時應預先保留充分時間，以處理成員高漲的情緒"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":27,"stem":"根據Yalom對個別諮商與團體諮商效果的整理，下列何者錯誤？","options":{"A":"在團體中，因為領導者與成員的專注傾聽，使成員比在個別諮商時更易沈迷與專注於自我狀態","B":"在團體中，當成員A給B建議時，此歷程可能因為A傳達的是對於B的興趣與關懷，而對團體有助益","C":"成員會帶著與家人互動或衝突的方式，與領導者及其他成員互動，這些衝突在個別諮商中會較晚出現","D":"對自戀型的當事人而言，團體諮商較會使當事人被注意的渴求浮現"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":28,"stem":"關於老人哀傷失落團體的敘述，下列何者最適當？","options":{"A":"老人多數已經歷過多種不同的死亡事件，故而面對重要他人過世事件，其影響已較不嚴重","B":"為避免老人重新經歷失去親人的痛苦，宜在團體中教導成員隔離接觸已逝者物品的重要性","C":"哀傷團體的目的不在協助儘快回復正常，而是在共同陪伴中接納哀傷過程會產生的各種反應","D":"在團體過程中，宜儘量避免擁抱或各種身體接觸的活動設計，以預防哀傷團體中產生依賴或移情的後果"},"answ "explanation":null},{"num":14,"stem":"關於老年虐待與忽視，下列敘述何者正確？","options":{"A":"對老年虐待已經有精確的定義","B":"不同文化族群對老年虐待的定義與看法是一致的","C":"老年虐待最普遍的虐待形式是忽視","D":"大多數老年虐待的施虐者是看護人員"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":15,"stem":"依據美國相關研究指出，孱弱老人的居住選擇與心理健康，下列敘述何者正確？","options":{"A":"由於「地方感」（sense of place），在家老去具有心理意義","B":"生活輔助機構比護理之家可以提供更密集與適切的醫療照顧","C":"通常老年人居住於護理之家是年長者自己做的決定","D":"居住在家中的孱弱老人罹患憂鬱症比長期照顧機構中較高"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":16,"stem":"不同人格取向的理論，對憂鬱有不同的解釋，下列敘述何者錯誤？","options":{"A":"根據精神分析取向的看法，憂鬱是朝向內在的攻擊","B":"特質論者所關心的是如何找出具有憂鬱傾向的人","C":"人本取向的人格心理學家以童年創傷經驗來解釋憂鬱","D":"行為論者主張憂鬱源自生活中缺乏正增強物"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":17,"stem":"人格心理學家們定義了四種在研究中可能會用到的資料類型，又稱之為LOTS資料。關於這四種資料類型的敘述，下列何者錯誤？","options":{"A":"L資料是由個人生活史或生活紀錄中獲得的資料所組成，然而許多心理特徵，較難透過此類客觀資料獲得","B":"O資料是由父母、朋友或老師等熟知個體的觀察者所提供的資料所組成，主要來自對特定或一般行為的觀察","C":"T資料是透過實驗程序或標準化測驗獲得，比如說個體在標準化智力測驗上的表現","D":"S資料是由研究參與者自己報告的資料所組成，然而透過網路問卷得到的資料，常常和傳統施測方式所得到的資料結果有極大差異"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":18,"stem":"在精神分析的理論中，過去的罪惡感與焦慮阻礙了成長，而分析情境卻使個體有機會重新處理過往的衝突。關於此一主張，下列敘述何者錯誤？","options":{"A":"過往的衝突可以在較安全的情境中進行處理","B":"個案接受分析時已較年長成熟，能利用自我中已發展的部分，應付尚未發展好的心理運作方式","C":"諮商心理師採取與個案父母不同的態度來處理","D":"個案在接受分析時能夠增進自我效能"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":19,"stem":"Freud 提出的那一個發展階段跟性格的支配、權力與控制感有關？","options":{"A":"口腔期","B":"肛門期","C":"性蕾期","D":"潛伏期"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":20,"stem":"當人們不喜歡自己的某些特徵，而說是別人的，是使用何種心理防衛機制以減少焦慮？","options":{"A":"隔離（isolation）","B":"反射（reflection）","C":"投射（projection）","D":"移情（transference）"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":21,"stem":"根據Adler取向研究的觀點，尋求報復、攻擊他人，最符合下列何種生活風格（style of life）？","options":{"A":"支配型","B":"獲得型","C":"逃避型","D":"矛盾型"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":22,"stem":"Horney認為個體為了因應基本焦慮，可能會對他人極為順從，藉以獲得他人的接納與贊同。這是屬於下列何種神經質傾向？","options":{"A":"趨近型神經質傾向","B":"反抗型神經質傾向","C":"逃避型神經質傾向","D":"矛盾型神經質傾向"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":23,"stem":"長期被毆打的妻子多次試圖離家，但是皆被丈夫發現而更嚴厲地毆打她。之後，即使丈夫仍持續毆打她，她也不再試圖逃離家。下列那一個選項最適合說明這位妻子的反應？","options":{"A":"斯德哥爾摩症候群（Stockholm syndrome）","B":"負增強（negative reinforcement）","C":"習得無助（learned helplessness）","D":"懲罰（punishment）"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":24,"stem":"關於Skinner的性格理論敘述，下列何者錯誤？","options":{"A":"Skinner不強調性格結構，因為不可見的性格結構無法直接觀察","B":"行為是對情境影響力的適應，因此行為具有跨情境的一致性","C":"人類行為不可避免地受制於所經驗到的環境","D":"Skinner認為自己是用新的方式思考行為以取代性格理論"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":25,"stem":"關於個人中心治療的特性，下列何者錯誤？","options":{"A":"強調治療者與個案所建立的關係","B":"相信個案改變行為的能力","C":"強調指導個案談話內容的重要","D":"強調治療之初，個案的內心是不一致的"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":26,"stem":"關於自我揭露的研究，下列何者正確？","options":{"A":"自我揭露越多的人，擁有越好的親密關係","B":"以書寫方式揭露個人創傷經驗有益於心理健康","C":"人本取向主張個案在心理治療需要自我揭露，但諮商心理師則不宜自我揭露","D":"親密朋友或伴侶之間會出現最高程度的自我揭露回報性"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":27,"stem":"社會認知理論認為人們之間的差異，主要是因為下列何者的不同？","options":{"A":"原型（archetypes）","B":"特質組成（traits）","C":"能力（competencies）","D":"自我實現（self-actualization）的程度"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":28,"stem":"根據文化心理學對文化與心智的研究，下列敘述何者錯誤？","options":{"A":"不同文化的人對於自我和社會，具有相當不同的基模","B":"人類的心智就像是充滿各式工具的箱子，但文化會影響人們常使用的工具","C":"所有類型的思考方式，都會受到文化影響","D":"文化會強烈影響我們對世界的記憶和注意力"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":29,"stem":"小明看了一部刺激的警匪片，回家路上看到警察在臨檢一群機車。因為剛看過電影，小明覺得那些機車騎士像是飆車族，很可能會和警察起衝突。小明的想法可以用下列何者解釋？","options":{"A":"控制式思考（controlled thinking）","B":"促發作用（priming）","C":"社會誘導（social induction）","D":"觀察學習（observational learning）"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":30,"stem":"關於基本歸因謬誤（fundamental attribution error）的定義，下列何者最佳？","options":{"A":"團體決策不論是否經過特定的基本歷程，都一定有失誤的可能性","B":"對行為的解釋偏重個人特性的因素，低估環境因素的影響力","C":"團體決策過程若是沒有經過特定的基本歷程，很可能會出現失誤","D":"對行為的解釋偏重環境因素，低估個人特性因素的影響力"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":31,"stem":"心理學家Carol Dweck（2006）將人們對於自己能力的信念區分為固定心態和成長心態兩種，下列敘述何者正確？","options":{"A":"固定心態無法改變成為成長心態，成長心態可以改變成為固定心態","B":"固定心態可以改變成為成長心態，成長心態無法改變成為固定心態","C":"固定心態可以改變成為成長心態，成長心態也可以改變成為固定心態","D":"固定心態無法改變成為成長心態，成長心態也無法改變成為固定心態"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":32,"stem":"小敏學科考試不及格，覺得自己很差勁。陳老師鼓勵她：「有好幾位同學考得比妳差，況且，妳雖然考試表現不如預期，但妳很有領導能力。」陳老師企圖協助小敏採用那些作法來保有自尊？","options":{"A":"社會比較、自我肯定","B":"調整歸因、恐懼管理","C":"社會比較、焦慮管理","D":"自我肯定、恐懼管理"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":33,"stem":"下列何者屬於向上社會比較（upward social comparison）？","options":{"A":"張姓營業員查閱了前一個月所屬部門中各個營業員的業績","B":"月領基本工資的林先生發現其他兄弟賺的錢比自己少，因而感到寬慰","C":"陳同學比對自己的詩作和詩人余光中的詩作，發現自己寫作技巧不足之處","D":"運動選手李先生檢視自己上次比賽的成績，期許自己這次比賽能有更好的成績"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":34,"stem":"在「無可救藥愛上你（Possession）」這部影片中，A. S. Byatt的一句名言「我既無法讓你將我燒盡，亦無法抗拒你。沒有人能夠站立於火中而不被消耗殆盡。」。依Sternberg提出愛情三角理論，這句電影台詞包含了那兩個元素？","options":{"A":"親密（intimacy）與熱情（passion）","B":"熱情（passion）與承諾（commitment）","C":"承諾（commitment）與親密（intimacy）","D":"友誼（friendship）與親密（intimacy）"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":35,"stem":"在Byrne等人（1986）所提出的吸引力兩階段模式（two-stage model of the attraction process）中，下列何者為影響兩個階段篩選吸引對象的主要因素？","options":{"A":"相似性","B":"需求互補性","C":"時空接近性","D":"外表吸引力"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":36,"stem":"關於團體凝聚力與團體工作表現兩者之間的關係，下列何者正確？","options":{"A":"兩者關係在大團體中最為明顯","B":"兩者關係不受到工作性質的影響","C":"兩者關係不受到團體規範的影響","D":"兩者互相影響，且後者影響前者較大"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":37,"stem":"佳佳開車上班時，遇到闖紅燈的車輛而差點被撞。驚魂未定地趕到辦公室準備開會，卻發現秘書沒有準備好開會的資料。佳佳一反平常的溫和告誡，破口大罵。此為下列何種現象？","options":{"A":"敵意歸因偏誤（hostile attributional bias）","B":"媒體暴力影響","C":"激發遷移（excitation transfer）","D":"激怒與報復"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":38,"stem":"下列何者不是演化心理學解釋人願意犧牲自己來幫助別人的利社會行為？","options":{"A":"近親選擇","B":"回報規範","C":"助人的代價與酬賞","D":"團體選擇"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":39,"stem":"某高中禁止同學在校內抽菸，結果卻讓一些不抽菸的同學產生很高的興趣，因而偷抽菸，這種現象最可以用什麼理論來說明？","options":{"A":"自我辯證理論","B":"行為計劃理論","C":"抗拒理論","D":"增強理論"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":40,"stem":"在嚴格控制的實驗室裡，當你看電腦中的影片，螢幕上快速閃過｢喝芒果可樂｣的字樣。根據閾下知覺的研究，下列敘述何者最正確？","options":{"A":"你會選擇喝芒果可樂，但只有在你口渴的時候","B":"不論你是否口渴，都會選擇喝芒果可樂","C":"你更不會想要喝芒果可樂","D":"不論你是否口渴，都會選擇喝自己喜歡品牌的可樂"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null}]});

window.__EXAM_LOAD({"id":"113_2","year":113,"subjectIndex":2,"subject":"諮商與心理治療理論","essays":[{"num":1,"text":"19歲大一獨生女，父母均在工作。因先天少一隻手而住進身障生宿舍。母親從小非常照顧個案，雖然個案生\n活自理沒問題，但因第一次離家住宿，母親擔心其不適應，每隔一、兩週會到宿舍幫忙整理打掃，也會要求\n同學多幫忙。雖對個案生活有助益，但也讓個案感到自己無能。個案不希望母親常來學校，但不知如何溝\n通，因此尋求諮商，希望自己可以和其他同學一樣生活。此外，個案目前學業尚無壓力，但受限於肢體障礙\n無法參與班上許多活動，覺得與同學有些疏離、無談得來的同學。請以上述案例，說明採用「當事人中心治\n療取向」可能的諮商目標、對個案之心理評估、介入策略或技術及此取向可能的限制。（25分）","points":25,"reference":null,"rubric":null},{"num":2,"text":"請說明敘事治療 (narrative therapy) 的目標為何？治療歷程為何？並舉出個案與諮商心理師的對話來說明\n治療歷程。（25 分）","points":25,"reference":null,"rubric":null}],"mc":[{"num":1,"stem":"關於新手諮商心理師如何兼顧專業性並保持個人性，下列敘述何者錯誤？","options":{"A":"自我照顧是對諮商心理師的倫理要求","B":"要能做到自我照顧，當務之急即是諮商心理師學會自我監控","C":"為防止專業耗竭，新手諮商心理師應隨時檢視並覺察自己的身心狀態","D":"即便諮商心理師忽略了自我照顧，個案仍然可以得到最好的協助"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":2,"stem":"關於諮商歷程中諮商心理師對於價值觀所持的立場，下列敘述何者正確？","options":{"A":"應做到完全的客觀與中立","B":"可表達與個案問題有關的某些價值觀，但不強迫其接受","C":"諮商心理師應堅決表達自己的觀點，才能影響個案","D":"透過任何形式表達個人的價值觀均是不被允許的"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":3,"stem":"關於諮商關係中的責任承擔，下列敘述何者錯誤？","options":{"A":"諮商的成效應由諮商心理師與個案共同承擔責任","B":"訂定契約會是讓個案為自己負責的好方法","C":"諮商關係開始即應對責任的分擔進行討論","D":"擬定合適的治療計畫不應是諮商心理師的責任"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":4,"stem":"依據心理動力學派的觀點，倘若個體無法融合對自己或他人的愛與恨，可能會將兩種感覺彼此區隔，此一內在歷程為何？","options":{"A":"分裂 （splitting）","B":"解離（dissociation）","C":"隔離（isolation）","D":"反向作用（reaction formation）"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":5,"stem":"某諮商心理師觀察到當個案具有強烈自我專注、需要大量讚賞、情感空洞、剝削傾向以及寄生性的人際關係等特質。依據上述，其最可能的評估為何？此觀點是何人所提？","options":{"A":"自戀型人格；肯伯格（Otto Kernberg）","B":"邊緣型人格；肯伯格（Otto Kernberg）","C":"自戀型人格；寇哈特（Heinz Kohut）","D":"邊緣型人格；寇哈特（Heinz Kohut）"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":6,"stem":"關於榮格（Jung）學派對「象徵（symbols）」的觀點，下列何者正確？","options":{"A":"象徵起於和諧與統整","B":"象徵是意識的凝聚物","C":"象徵為自我提供能量","D":"象徵是諮商心理師所提供的治療性隱喻"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":7,"stem":"阿德勒學派運用生活型態評估技術的目的，下列何者正確？","options":{"A":"找出個案因應生活任務的模式","B":"了解個案生命經驗中的優勢力量","C":"找出個案阻礙自我覺察的原因","D":"徹底修正個案人格結構"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":8,"stem":"下列那一種諮商關係，最能描述阿德勒治療的主張？","options":{"A":"合作的平等關係","B":"當下同在的經驗","C":"我／汝（I/thou）的關係","D":"積極無條件關懷"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":9,"stem":"關於阿德勒學派治療中的「鼓勵（encouragement）」，下列敘述何者正確？①鼓勵的目的是幫助個案生出勇氣 ②鼓勵的過程，為激發與強化個案社會興趣的關鍵所在 ③鼓勵不是一種技術，而是諮商心理師的治療處遇態度 ④如果個案覺得他自己的改變是不可能的，諮商心理師必須努力鼓勵個案相信，進步與改變是可能的","options":{"A":"僅①②③","B":"僅②③④","C":"僅①③④","D":"①②③④"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":10,"stem":"關於存在主義治療的治療關係之敘述，下列何者錯誤？","options":{"A":"諮商心理師與個案在治療的過程中本真（authentic）交會","B":"在治療的過程中，諮商心理師與個案充分的同在","C":"過度專注移情關係，不會影響到諮商心理師與個案間的本真（authentic）關係","D":"諮商心理師應對自己保持本真（authentic），並本真地對個案開放"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":11,"stem":"關於存在主義治療的敘述，下列何者錯誤？","options":{"A":"具有特定的治療技巧與方法","B":"協助個案處理人類自由與責任的議題","C":"檢驗個人對自我的察覺","D":"協助個案處理人類存在與死亡的議題"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":12,"stem":"針對存在主義治療與個人中心治療的共同點的敘述，下列何者錯誤？","options":{"A":"兩者皆認為治療關係是治療的核心","B":"兩者都受到現象學的影響","C":"兩者都認為選擇的焦慮會驅使我們追尋生命意義","D":"兩者都強調個案的自我覺察"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":13,"stem":"提出「我／汝（I/thou）」這個概念的人是下列何者？","options":{"A":"Carl Rogers","B":"Maslow","C":"Yalom","D":"Büber"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":14,"stem":"大德經常酒後對伴侶施暴，下列何者是個人中心取向的諮商心理師最有可能採取的問題概念化觀點？","options":{"A":"大德想要被愛，卻經驗到不被伴侶接納的不一致經驗","B":"大德也是暴力的受害者，是暴力代間傳遞的結果","C":"大德對憤怒的衝動控制能力不足，需要透過諮商加以訓練矯正","D":"與伴侶互動的經驗勾起大德過去的受暴經驗，需透過諮商幫助他覺察憤怒情緒的來源"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":15,"stem":"關於動機式晤談的敘述，下列何者正確？","options":{"A":"是由 William R. Miller 和 Leslie Greenberg 所創","B":"是以個案為中心的一種非指導性治療方法","C":"諮商心理師運用面質、駁斥技巧，挑戰個案的抗拒，以增加改變的動機","D":"諮商心理師喚起個案的不一致和矛盾，增進個案想要改變的內在動機"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":16,"stem":"關於完形治療取向的核心精神，下列敘述何者正確？","options":{"A":"重視單一線性因果模式","B":"強調絕對客觀的真實","C":"重視個體與外在環境的關聯","D":"強調心智與身體二元對立"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":17,"stem":"小畢在辦公室對同事的要求有求必應不敢拒絕。諮商心理師要求他扮演一個拒人於千里之外的角色，諮商心理師最可能是運用下列何種技術？","options":{"A":"嫌惡練習","B":"預演練習","C":"誇大練習","D":"倒轉練習"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":18,"stem":"個案上課時將作業撕毀並辱罵老師，諮商心理師協助其評量自己的行為時，下列問話何者最不符合現實治療的精神？","options":{"A":"你的行為對你有幫助還是有害？","B":"老師做了什麼讓你這麼生氣？","C":"你做的事可以得到你想要的嗎？","D":"若有一個人在上課時做你所做的事，是否恰當？"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":19,"stem":"關於少數族群使用現實治療的注意事項，下列敘述何者錯誤？","options":{"A":"環境的限制會使得少數族群的個案難以自主的選擇","B":"過分強調個案能為自己的生活負責時，會讓個案覺得不被瞭解","C":"諮商心理師可幫助個案找到屬於自身認同的身分及主流文化間的平衡","D":"少數族群的壓力過重，不宜期待他們做出改變社會的行動"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":20,"stem":"下列何者不是現實治療的評估工具？","options":{"A":"個案目標報告表（client goal report form）","B":"學生需求調查（the Students Need Survey）","C":"基本需求自我檢測（the Basic Needs Self Assessment）","D":"功能評估量表（functional assessment）"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":21,"stem":"關於行為治療的貢獻，下列何者錯誤？","options":{"A":"幫助個案把模糊的目標化為具體的行動計畫","B":"提供諮商心理師多樣的治療技術","C":"將治療焦點從治療者權威轉移到治療關係","D":"發展以證據為基礎的治療法以確認效果"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":22,"stem":"關於正念認知治療（MBCT）八個階段本質，下列敘述何者錯誤？","options":{"A":"辨認經驗與思考","B":"聚焦於維持，並擴張新的學習","C":"學習接納與放下","D":"詮釋意義挑戰認知"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":23,"stem":"重視個案的正向資源和經驗是許多心理治療理論的觀點，下列那項治療法較少強調個案的正向資源和經驗？","options":{"A":"阿德勒學派","B":"焦點解決治療","C":"現實治療","D":"精神分析治療"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":24,"stem":"上課的時候李強故意發出怪聲，但宋老師不予理會，仍然繼續上課。宋老師的做法屬於下列何者？","options":{"A":"消弱（extinction）","B":"隔離（isolation）","C":"增強（negative reinforcement）","D":"系統減敏感法（systematic desensitization）"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":25,"stem":"關於認知治療的機轉，下列敘述何者錯誤？","options":{"A":"改變個案功能失調的假設，會導致有效的認知","B":"在情緒未被激發的情況下，思考也能被察覺及加以修正","C":"個案覺得一個問題情境已構成真正威脅時，他才會產生改變","D":"單只是激發情緒及伴隨的認知，並無法促成持久性的改變"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":26,"stem":"關於家族治療的系統觀點，下列敘述何者錯誤？","options":{"A":"從系統的脈絡去理解個案的問題","B":"從系統的脈絡為個案的症狀下診斷","C":"從系統的資源來尋求解決之道","D":"認為改變的途徑不只侷限在個人身上"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":27,"stem":"下列那一項家族治療的理論概念最可能因中西文化差異，而導致對此現象的不同解讀？","options":{"A":"代罪羔羊","B":"分化與界限","C":"代間傳遞","D":"雙重束縛"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":28,"stem":"下列那一個家族治療取向的諮商心理師，其態度最不具教育與指導性成分？","options":{"A":"多世代取向","B":"阿德勒取向","C":"結構取向","D":"薩提爾取向"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":29,"stem":"面對在學校打架的兒子，父親在家庭會談中對諮商心理師說：「這孩子太任性，完全沒有考慮我工作那麼辛苦是為了什麼？」，下列諮商心理師的回應何者最符合「循環問話」？","options":{"A":"對於爸爸說的辛苦，媽媽你覺得是誰造成的呢？","B":"聽起來爸爸是辛苦的，媽媽你怎麼看爸爸說的辛苦呢？","C":"聽起來爸爸是辛苦的，兒子你覺得和你打架的事情有關嗎？","D":"爸爸要不要多說一點，你的辛苦是什麼呢？"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":30,"stem":"關於結構取向家族治療學派的介入技巧，下列敘述何者錯誤？","options":{"A":"評估家庭互動","B":"評估家庭失功能模式","C":"融入與適應","D":"過去的例外"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":31,"stem":"個案認為因自己無法生育而導致丈夫外遇都是自己的錯，諮商心理師協助個案檢視社會壓力灌輸女性必須生育的概念，而將問題重新思考並非是個案的過失。這是女性主義諮商的那個策略？","options":{"A":"權力干預","B":"賦權","C":"自我肯定","D":"重新詮釋"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":32,"stem":"關於女性主義取向，下列敘述何者最正確？","options":{"A":"性別議題與個人在種族、社經階層、性別取向等層面的認同有關","B":"將性別與權利視為治療歷程的核心","C":"奠基於瞭解性別脈絡對個人問題之影響","D":"意識覺醒團體促成了以「專業協助」取代「自我協助」"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":33,"stem":"CACREP認為諮商心理師多元文化能力所涉及的內容，包含下列那些向度？①權力與特權對諮商心理師與個案的影響 ②個案的求助行為 ③靈性信念對諮商心理師與個案的影響 ④諮商心理師的多元文化諮商能力","options":{"A":"僅①②③","B":"僅②③④","C":"僅①③④","D":"①②③④"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":34,"stem":"關於多元文化中「社會正義取向（social justice approach）」的諮商原則，下列敘述何者正確？①個案遇到的問題可能是社會系統與環境的問題 ②違反社會常規的行為不一定是不健康或失調的 ③要在依循社會的常規之下挑戰主流的想法或制度 ④要同等看重預防與治療","options":{"A":"僅①②","B":"僅②③","C":"①②③","D":"①③④"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":35,"stem":"亞洲的心理治療，其背後常見的哲學觀點和人格理論，不含下列何者？","options":{"A":"強調主觀經驗，而非邏輯","B":"重視個人成就與滿足個人需求","C":"強調自我與天地萬物的融合","D":"強調關係的相互依賴"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":36,"stem":"關於敘事治療的治療技術，下列敘述何者錯誤？","options":{"A":"治療有其程序和步驟","B":"以提問作為治療方法之一","C":"欣賞與賦能個案","D":"諮商心理師保持好奇的態度"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":37,"stem":"下列何者不是服膺社會建構觀點的後現代取向治療方法？","options":{"A":"焦點解決取向","B":"合作對話取向","C":"阿德勒治療","D":"敘事治療"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":38,"stem":"關於焦點解決短期治療第一次諮商後的晤談開場，下列敘述何者錯誤？①常會以「有沒有比較好一點？」作為開場的詢問 ②開始晤談時會探討有進展的理由，是因為相信「解決之道，主要建構於對例外的知覺」③當個案沒有進展時，要檢視個案有無徹底執行前次回饋中的建議","options":{"A":"僅①②","B":"僅②③","C":"僅①③","D":"①②③"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":39,"stem":"下列何者並非心理劇常見的使用技術？","options":{"A":"角色互換（role reversal）","B":"替身（double technique）","C":"過去投射（past projection）","D":"完成演出（act fulfillment）"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":40,"stem":"下列那一個遊戲治療取向在治療關係中和兒童有平等的權力，在遊戲治療中使用追蹤、重述內容、反映感覺、角色扮演、一起清理遊戲室等技巧？","options":{"A":"非指導取向","B":"兒童中心取向","C":"阿德勒取向","D":"榮格取向"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null}]});

window.__EXAM_LOAD({"id":"113_3","year":113,"subjectIndex":3,"subject":"諮商與心理治療實務與專業倫理","essays":[{"num":1,"text":"益華是在某大學進行駐地實習的諮商心理師，實習的同時也在進行碩士論文的研究，其對大學生生涯發展議\n題格外關切，想進行「大學生接受短期諮商成效之研究」，預計訪談5～7名實習學校中曾因生涯議題而接受\n短期諮商服務的學生。益華已招募7位受訪者，其中有1位受訪者小君同時也是益華的個案。請闡述此案例涉\n及的倫理議題以及其中的動力。（25分）","points":25,"reference":null,"rubric":null},{"num":2,"text":"老李70歲，有高血壓的慢性疾病，具自理的能力和穩定的退休金，7個月前老伴因車禍去世後獨居。獨子在國\n外工作成家，不打算返臺定居。老李心情低落，食物越吃越少，原來會去公園下棋，現在越來越不想出門與\n人互動，覺得活得沒有價值。獨子透過相關單位的介紹，希望老李與諮商心理師進行諮商，老李對接受諮商\n並不排斥，但也不抱持希望，但還是願意與你討論如何計劃生活，請詳述你的諮商計畫？（25分）","points":25,"reference":null,"rubric":null}],"mc":[{"num":1,"stem":"當諮商心理師與個案發生性關係時，會造成有意義的治療關係終止，違反下列那項倫理準則？","options":{"A":"自主權","B":"受益權","C":"免受傷害權","D":"公正權"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":2,"stem":"在心理諮商所從事自費心理諮商業務，關於收費與付費，下列作法何者最明顯違反諮商專業倫理？","options":{"A":"提供社會局委託方案固定次數的諮商後，與個案討論後續各種諮商管道","B":"對學生個案給予收費的折扣","C":"轉介個案給精神科診所收取轉介費","D":"在初次晤談告知個案收費標準與付費方式"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":3,"stem":"有位因為人際議題尋求諮商的個案，將每次與諮商心理師晤談情形以小說形式在網路社群公開，引起相關人不滿並批評諮商心理師專業能力。諮商心理師知悉此事之後，下列處理方式何者最不適切？","options":{"A":"尊重個案自主權利，不做任何聲明","B":"個案已公開隱私，可以就個人專業責任做聲明澄清","C":"為維護專業責任應結束諮商關係，要求個案聲明澄清","D":"免受傷害，應蒐集證據向網友提告"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":4,"stem":"個案在晤談時不滿意諮商心理師對其面質而憤怒丟擲文具，未造成諮商心理師受傷，下列諮商心理師的作法何者最適當？","options":{"A":"向個案道歉並請息怒","B":"請個案冷靜並轉移話題","C":"告知個案這是危險行為，可能會通報求援","D":"視而不見，以避免破壞諮商關係"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":5,"stem":"關於諮商心理師的執業疏失與風險管理，下列敘述何者正確？","options":{"A":"當諮商心理師長期選擇在速食店執業則容易有發生執業疏失的風險","B":"當諮商心理師被申訴違反專業倫理時，受理單位為衛生局","C":"當諮商心理師被檢舉違反心理師法時，受理單位是諮商心理師公會全國聯合會","D":"當諮商心理師違反心理師法可能受到的裁罰方式包括申誡、接受繼續教育等"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":6,"stem":"關於心理測驗受測者的權利，下列敘述何者錯誤？","options":{"A":"有權利獲得關於測驗內容、風險、益處等資訊","B":"在諮商心理師說明後，有權利拒絕接受測驗","C":"如果當次諮商未做完測驗，有權利要求把測驗題本帶回家做","D":"有權利要求諮商心理師提供關於測驗結果的詳細回饋，包括完整的報告"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":7,"stem":"知後同意有三個主要構成法律層面基礎的成分，下列何者不包括在內？","options":{"A":"告知時機","B":"行為能力","C":"對訊息的瞭解","D":"自願性"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":8,"stem":"某位諮商心理師剛與結婚14年的先生辦完離婚手續，此時剛好被派案與婚姻議題的個案進行諮商。下列何種作法最不適切？","options":{"A":"諮商心理師發現自己與個案非常有話聊，於是盡情的分享離婚後的心情，也鼓勵個案勇敢走出婚姻","B":"諮商心理師宜帶著戒慎的心情接案，並於接案後重聽錄音帶，以免將自己的問題帶入個案的問題中","C":"諮商心理師此時應勇敢告訴派案的主管，自己剛離婚目前可能還不宜接受相似問題的個案","D":"諮商心理師宜尋求督導或諮商的協助，以幫助自己了解離婚對自己專業所造成的影響"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":9,"stem":"依心理師法規定，諮商心理師製作個案紀錄時，應載明之內容不包含下列何項？","options":{"A":"姓名","B":"國民身分證統一編號","C":"出生年月日","D":"家長／法定代理人"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":10,"stem":"根據兒童及少年福利與權益保障法規定，醫事人員、社會工作人員、教育人員、保育人員、警察、司法人員及其他執行兒童及少年福利業務人員，知悉兒童及少年有被虐待的情事者，應立即向直轄市、縣（市）主管機關通報，至遲不得超過多少小時？","options":{"A":"72小時","B":"48小時","C":"36小時","D":"24小時"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":11,"stem":"關於諮商心理師的反移情現象，下列敘述何者最不適當？","options":{"A":"過度保護個案","B":"渴望獲得個案的肯定","C":"常常提供個案建議","D":"與個案發展清楚的心理界限"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":12,"stem":"關於諮商心理師容易出現的工作耗竭，下列敘述何者錯誤？","options":{"A":"在工作中遇到重要的價值觀衝突易導致工作耗竭","B":"低落的工作士氣是工作耗竭的表徵之一","C":"即使已經精疲力竭，仍然應該盡力完成諮商工作","D":"長期為個案提供心理撫慰與支持，導致冷漠與同理心疲乏現象"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":13,"stem":"下列何種說法最貼近 Gerig（2007）所提有關近代的諮商領域對於處理人類靈性層面議題的看法？","options":{"A":"神的議題對於諮商而言太龐大，應該把祂排除在諮商室外","B":"諮商心理師不可能對靈性議題置之不理，故應至少接受一種宗教信仰","C":"諮商心理師需對靈性和宗教內容或程序如何影響個案，具備一定的敏感度","D":"宗教的本質是相通的，諮商心理師需找到信仰的本質，才能一體適用於不同的宗教信仰上"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":14,"stem":"個案的父母長期忽視其成就，每當其自我炫耀時則斥責之，因此將別人對他的肯定都視為嘲笑。當個案告知諮商心理師最近職位升遷時，下列諮商心理師的那個回應最可協助個案獲取矯正性情緒經驗？","options":{"A":"哇，太好了！很高興你能跟我分享你的工作成就，我看到你在工作上的努力，你自己又是怎樣看待自己的努力呢？","B":"哇，太棒了！你的老闆真的看到你的能力了。你想未來還可以做什麼讓自己的表現更耀眼來博取父母的賞識？","C":"哇，太好了！你的老闆真的很賞識你！那為何你的家人這麼吝嗇讚賞你呢？真不明白他們對你的期待怎麼會如此高呢？","D":"哇，真是恭喜你！我實在為你感到驕傲，只要持續努力一定會更上一層樓！"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":15,"stem":"採用「對抗攻擊」人際因應策略的個案，在晤談中對諮商心理師的問話不耐煩且大聲質疑其專業度。諮商心理師回應：「我很好奇你是否注意到此刻你的聲音很大，感覺你很生氣。平常當你這樣對其他人說話時，他們是如何回應你？」上述諮商心理師的回應，下列敘述何者不正確？","options":{"A":"可避免諮商心理師的反移情","B":"諮商心理師正在進行人際歷程評論","C":"諮商心理師協助個案聚焦個人情緒與人際模式","D":"諮商心理師正在重演個案生活中的人際互動模式"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":16,"stem":"曉明初次離家念大學，因適應不良而求助諮商，初次諮商時曉明顯得很安靜沉默。下列何者是諮商心理師有效運用歷程評論（process comments）的敘述？","options":{"A":"對你而言要開始談話通常都不容易，還是因為我的緣故讓你較難開始談話？","B":"你才剛離家來上大學，你會想念家人且感到孤單是正常的","C":"大多數的新生第一次離家都會有想家的感覺，過了這個過渡期，就會好起來","D":"我瞭解你的感覺，我第一次離家去上大學時也有這種孤單的感覺"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":17,"stem":"關於重述技巧的運用，下列敘述何者正確？","options":{"A":"適用於個案積極探索情緒時，可催化個案對情緒的覺察","B":"常以暫時性的敘述或直述句型呈現","C":"目的在幫助個案獲得洞察並有所行動","D":"諮商心理師事先準備對話的主題，有助於問題的聚焦和解決"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":18,"stem":"關於結案的敘述，下列何者最不適切？","options":{"A":"實習諮商心理師與個案晤談10次後，發現個案有很大的進展，因此在第11次晤談時告知個案諮商將於下一次（即第12次）結束","B":"實習諮商心理師進行結案時邀請個案回顧整個諮商歷程，進行認知與情緒上的摘要，並進一步鞏固個案於諮商中獲得之重要成果","C":"實習諮商心理師將第一次晤談時與個案共同建立的諮商目標做成書面清單，於結案時請個案寫下那些目標已經有那些進步，還有那些目標需要繼續努力","D":"實習諮商心理師因實習即將結束而與個案討論結案事宜。實習諮商心理師評估可以結案，但個案認為尚有議題需要繼續諮商。經再評估後實習諮商心理師協助個案進行轉介"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":19,"stem":"在諮商關係初期，下列何者作法，最不利於與個案建立合作同盟關係？","options":{"A":"鼓勵個案改變，面質個案對於改變的抗拒","B":"瞭解個案對諮商的期待與想法","C":"探詢個案過去的諮商經驗","D":"與個案一起評估其困擾的問題"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":20,"stem":"關於引導式幻想（guided imagery）於生涯諮商的應用價值，下列敘述何者最不適切？","options":{"A":"深入個案的潛意識，修通早期經驗創傷","B":"反應豐富的內在經驗","C":"降低過當的防衛，迅速進入諮商情境","D":"瞭解與評估個案的生涯價值"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":21,"stem":"關於 window.__EXAM_LOAD({"id":"113_6","year":113,"subjectIndex":6,"subject":"團體諮商與心理治療","essays":[{"num":1,"text":"假設你受聘於某大學學生輔導中心任職，最近規劃要帶領一個嚴重傳染性疾病疫情下的生活適應團體，招募\n校內因為疫情而感到困擾的學生參與。學生輔導中心主任請你同時進行團體成效評估，作為中心年度工作成\n效的一環。請說明你進行團體成效評估的理念和可行的作法（含可使用的評估工具）。（25分）","points":25,"reference":null,"rubric":null},{"num":2,"text":"諮商與心理治療團體裡，常見成員保持沉默（silence），而造成成員沉默不語可能的原因相當多。請回答下\n列問題：\n（一）成員保持沉默的可能原因。（15分）\n（二）領導者可運用以打破成員沉默的技巧，並請舉例說明之。（10分）","points":25,"reference":null,"rubric":null}],"mc":[{"num":1,"stem":"利用團體為成員進行深度、個別性的治療工作時，下列何者最不適當？","options":{"A":"領導者必須擁有良好的個別諮商技巧","B":"治療應由領導者主導，其他成員提供分享和領悟","C":"成員分享出現強烈情緒時，領導者應立即協助深入處理","D":"當次團體的焦點可停留在某成員身上較長時間，以深入其議題"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":2,"stem":"相較於心理教育團體，下列關於團體諮商的敘述，何者最為正確？","options":{"A":"團體的焦點通常是由成員所決定","B":"成員通常缺乏某一特定領域的相關資訊","C":"團體聚焦於成員的認知探索與學習","D":"運用團體動力原理與過程預設工作目標"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":3,"stem":"諮商心理師公會全國聯合會在大地震過後，邀請當地諮商心理師於收容所內進行每週一次2小時的聚會，協助災民彼此激勵分享感受，這是那一類團體？","options":{"A":"討論團體","B":"諮商與治療團體","C":"教育團體","D":"支持性團體"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":4,"stem":"關於成員互動過程對於團體進展的敘述，下列何者最正確？","options":{"A":"領導者應壓抑成員對於彼此敵意的表達","B":"因為團體的溝通不能中斷，成員間的衝突要包容且被鼓勵","C":"成員間互相不在意時，才會冒險說出對彼此的負向感受","D":"衝突會降低成員的自我坦露，領導者宜保護成員使其朝向建設性的團體工作階段"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":5,"stem":"關於團體動力現象的敘述，下列何者錯誤？","options":{"A":"次團體的發生不可能被禁止，但也不應該被鼓勵","B":"癌症成員的團體外接觸是團體過程中的重要部分","C":"在次團體中，瀰漫於團體中的「沉默的共謀」才是破壞團體的主因","D":"當成員以秘密結盟的方式滿足個人需求，代表團體任務的達成高於成員附帶的滿足"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":6,"stem":"成人女性飲食疾患治療團體的主要目標，下列何者最不適當？","options":{"A":"對於異常進食習性的自我揭露","B":"學習必要的營養及控制體重的知識","C":"瞭解自尊、自我控制、身體意象與飲食的關係","D":"找出成員的各種人際困難與議題"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":7,"stem":"關於如何避免團體成員流失問題的敘述，下列何者正確？","options":{"A":"領導者在團體開始前都不要讓成員知道團體內容，好讓成員驚喜而繼續參與團體","B":"當成員不積極參與活動時，不該將成員請出去或轉介其他團體，而是要調整活動以留住他","C":"領導者為了吸引成員留在團體，不管目標為何，都要設計活潑生動的活動，以留住成員","D":"領導者被成員告知要退出團體時，可適時鼓勵成員回到團體中一起討論、處理"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":8,"stem":"下列那一項處遇最不適合在團體最後一次聚會時進行？","options":{"A":"增強所有成員於團體中學習到的部分","B":"邀請所有成員分享生命中成功的經驗","C":"邀請所有成員分享希望感並給予彼此鼓勵","D":"鼓勵所有成員處理團體過程中未完成的事務"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":9,"stem":"在團體初期，成員甲是個積極發言投入團體的人，但他常以貶抑和輕視的評論來回應乙成員的自我揭露，而誘發乙成員的憤怒，讓整個團體出現火藥味。領導者下列何種介入最不恰當？","options":{"A":"保護乙成員，並反映其所觀察到的互動行為及情感給甲、乙雙方","B":"邀請其他成員來回饋其所觀察到的雙方行為","C":"使用面質的技術來指出成員甲行為中的不一致現象","D":"反映成員乙所體驗到的情緒感受"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":10,"stem":"下列何者最不可能是團體轉換階段中成員焦慮的原因？","options":{"A":"擔心自己若在團體中哭了，不知會發生什麼事","B":"想知道團體其他成員是否真的不會傷害自己","C":"想知道現實生活中是否有人會像團體裡的成員一樣關心自己","D":"擔心自己說了不該說的話，被領導者認為自己是個難搞的人"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":11,"stem":"領導者在諮商團體人際互動回饋的層次中，成員間給予他人忠告與建議的行為，最常出現在那一個階段？","options":{"A":"開始階段","B":"轉換階段","C":"工作階段","D":"結束階段"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":12,"stem":"領導者小雅帶領一個由高中男生所組成的諮商團體，在第二次聚會時，有兩三位成員不斷提到上學期領導者小可姐姐多麼的好，而小可剛好是小雅的同學。關於小雅的回應或處理，下列何者最適切？","options":{"A":"這是屬於團體外的事件，請不要談論團體外的人或事","B":"聽起來你們很喜歡上學期的團體及領導者，我和小可是不同的","C":"你們分享了上學期參與團體的正向經驗，還有負向的感受嗎？","D":"小可讓我又羨慕又有壓力，我想知道大家對我們團體的感覺"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":13,"stem":"關於切斷（cutting off）技巧的使用，下列何者錯誤？","options":{"A":"使用時必須先考慮該成員的感受，避免其受傷害","B":"使用在成員處於漫談、離題的討論或分享時","C":"使用在成員發表極端、帶價值判斷的長篇大論時","D":"使用在當成員的意見與團體目標衝突時"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":14,"stem":"關於團體諮商中的「歷程闡釋」，下列敘述何者錯誤？","options":{"A":"歷程闡釋會聚焦在此時此地的團體經驗，而不會討論過去經驗","B":"歷程闡釋包括整個團體的、人際之間的互動及個人的內在歷程","C":"歷程的資料包括口語與非口語的溝通資料","D":"領導者本身的感受也是歷程闡釋的一部分"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":15,"stem":"Yalom認為領導者協助成員採取歷程取向有助於團體療效。下列領導者的介入，何者最符合歷程取向？","options":{"A":"今天團體已進行了一半，不知到目前為止每個人對團體有什麼樣的感受","B":"我們剛剛看到小雅哭了，有沒有人出現跟她一樣的感受","C":"對於今天指定的家庭作業，大家有沒有什麼疑問想提出來的","D":"對於小芳剛剛所分享的部分，有沒有人想給她一些回饋"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":16,"stem":"在一個為期10次的諮商團體第2次聚會中，兩位協同領導者對團體的處遇方向有不同看法時，下列那一種作法最適當？","options":{"A":"兩位領導者公開在團體中表達彼此看法的不一，並進行協商","B":"一方先跟隨，並在該次團體結束後，兩位領導者就團體帶領的理念及不一致之處進行討論","C":"兩位領導者可各自提出自己的看法，徵求成員的意見，以多數成員贊同的意見來處遇","D":"先暫停團體5分鐘，兩位領導者到團體外做商量"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":17,"stem":"在第一次的憂鬱症家屬支持團體中，才剛開始進行相互認識的活動，成員甲因為不小心碰撞成員乙，乙很生氣地將甲推倒，其他成員錯愕地轉頭觀看。領導者的處理，下列何者最不適當？","options":{"A":"暫停活動，檢查兩位成員的傷勢","B":"先了解該事件發生的歷程","C":"繼續進行相互認識活動","D":"將此事件作為訂定團體規範時的討論"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":18,"stem":"團體進行到第五次時，有一位很少發言的成員突然表示：「團體進行這麼多次了，大家都不能真誠的投入團體，只有在客套而已，我覺得很失望。」此時領導者給予同理後，下列處理何者最適當？","options":{"A":"解釋該成員發言的心理防衛，幫助他自我覺察","B":"私下了解該成員的內在動機，以避免團體衝突","C":"挑戰該成員投入程度，引導其面對自己的矛盾","D":"鼓勵其他成員一起討論如何適當修正團體的進行"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":19,"stem":"在某次團體聚會時，成員甲表示昨天看見乙及丙手牽手在路上散步，但乙及丙異口同聲地說：甲應該是看錯人，沒有這件事，昨天他們都沒有在街上散步。關於領導者的處理，下列何者最正確？","options":{"A":"可適時請成員討論對於團體外的聯誼或互動有何想法","B":"私下與成員甲、乙、丙單獨會談，並為他們談話的內容守密","C":"藉由公開宣告成員間不得發生性關係或團體外的聯誼，讓成員維持單純團體關係","D":"協助成員明白團體外的接觸，不具治療意義"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":20,"stem":"領導者在諮商團體中面對不斷抱怨或吐苦水的成員時，下列何種反應最不適當？","options":{"A":"先不處理，將注意力轉至其他成員","B":"避免在團體中面質該成員","C":"切斷並同理其發言，邀請其他成員發言","D":"瞭解該成員如此表現的可能因素"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":21,"stem":"在人際互動團體的某次聚會時，八名成員中只有兩位出席，加上兩位領導者，團體中總共有四個人。下列何種領導者的作法最能維持團體的取向？","options":{"A":"請兩位成員輪流描述各人眼前的生活難題","B":"由兩位領導者各與一位成員進行個別諮商","C":"引導兩位成員探索對彼此的印象及其原因","D":"由領導者對成員的人際議題進行心理衛生教育"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":22,"stem":"關於團體保密的敘述，下列何者最為正確？","options":{"A":"領導者要告訴成員，絕對保密在團體中是不可能達成的","B":"成員表明自己在團體中所分享的事情不是秘密，所以其他成員可以在團體外跟別人分享","C":"團體保密的原則，在初次團體進行時說明清楚即可","D":"為了保護成員的隱私，領導者都不能洩漏團體進行的內容，也包括對轉介單位"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":23,"stem":"下列關於團體初期領導者提醒成員的團體規範，何者最不適當？","options":{"A":"要求所有成員彼此做到隱私與保密的原則","B":"尊重成員參與團體的自主性","C":"在團體中表達感受","D":"鼓勵成員私下多聯繫或聚會，以促進親密感"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":24,"stem":"在監獄帶領性侵害加害人強制治療團體時，下列作為何者最不適當？","options":{"A":"告知成員由於是強制性質的團體，所以成員的出席會被記載在治療檔案上","B":"由於法定要求，成員沒有選擇的權利，必須揭露其犯行，故所有成員都有保密義務","C":"雖然領導者無法讓成員自由決定參加與否，但仍需盡力降低因參與而產生的恐懼及抗拒心理","D":"即使是強制治療，領導者不宜假設所有成員皆無意願改變，仍需建立對成員合宜的治療目標"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":25,"stem":"團體諮商進行前常以「知後同意」與「行前說明」來幫助成員瞭解團體事宜，下列何者不屬於該範圍？","options":{"A":"探索成員的期待，澄清團體諮商目標","B":"說明團體的價值與限制，討論如何從團體中獲得最大的幫助","C":"說明領導者個人的信念與價值觀，並透過深度自我揭露來建立成員的信任","D":"澄清成員對團體的誤解以及可能的心理障礙，例如：害怕分享、擔心秘密外洩等"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":26,"stem":"隨著科技的進步，有越來越多的線上團體透過網路平台進行團體工作。這些線上團體可能引發的倫理議題，下列敘述何者正確？","options":{"A":"不易處理不同族群、文化、性別等多元文化議題","B":"非面對面進行團體，較能照顧成員的個人隱私和資料的保密","C":"團體領導者應熟悉所使用的線上軟體，並事先測試與準備","D":"團體領導者與成員可以維持界線，減少雙重關係的影響"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":27,"stem":"關於團體諮商與心理治療中的矯正性情緒經驗，下列敘述何者正確？","options":{"A":"在團體中需要提供足夠的真誠回饋、安全與支持，允許和接納個人揭露痛苦的情緒經驗，方能協助該成員面對和矯正","B":"Yalom主張透過領導者認知性的解釋，可以喚起成員一種未經修飾的情緒，並轉化成矯正性的情緒經驗","C":"在團體中成員都會變成其他成員的投射對象，領導者需要減少此移情作用的產生","D":"高結構的團體相較於低結構的團體，透過領導者的引導，更能在團體中引發成員的早期經驗和負面的情緒，進而產生矯正性的情緒經驗"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":28,"stem":"關於學校心理教育團體的相關研究，下列敘述何者正確？","options":{"A":"多數研究均發現，班級大團體輔導優於小團體諮商的療效","B":"不論是心理教育團體或是治療團體，皆會經歷相似的團體發展歷程","C":"在學校進行的團體宜以長期、非結構的方式，以配合學期的各種教學活動彈性因應","D":"為促進團體的凝聚力，組成學校的諮商團體，宜儘量由導師帶領自己班級學生為佳"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation": window.__EXAM_LOAD({"id":"114_1","year":114,"subjectIndex":1,"subject":"諮商的心理學基礎","essays":[{"num":1,"text":"請說明女性在生涯發展中常見的玻璃天花板（glass ceiling）和玻璃懸崖（glass cliff）現象，\n並闡述諮商心理師可以如何從個人、組織及政策層面協助女性克服職場發展的阻礙。（25分）","points":25,"reference":null,"rubric":null},{"num":2,"text":"小芬有一個將近五年的親密伴侶，最近一年來對於與伴侶的親密關係越來越不滿意，生活中諸多花\n費都由自己負擔，且伴侶因為經常加班而無法一起渡假，甚至不願意溝通彼此相處的問題，常常大\n吵後就冷戰。小芬最近與新認識的客戶互動良好，且對方提出約會邀請，讓小芬非常猶豫是否要與\n伴侶維持原有的親密關係。請以「社會交換理論（Social Exchange Theory）」為基礎，回答下列\n問題：\n（一）請提出三項構成要件來分析小芬對於原有的親密關係的滿意度。（15分）\n（二）針對新客戶的出現，請提出二項構成要件來分析小芬是否會維持原有的親密關係。（10分）","points":25,"reference":null,"rubric":null}],"mc":[{"num":1,"stem":"下列何種理論強調動作技能是主動重組已經精熟的能力，以主動探索並發展和外界更有效的互動方式？","options":{"A":"互動理論（Interactive Approach）","B":"動態系統理論（Dynamical Systems Theory）","C":"訊息處理理論（Information Processing Theory）","D":"社會文化理論（Sociocultural Theory）"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":2,"stem":"有關語用（pragmatics）發展的研究，下列何者正確？","options":{"A":"早期出現與語用發展有關的技巧是「共同注意」","B":"大部分學齡前幼兒不會懂得使用輪流發言的溝通技巧","C":"正常情況下，學齡前幼兒不會根據與其對話者的觀點來調整語言的內容","D":"正常情況下，學齡前幼兒通常無法依據社會期許調整說話方式"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":3,"stem":"關於神經發展與髓鞘化（myelinization）的過程與重要性，下列敘述何者錯誤？","options":{"A":"髓鞘如同電線外的絕緣皮一樣，可以讓大腦訊息傳遞得更直接","B":"髓鞘化的歷程會在6～7歲時完成","C":"腦細胞需要發展出突觸，才能讓神經元得以傳遞訊息","D":"嬰兒初期對於神經發展是個重要的階段，對於突觸的使用與刺激是認知發展的關鍵"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":4,"stem":"去年翔翔不願意接收姊姊小時候穿過的外套，今年卻覺得無所謂。他說，穿姊姊的衣服也不會變成女生。下列敘述何者正確？","options":{"A":"翔翔尚未發展出性別穩定性（gender stability）","B":"翔翔尚未發展出基本性別認同（basic gender identity）","C":"翔翔已發展出性別恆定性（gender consistency）","D":"翔翔已發展出性別基模（gender schema）"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":5,"stem":"父母看到孩子為小事而爭執打架，要求兩兄弟各自回房間冷靜，且今天皆不准看電視，並告誡不得再打架；過一會兒，父母又聽到兩兄弟大吵大鬧相互爭執的聲音。父母管教行為不奏效，最有可能是下列何種原因？","options":{"A":"父母的介入僅對打架產生抑制反應，缺乏替代行為的教導與說明","B":"父母告誡不得再打架，產生抵銷模仿的效應，使兩兄弟無從習得替代行為","C":"父母的介入產生負增強陷阱，造成兄弟再次打架","D":"父母施予的暫停時間與權力剝奪等兩種懲罰成效衝突"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":6,"stem":"11歲的天軍發現掌上型遊戲機無法開啟，思考著是否是電池耗盡、弟弟玩壞了，或是爸爸故意在遊戲機上動手腳所導致。下列何者可能是天軍在上述情境使用的智能能力？","options":{"A":"Gardner多元智能理論的自然探索能力","B":"Gardner多元智能理論的自我解析能力","C":"Sternberg成功智能理論的實用能力","D":"Sternberg成功智能理論的分析能力"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":7,"stem":"長期且穩定的友誼對兒童和青少年的自我和社會發展有重要影響，下列何者不符合相關研究的發現？","options":{"A":"擁有良好友誼的個體，相對於欠缺者，通常有較高自尊（self-esteem）","B":"擁有良好友誼的個體，相對於欠缺者，更常與他人分享與合作","C":"擁有良好友誼可減輕個體遭受其他同儕加害（victimization）時後果的嚴重程度","D":"女性好友間的長期共同反芻（co-rumination）有助降低個體憂鬱和焦慮的風險"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":8,"stem":"依照Erikson的心理社會理論來看，針對青少年期的自我發展，下列敘述何者正確？","options":{"A":"是依照自己認為自己是什麼樣的人而來，與別人認為他是怎樣的人無關","B":"先發展個體認同，再達到未來發展團體認同","C":"為符合父母的期待而形成的自我形象，有助於自我認同","D":"可以透過偶像的崇拜，得以抒發和滿足他們在發展上和現實上的需求"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":9,"stem":"在薛爾曼（R. Selman）的角色取替理論（Role-taking Theory）裡，能夠思考到對方的立場會跟他所處的社會系統對他的要求有關，則此人應屬於下列何階段？","options":{"A":"社會的角色取替（societal role taking）","B":"自我反省的角色取替（self-reflective role taking）","C":"相互的角色取替（mutual role taking）","D":"社會資訊的角色取替（social-informational role taking）"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":10,"stem":"成功婚姻（marital success）是一種彼此關係平等的感受，婚姻持久的因素是基於雙方都為這段關係做出對方難以提供的貢獻，最主要是根據下列何種看法？","options":{"A":"雙方結婚時的相對成熟度（relative maturity）","B":"伴侶相似的價值觀與共享興趣的同質性（homogamy）","C":"交換理論（exchange theory）","D":"脆弱—壓力—適應模式（vulnerability–stress–adaptation model）"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":11,"stem":"關於智力（intelligence）的敘述，下列何者錯誤？","options":{"A":"流體智力（fluid intelligence）在成年期後呈現下降的趨勢","B":"晶體智力（crystallized intelligence）在成年期後呈現上升的趨勢","C":"頂額葉整合理論（parieto-frontal integration theory）指出智力是來自額葉（frontal lobe）和頂葉（parietal lobe）網絡的整合所致","D":"流體智力和晶體智力的發展呈現相反型態（上升和下降）的交叉是在青少年期（大約在18～20歲時期）"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":12,"stem":"艾瑞克森（Erik Erikson）將人們心理社會發展的性格從嬰兒期至生命晚期分為八個階段，當人們邁入老年後，嘗試讓自己人生有意義，進行生命回顧（life review）來讓自己生命顯得獨特的選擇和事件達成和解，也接受生命即將結束的事實，此階段是Erikson所稱那兩個任務之間的危機或掙扎？","options":{"A":"生產與停滯 （generativity vs. stagnation）","B":"圓滿與絶望（integrity vs. despair）","C":"親密與孤離（intimacy vs. isolation）","D":"認同與角色混淆（identity vs. role confusion）"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":13,"stem":"關於老年人居住安排的居家照護服務，政府長期照顧的老化政策發展的主要目的，是讓照顧需求的年長者留在家庭與社區的時間得以延長，也就是讓年長者能生活在所習慣社區，此做法稱為？","options":{"A":"在地老化（aging in place）","B":"社會支持（social support）","C":"成功老化（successful aging）","D":"最適老化（optimal aging）"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":14,"stem":"根據Quan等人的研究，下列何者並非經常使用於年長者的心理處遇或情緒調節方式？","options":{"A":"懷舊治療","B":"心理分析","C":"園藝治療","D":"幽默治療"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":15,"stem":"關於人格的敘述，下列何者錯誤？","options":{"A":"人格會受個人年齡的影響","B":"了解人格需要透過心理測驗","C":"人格會受情境的影響","D":"在網路世界中呈現的人格也有可能是真實的人格"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":16,"stem":"有關投射測驗的敘述何者錯誤？","options":{"A":"羅夏克墨漬技術（Rorschach Inkblot Technique）具有文化差異","B":"主題統覺測驗（Thematic Apperception Test）無法使用於回教文化","C":"單詞聯想（word association）不重視反應速度","D":"語句完成（sentence completion）測驗也有客觀的計分方式"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":17,"stem":"下列有關對佛洛伊德（Freud）理論的批評，何者最不適當？","options":{"A":"佛洛伊德的患者並未透露童年性經驗","B":"佛洛伊德研究的樣本數太少","C":"佛洛伊德的樣本不具代表性","D":"佛洛伊德的全部概念，無法經科學驗證"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":18,"stem":"心理分析論者認為下列何者是較為成功的防衛機制？","options":{"A":"合理化（rationalization）","B":"投射（projection）","C":"昇華（sublimation）","D":"替代（displacement）"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":19,"stem":"下列何者最能反應Karen Horney所定義的基本焦慮？","options":{"A":"在充滿敵意的世界裡，孤立無援的感受","B":"原始的性本能難以被現實社會所接納","C":"光明與陰暗兩股對立力量的拉扯","D":"弱小無助，必須仰賴他人的自卑感"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":20,"stem":"集體潛意識（collective unconscious）的概念是由下列那位學者提出？","options":{"A":"Carl G. Jung","B":"Sigmund Freud","C":"Karen Horney","D":"Carl Rogers"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":21,"stem":"有關Bandura理論中的自我效能，下列何者最不適當？","options":{"A":"年紀越大，自我效能越高","B":"男性的自我效能高於女性","C":"自我效能與學業表現呈正向關係","D":"學生評定高教學品質的教師也具有高自我效能"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":22,"stem":"曉婷常常頭痛，諮商心理師引導曉婷放鬆，很有效的緩解頭痛，之後曉婷很快的學會放鬆。曉婷學會放鬆這件事，下列何者最能解釋？","options":{"A":"正增強","B":"負增強","C":"消弱","D":"懲罰"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":23,"stem":"根據人格心理學家Rogers的觀點，功能充分發揮者（fully functioning person）是心理發展和社會進化所渴望的結果，他描述功能充分發揮者的特徵下列何者最為適當？","options":{"A":"其有神秘的高峰經驗","B":"其處於已實現的狀態","C":"其總是面臨順境","D":"其可以自由地做決定"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":24,"stem":"關於Kagan研究的敘述，下列何者最正確？","options":{"A":"氣質（temperament）在童年時期已經固定且不會改變","B":"父母親的教養行為會影響子女氣質的表現","C":"氣質發展過程中同儕是重要的影響因素","D":"根據對四個月大嬰兒面對熟悉與新奇刺激的反應，將嬰兒分為安全反應、矛盾反應及低反應"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":25,"stem":"有關Kelly理論中的個人建構理論（Personal Construct Theory）中提到一個基本前提及11個推論，下列敘述何者為基本前提？","options":{"A":"我們的心理歷程受到對事件的預期所引導","B":"所有的建構都是雙極、二分的","C":"人們的建構可以自由選擇","D":"人們的差異在於如何知覺或解釋事件"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":26,"stem":"下列何者是Adler認為影響性格發展的主要因素？","options":{"A":"出生序","B":"生物神經需求","C":"需求層級","D":"自我效能"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":27,"stem":"研究人們在不同的社會情境（social situations）下的行為變化，選擇在公園內記錄人們的互動，而不進行干涉。這最符合下列的那種研究方法？","options":{"A":"實驗法（experiment）","B":"調查法（survey）","C":"觀察法（observation）","D":"個案研究法（case study）"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":28,"stem":"隨著數位科技的普及，心理學家開始探索人們如何通過社交媒體塑造自己的形象和與他人互動。這一趨勢代表社會心理學的那一個發展方向？","options":{"A":"重視人際互動中的科技因素（technology in interpersonal interaction）","B":"強調文化多樣性（cultural diversity）","C":"關注群體極化現象（group polarization）","D":"重視認知行為理論（cognitive behavioral theory）"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":29,"stem":"一位個案在諮商過程中，經常避免與心理師的眼神接觸，並且保持距離感，這讓心理師推測個案對某些話題可能感到不安或防備。這樣的非語言行為反應了什麼樣的溝通模式，並可能揭示個案的那一種情緒？","options":{"A":"目光接觸（eye contact）和避免型焦慮（avoidant anxiety）","B":"目光接觸（eye contact）和社交焦慮（social anxiety）","C":"面部表情（facial expressions）和增強社會支持（increased social support）","D":"面部表情（facial expressions）和提升自尊（increased self-esteem）"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":30,"stem":"小明認為自己的統計能力優異，也看好自己的期末考表現，結果真的考了將近100分。下列何者最能說明此一例子？","options":{"A":"初始效應（primacy effect）","B":"印象形成（impression formation）","C":"自我應驗預言（self-fulfilling prophecy）","D":"巴南效應（Barnum effect）"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":31,"stem":"個案在心理諮商過程中表達，當他面對挑戰時，他會主動反思自己的強項和弱項，並且試圖從過去的經驗中學習，來改進自己未來的行為。這一過程與那一個自我概念最有關？","options":{"A":"社會比較（social comparison）","B":"自我提升（self-enhancement）","C":"認知失調（cognitive dissonance）","D":"自我覺察（self-awareness）"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":32,"stem":"關於自尊（self-esteem）與自戀人格（narcissism）的敘述，下列何者最不適當？","options":{"A":"自戀人格者擅於減輕認知失調，以持續認為自己是優秀的人","B":"高自尊的人比低自尊者，更不會因為想到自身的死亡而感到焦慮","C":"自戀人格者可能不受他人喜愛，但在學業和事業成就上常勝過周遭的人","D":"自我肯定的練習可以減緩外界對自尊的威脅"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":33,"stem":"小美和小玉是認識多年的好朋友，彼此會互相關心對方的需求，也不太會去計較誰付出較多、誰付出較少。根據Clark和Mills的觀點，小美和小玉屬於下列何種關係？","options":{"A":"共享關係（communal relationships）","B":"親近關係（intimate relationships）","C":"平等關係（equality relationships）","D":"交換關係（exchange relationships）"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":34,"stem":"下列各項陳述，何者最符合「接近性效應（propinquity effect）」的概念？","options":{"A":"班上坐在隔壁的同學，比較容易成為朋友","B":"主動接近對方，可以增加自己的吸引力","C":"兩個人的外貌（顏值）愈接近，愈容易成為朋友","D":"當對方主動接近你，你也會想要主動接近他"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":35,"stem":"團隊會議中，個案注意到當一位同事提出意見時，其他成員幾乎立即表示贊同。儘管他們內心可能有不同的看法，但都選擇不表達異議。這樣的現象最可能是因為什麼？","options":{"A":"從眾（conformity）","B":"服從（obedience）","C":"社會助長（social facilitation）","D":"社會閒散（social loafing）"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":36,"stem":"求助個案表示，學校畢業公演中，她當時覺察到台下觀眾的反應和注意力，這對她當下的自信心和表現產生極大的鼓舞。這樣的現象表明那一種團體影響機制？","options":{"A":"社會閒散（social loafing）","B":"社會助長（social facilitation）","C":"訊息性社會影響（informative social influence）","D":"團體迷思（groupthink）"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":37,"stem":"個案在討論社交媒體的人際互動時，曾提到有些網友遭到他人拒絕或孤立時，常常在社群中留下具攻擊性的文字。上述行為最適合用下列何種心理學概念來解釋？","options":{"A":"情感反應（emotional response）","B":"自我價值感（self-worth）","C":"認知偏差（cognitive bias）","D":"社會拒絕（social rejection）"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":38,"stem":"關於「攻擊」的生理或先天因素，下列何者錯誤？","options":{"A":"挑戰假說（challenge hypothesis）主張，睪固酮與攻擊的關聯只發生在有高度繁殖機會的情況","B":"雙激素假說（dual-hormone hypothesis）認為，壓力激素皮質醇（cortisol）高的時候，睪固酮與攻擊支配行為有所關聯","C":"黑猩猩與巴諾布猿是人類演化上的近親，這兩種靈長類之間的攻擊習性差異很大","D":"雖然攻擊行為很可能是演化而來，但幾乎所有生物體也同時演化出抑制攻擊行為之機制"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":39,"stem":"有關態度（attitudes）的形成與改變，下列何者正確？","options":{"A":"人們可以控制自己的表現或看法，逐漸形成內隱態度（implicit attitudes）","B":"制約（conditioning）可以形成以情感為基礎的態度","C":"「計畫行為理論（theory of planned behavior）」認為，態度可提取性（attitudeaccessibility）可預測人們的行為意圖","D":"「態度免疫（attitude inoculation）」是指，因為對態度對象抱持強烈價值觀，以致難以透過說服而改變態度"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":40,"stem":"在態度與態度改變的理論中，有所謂的「雙歷程模式」（Dual Process Model）。以下四個理論：①認知失調理論（Cognitive Dissonance Model） ②深思可能性模式（Elaboration LikelihoodModel） ③自我知覺理論（Self-perception Theory） ④系統—法則模式（Systematic-heuristic Model），何者被視為雙歷程模式？","options":{"A":"①②③④","B":"僅②④","C":"僅①③","D":"僅②"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null}]});

window.__EXAM_LOAD({"id":"114_2","year":114,"subjectIndex":2,"subject":"諮商與心理治療理論","essays":[{"num":1,"text":"阿強是國中二年級學生，有兩個哥哥一個弟弟，在校成績不佳，個性易怒、常與同學起衝突，喜歡\n利用別人、命令同學為他服務。其父親脾氣暴躁，一喝酒就打阿強出氣；阿強被打後隔天到學校容\n易出現攻擊同學的行為。請從阿德勒治療觀點，分析阿強偏差行為的原因，以及諮商輔導策略。\n（25分）","points":25,"reference":null,"rubric":null},{"num":2,"text":"Whitaker的經驗家族治療與Satir的人本／聯合家族治療，均為重要的家族治療法。請比較分析兩者\n在治療特色、失功能家庭的觀點、治療目標、治療技術之異同。（25分）","points":25,"reference":null,"rubric":null}],"mc":[{"num":1,"stem":"依據Corey（2023）的觀點，關於諮商心理師的自我揭露，下列敘述何者最適當？","options":{"A":"要嚴守角色分際，不宜對個案做任何的自我揭露","B":"要做自己，當諮商心理師感覺到有想要揭露的個人故事時，便可以自我揭露","C":"應該要努力的自我揭露，藉此成為個案的典範","D":"在自我揭露後，要關心個案的反應與受到的影響"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":2,"stem":"下列有關存在主義治療對焦慮的敘述，何者最不適當？","options":{"A":"May將焦慮分為正常焦慮與神經質焦慮二類","B":"Yalom將焦慮分為現實、神經質與道德焦慮三種型態","C":"存在主義治療認為，存在焦慮為正常焦慮","D":"因為過去無法做選擇而產生遺憾，可能導致存在焦慮"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":3,"stem":"下列關於有效能諮商心理師的人格特質描述，何者正確？","options":{"A":"認識自己是誰，並樂於以幫助別人來提升自我的價值感","B":"盡心盡力為個案付出，隨時思考他們的問題和解決之道","C":"面對自己的缺點、困難和矛盾時，宜保持幽默感","D":"知道文化對自己的影響，允許自己不具備多元文化的敏覺度"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":4,"stem":"「利亞雖全力追求想成為經理的位置，但他依然失利；他分析了各種失敗的原因之後認為自己一點都不想要那個位置，所以才會如此。」以上的描述符合那一種防衛機轉？","options":{"A":"轉移作用（displacement）","B":"投射作用（projection）","C":"否認作用（denial）","D":"合理化作用（rationalization）"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":5,"stem":"在精神分析或心理動力取向治療中，下列何者為「正向移情（positive transference）」的內涵？","options":{"A":"個案和諮商心理師之間發展出積極的互動關係","B":"個案對諮商心理師產生與其早年重要他人一致的情感","C":"個案對諮商心理師發展出不受早年關係牽制的嶄新關係","D":"個案對諮商心理師產生喜歡、希望被認可和接納的情感"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":6,"stem":"在精神分析治療中，個案常會出現保護自己免於焦慮以及畏懼改變等反應，諮商心理師就此應做何種適當的處遇方式？","options":{"A":"衝突分析","B":"自由聯想","C":"抗拒分析","D":"力場分析"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":7,"stem":"阿德勒治療對於人格與人性觀點的主張，下列何者正確？","options":{"A":"自卑感可視為創造的泉源","B":"人格皆由孩童時期的經驗所塑造","C":"每個人均有超越他人的卓越感","D":"人類行為皆由遺傳所決定"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":8,"stem":"一位患有憂鬱症的個案，深信沒有人真正關心他，也認為他所做的所有事情都不會順利成功。從阿德勒治療的觀點，這樣的想法信念為何？","options":{"A":"獨斷的推論","B":"私人邏輯","C":"存在焦慮","D":"自卑感"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":9,"stem":"一位家庭環境優渥的父親感慨地說，他為了家庭做牛做馬的犧牲自己。諮商心理師接著指出，個案沒有時間給自己或照顧自己的需求，是何其不幸之事。這比較是屬於阿德勒治療的何種治療技術？","options":{"A":"吐口水在個案的湯中（spitting in the clients' soup）","B":"閃開瀝青娃娃（avoiding the tar baby）","C":"矛盾意向（paradoxical intention）","D":"按鈕技術（the push-button technique）"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":10,"stem":"關於存在主義治療的說明，下列敘述何者錯誤？","options":{"A":"治療目標在幫助個案探索生命的意義與目的","B":"治療的基本假設是人是自由的，我們要為自己的選擇負責","C":"諮商歷程的第一步是從自己選擇開始","D":"治療學派的特色在於寬廣的信念與操作，個案會被邀請去觀照自己的生命"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":11,"stem":"小張升上財務副理後，卻發現反而更加有志難伸，並且越來越遠離原先對自己的期盼，感到沮喪、厭倦，也逐漸迷惘自己投入這份工作的價值與意義，開始出現藉酒消愁的情況。小張符合下列Frankl理論的何種概念？","options":{"A":"自我的抽離感（self-distance）","B":"存在的挫折感（existential frustration）","C":"存在的焦慮感（existential anxiety）","D":"存在的空洞感（existential vacuum）"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":12,"stem":"關於個人中心治療的過程，下列敘述何者錯誤？","options":{"A":"個案內在會變得更一致，更能覺察自己的感覺","B":"治療進展分為四個階段，從很封閉、不一致開始，朝向一致","C":"深信治療關係是改變最重要的因素","D":"隨著治療進展，個案可以成為Rogers所言的全然發揮的人"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":13,"stem":"關於個人中心治療的理論假設，下列何者錯誤？","options":{"A":"關心人格結構甚於人格的改變過程","B":"心理治療的動力來自個案的自我覺察","C":"個案是自己內在經驗的專家","D":"諮商心理師的態度是治療療效之充分與必要條件"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":14,"stem":"關於完形治療對於人性本質的觀點，下列敘述何者錯誤？","options":{"A":"場地理論：個人的行為和經驗必須在與環境的互動中被理解，過程比結果重要","B":"現象學：真正的知識來自於事件發生的當下，個人所獲得的經驗","C":"存在哲學：強調人的存在與選擇的自由，特別關注個人在當下的選擇與行動","D":"批判理論：個人唯有持續對自己的處境進行反思批判，才能不受限於環境"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":15,"stem":"完形治療中有關「未竟事宜（unfinished business）」的看法，下列敘述何者錯誤？","options":{"A":"未竟事宜的存在，主要因為個案在事件發生的當下，沒有能力因應或調節事件帶來的衝擊","B":"當未竟事宜的能量夠大時，會主導個案一直朝向完成未竟事宜去努力，這也是眾多症狀出現的原因","C":"原本未能表達的感受，在個案意識到之後，就能獲得解決","D":"未竟事宜會在身體上造成阻塞現象，因為未表達的情緒會引發身體的病徵"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":16,"stem":"完形治療用僵局（impasse）來形容個案適應不良的狀態，下列敘述何者錯誤？","options":{"A":"僵局是個人遭遇生活困境所帶來的一種進退不得的現象","B":"解決僵局，人們就能自我支持，使自己保持流動與成長的狀態","C":"僵局提供一個好機會，讓人可以深入探索自我、認識自己","D":"諮商心理師協助個案充分經驗僵局，以接觸自身挫折並接受之"},"answer":"A","accept":["A"],"giveAll":false,"note":"","explanation":null},{"num":17,"stem":"現實治療所謂心理健康發展的正向階段（positive stages），不包括下列那一個次階段？","options":{"A":"我會去做，我願改變（I'll do it）","B":"正向沉溺（positive addictions）","C":"自我價值（self worth）","D":"正向症狀（positive symptoms）"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":18,"stem":"有關現實治療的做法，下列敘述何者最不適當？","options":{"A":"讚美、鼓勵或獎賞個案成功達成計畫","B":"開立矛盾處方，例如請完美主義者故意犯錯","C":"接受個案「選擇不要做」（例如選擇不要每天閒晃）為計畫的替代方案","D":"諮商心理師在會談中參與或自我表露，例如分享自己的方法與經驗"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":19,"stem":"下列何人提出 WDEP 系統，擴展現實治療在實務和教學中的應用範圍？","options":{"A":"William Glasser","B":"Robert Wubbolding","C":"Lawrence Litwack","D":"Gerald Corey"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":20,"stem":"下列何者不是「第三波行為治療」的關注焦點？","options":{"A":"同在","B":"正念","C":"效果","D":"情感"},"answer":"C","accept":["C","D"],"giveAll":false,"note":"第20題答Ｃ或Ｄ或CD者均給分","explanation":null},{"num":21,"stem":"有關接納與承諾治療（ACT）的心理彈性，下列何者錯誤？","options":{"A":"我正在經歷憂鬱的感覺","B":"我讓自己相信人生只有一條路","C":"沒通過考試的我很失敗只是個想法","D":"我生氣是小孩不聽話造成的"},"answer":"D","accept":["D"],"giveAll":false,"note":"","explanation":null},{"num":22,"stem":"關於行為治療運用於班級輔導活動，下列敘述何者正確？①以代幣的方式，透過分組加分，進行班級經營 ②瞭解學生的成就動機，提升學習成績 ③以系統減敏法降低學生的考試焦慮 ④透過需求層次瞭解學生學習動機低落的問題","options":{"A":"①②③","B":"僅①③","C":"僅①④","D":"①③④"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":23,"stem":"在理情行為治療中，諮商心理師運用「理情想像」（rational emotive imagery）技術時，一般會邀請個案想像什麼？","options":{"A":"中性情境和事件，以調節個案的非理性信念","B":"發生最糟糕的事，以協助個案改變對困境的感受","C":"負面情境和事件，以協助個案擴大其經驗與知覺","D":"正向情境和事件，以協助個案改變習慣性的自我挫敗信念與感覺"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":24,"stem":"關於Beck等人（2004）所指「強迫性思考者」對自己及其世界的假設，下列何者錯誤？","options":{"A":"失控難以忍受","B":"犯錯就應該被責備","C":"生活世界是危險且無法掌控的","D":"世界上有正確和錯誤的行為與情緒"},"answer":"C","accept":["C"],"giveAll":false,"note":"","explanation":null},{"num":25,"stem":"關於蘇格拉底式對話（Socratic dialogue），下列敘述何者正確？","options":{"A":"採取質問的形式並依循交叉詢問的方式讓個案發現自己的盲點","B":"對於有任何認知困擾的個案都適用並有良好的成效","C":"目的乃是運用一連串的發問來攻擊個案的不合邏輯想法","D":"不適合運用在團體中協助成員澄清及整合自己的想法和情緒"},"answer":"A","accept":["A"],"giveAll":true,"note":"第25題一律給分","explanation":null},{"num":26,"stem":"關於家族治療的改變觀點，下列敘述何者錯誤？","options":{"A":"Satir認為個案能意識自身經歷與感受，並能夠對他人表達一致的內在自我，便可避免將壓力轉為苦惱","B":"Whitaker認為透過諮商心理師的評估及介入計畫，可以協助家庭成員改變失效的問題解決模式，從而降低焦慮","C":"Minuchin認為家庭此刻的同盟關係調整後，可為家庭建立彈性界限，使家庭系統合宜地運用權力","D":"Bowen認為透過教導能夠讓個案在情緒壓力下維持冷靜，從而習得更佳的自我分化"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":27,"stem":"MRI短期家族治療屬於策略取向，強調第二序改變（second-order changes），下列敘述何者最適當？","options":{"A":"系統中表面行為的改變，在系統本身內不做改變，但並不影響整個系統的改變","B":"諮商心理師不只是協助家庭消除症狀，而是努力去幫助他們改變整體的互動模式","C":"家庭系統中面對環境壓力而改變的機制，係屬較低層次的家庭調適歷程","D":"家庭系統中連結兩個子系統所產生的雙層次改變模式"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":28,"stem":"關於家族治療的觀點，以下敘述何者錯誤？","options":{"A":"治療焦點在於家庭系統的互動，包含此時此刻的家庭關係會如何促成症狀的發展與維持","B":"促使家庭成員確認並理解「被指認的病人」的行為模式與心理需求，以使家人能協助該成員改變","C":"在探索與評估時，聚焦於探索家庭歷程與規則的系統，並關注系統的家庭規範、社會文化、世代意義等","D":"將家庭視為是一個擁有獨特性格、具循環互動的單位，相互交涉、影響"},"answer":"B","accept":["B"],"giveAll":false,"note":"","explanation":null},{"num":29,"stem":"關於策略家族治療各種任務的使用，下列敘述何者錯誤？","options":{"A":"「矛盾任務」主要是要求家庭表現與求助問題相反的行為","B":"對於配合度高的家庭，諮商心理師可給予「開門見山任務」","C":"當家庭拒絕「直接任務」時，才使用「矛盾任務」","D":"「開門見山任務」僅適用於目的清楚的任務，不適合「隱喻性任務」"},"answer":"D","accept":["
